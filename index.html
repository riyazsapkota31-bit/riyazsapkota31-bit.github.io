<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI-BLACK | Full Strategy Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        :root { --accent: #6366f1; --bg: #030508; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .terminal-border { border: 1px solid rgba(255,255,255,0.08); background: rgba(10, 15, 25, 0.7); backdrop-filter: blur(20px); }
        .drawer { position: fixed; top: 0; right: -100%; width: 320px; height: 100%; background: #0a0f1b; transition: 0.5s ease; z-index: 1000; border-left: 1px solid rgba(255,255,255,0.1); }
        .drawer.open { right: 0; }
        .chart-box { aspect-ratio: 1/1; border: 1.5px dashed rgba(255,255,255,0.12); border-radius: 2rem; transition: all 0.4s ease; background: rgba(255,255,255,0.02); cursor: pointer; }
        .chart-box.has-file { border: 2px solid var(--accent); background: rgba(99, 102, 241, 0.1); }
        .scan-btn { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); transition: all 0.3s ease; }
        .glow-text { text-shadow: 0 0 25px currentColor; }
    </style>
</head>
<body class="p-6 pb-28">

    <header class="flex justify-between items-center mb-10">
        <div>
            <h1 class="text-2xl font-extrabold italic text-white uppercase tracking-tighter">OMNI—BLACK</h1>
            <p class="text-[9px] font-black text-indigo-400 uppercase tracking-widest">SMC • S&D • S&R • BOS • FIB • SPREAD • DXY</p>
        </div>
        <button onclick="toggleDrawer()" class="w-12 h-12 terminal-border rounded-2xl flex items-center justify-center text-slate-400">
            <i class="fa-solid fa-sliders text-lg"></i>
        </button>
    </header>

    <!-- 4 Chart Upload Boxes -->
    <div class="grid grid-cols-2 gap-4 mb-8">
        <div id="box0" class="chart-box flex flex-col items-center justify-center" onclick="document.getElementById('img0').click()">
            <input type="file" id="img0" accept="image/*" class="hidden" onchange="markFile(0)">
            <div id="label0" class="text-center"><i class="fa-solid fa-cloud-arrow-up text-slate-600 text-xl"></i><span class="text-[9px] font-bold uppercase text-slate-500 block">HTF BIAS (1H)</span></div>
            <div id="icon0" class="hidden text-emerald-400 text-4xl"><i class="fa-solid fa-circle-check"></i></div>
        </div>
        <div id="box1" class="chart-box flex flex-col items-center justify-center" onclick="document.getElementById('img1').click()">
            <input type="file" id="img1" accept="image/*" class="hidden" onchange="markFile(1)">
            <div id="label1" class="text-center"><i class="fa-solid fa-cloud-arrow-up text-slate-600 text-xl"></i><span class="text-[9px] font-bold uppercase text-slate-500 block">LTF STRUCT (15M)</span></div>
            <div id="icon1" class="hidden text-emerald-400 text-4xl"><i class="fa-solid fa-circle-check"></i></div>
        </div>
        <div id="box2" class="chart-box flex flex-col items-center justify-center" onclick="document.getElementById('img2').click()">
            <input type="file" id="img2" accept="image/*" class="hidden" onchange="markFile(2)">
            <div id="label2" class="text-center"><i class="fa-solid fa-cloud-arrow-up text-slate-600 text-xl"></i><span class="text-[9px] font-bold uppercase text-slate-500 block">ENTRY (5M/1M)</span></div>
            <div id="icon2" class="hidden text-emerald-400 text-4xl"><i class="fa-solid fa-circle-check"></i></div>
        </div>
        <div id="box3" class="chart-box flex flex-col items-center justify-center" onclick="document.getElementById('img3').click()">
            <input type="file" id="img3" accept="image/*" class="hidden" onchange="markFile(3)">
            <div id="label3" class="text-center"><i class="fa-solid fa-cloud-arrow-up text-slate-600 text-xl"></i><span class="text-[9px] font-bold uppercase text-slate-500 block">DXY INDEX (15M)</span></div>
            <div id="icon3" class="hidden text-emerald-400 text-4xl"><i class="fa-solid fa-circle-check"></i></div>
        </div>
    </div>

    <button id="scanBtn" onclick="executeSurgicalScan()" class="scan-btn w-full py-6 rounded-[2rem] font-extrabold text-xs uppercase tracking-widest text-white shadow-2xl">
        🧠 Perform Surgical Scan (Gemini 2.5 Flash Lite)
    </button>

    <!-- Results Panel -->
    <div id="resultBox" class="hidden mt-8 terminal-border rounded-[2.5rem] p-8 bg-black/40">
        <div class="flex justify-between items-center mb-8">
            <div class="flex flex-col">
                <span class="text-[10px] font-black text-indigo-400 tracking-[0.2em] uppercase">Surgical Analysis</span>
                <span id="scoreText" class="text-[9px] font-bold text-slate-500 uppercase mt-1">Confidence: 0%</span>
            </div>
            <div class="text-right">
                <p id="logicText" class="text-[11px] text-slate-400 italic max-w-[180px] leading-tight">Waiting...</p>
            </div>
        </div>
        
        <div class="text-center mb-10">
            <h2 id="actionText" class="text-5xl font-black italic tracking-tighter uppercase leading-none glow-text">---</h2>
        </div>

        <div id="poiZone" class="hidden mb-8 bg-amber-500/5 border border-amber-500/20 p-5 rounded-[2rem] text-center">
            <label class="text-[9px] uppercase text-amber-500 font-black block tracking-widest mb-1">⏳ Wait for POI Level</label>
            <span id="poiLevel" class="text-3xl font-extrabold text-white">0.000</span>
        </div>
        
        <div class="grid grid-cols-3 gap-0 border-y border-white/5 mb-8">
            <div class="py-8 text-center border-r border-white/5">
                <label class="text-[9px] uppercase text-slate-500 font-black block mb-2 tracking-widest">POI Entry</label>
                <span id="entText" class="text-xl font-extrabold text-white">0.00</span>
            </div>
            <div class="py-8 text-center border-r border-white/5">
                <label class="text-[9px] uppercase text-rose-500 font-black block mb-2 tracking-widest">SL</label>
                <span id="slText" class="text-xl font-extrabold text-rose-500">0.00</span>
            </div>
            <div class="py-8 text-center">
                <label class="text-[9px] uppercase text-emerald-500 font-black block mb-2 tracking-widest">TP</label>
                <span id="tpText" class="text-xl font-extrabold text-emerald-500">0.00</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-6 items-center">
            <div class="bg-indigo-500/5 border border-indigo-500/10 p-6 rounded-[2rem]">
                <label class="text-[9px] uppercase text-indigo-400 font-black mb-1 block tracking-widest">Lot Size</label>
                <span id="lotText" class="text-4xl font-black text-white">0.00</span>
            </div>
            <div class="space-y-3 px-2">
                <div class="flex justify-between items-center"><span class="text-[9px] text-slate-500 uppercase font-bold tracking-widest">DXY</span><span id="dxyStatus" class="text-[12px] font-bold text-white">---</span></div>
                <div class="flex justify-between items-center"><span class="text-[9px] text-slate-500 uppercase font-bold tracking-widest">RSI (14)</span><span id="rsiVal" class="text-[12px] font-bold text-white">---</span></div>
                <div class="flex justify-between items-center pt-2 border-t border-white/5"><span class="text-[9px] text-slate-500 uppercase font-bold tracking-widest">R:R</span><span id="rrText" class="text-[12px] font-black text-emerald-400">0:0</span></div>
                <div class="flex justify-between items-center"><span class="text-[9px] text-slate-500 uppercase font-bold tracking-widest">Grade</span><span id="gradeVal" class="text-[12px] font-black text-amber-400">---</span></div>
            </div>
        </div>
    </div>

    <!-- Drawer for API Key & Risk -->
    <div id="overlay" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-[900]" onclick="toggleDrawer()"></div>
    <div id="sideDrawer" class="drawer p-8">
        <h3 class="text-xs font-black uppercase text-indigo-400 mb-10 tracking-[0.3em]">System Config</h3>
        <div class="space-y-6">
            <div class="bg-white/5 p-6 rounded-[2rem]">
                <label class="text-[10px] uppercase text-slate-500 mb-2 block">🔑 Gemini API Key</label>
                <input type="password" id="apiKeyInput" class="w-full bg-black border border-white/10 rounded-xl p-3 text-sm mb-6 outline-none text-white" placeholder="AIza...">
                
                <label class="text-[10px] uppercase text-slate-500 mb-2 block">💰 Account Balance ($)</label>
                <input type="number" id="balanceInput" placeholder="10000" class="w-full bg-black border border-white/10 rounded-xl p-3 text-sm mb-4 outline-none text-white">
                
                <label class="text-[10px] uppercase text-slate-500 mb-2 block">📉 Risk per Trade (%)</label>
                <input type="number" id="riskInput" placeholder="1.0" step="0.5" class="w-full bg-black border border-white/10 rounded-xl p-3 text-sm mb-8 outline-none text-white">

                <button onclick="secureParameters()" class="scan-btn w-full py-4 rounded-xl font-black text-[10px] uppercase tracking-widest text-white">
                    LOCK & SAVE
                </button>
            </div>
        </div>
    </div>

    <script src="strategies.js"></script>
    <script>
        // UI & Gemini integration
        let files = [null, null, null, null];
        const ui = (id) => document.getElementById(id);
        const toBase64 = (file) => new Promise(res => {
            const r = new FileReader(); r.readAsDataURL(file); r.onload = () => res(r.result);
        });

        function toggleDrawer() {
            ui('sideDrawer').classList.toggle('open');
            ui('overlay').classList.toggle('hidden');
        }
        function markFile(i) {
            let box = ui('box'+i);
            box.classList.add('has-file');
            ui('label'+i).classList.add('hidden');
            ui('icon'+i).classList.remove('hidden');
            files[i] = ui('img'+i).files[0];
        }
        function secureParameters() {
            ['apiKeyInput', 'balanceInput', 'riskInput'].forEach(id => {
                localStorage.setItem('omni_' + id, ui(id).value);
            });
            alert("✅ Configuration saved");
            toggleDrawer();
        }
        document.addEventListener('DOMContentLoaded', () => {
            ['apiKeyInput', 'balanceInput', 'riskInput'].forEach(id => {
                let val = localStorage.getItem('omni_' + id);
                if (val && ui(id)) ui(id).value = val;
            });
        });

        // Gemini 2.5 Flash Lite extraction (detailed JSON)
        async function geminiSensor(key, images) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${key}`;
            const prompt = `
                You are a professional trading analyst. Analyze the 4 uploaded charts (HTF bias, LTF structure, entry time frame, DXY). Extract the following JSON precisely. Use null if not visible. Return ONLY valid JSON.

                {
                  "asset": "string",
                  "spread": number | null,
                  "currentPrice": number,
                  "recentCloses": [numbers, last 20 closes],
                  "mss": "BULLISH" | "BEARISH" | "NONE",
                  "liquiditySweep": number | null,
                  "ob_level": number | null,
                  "fvg_level": number | null,
                  "supplyZone": { "high": number, "low": number } | null,
                  "demandZone": { "high": number, "low": number } | null,
                  "support": number | null,
                  "resistance": number | null,
                  "bounceConfirm": boolean | null,
                  "bosType": "BULLISH" | "BEARISH" | null,
                  "retestZone": { "high": number, "low": number } | null,
                  "trendDirection": "UP" | "DOWN" | null,
                  "fibLevel": number | null,
                  "dxyTrend": "BULLISH" | "BEARISH"
                }
            `;
            const parts = [{ text: prompt }, ...images.map(img => ({ inline_data: { mime_type: "image/jpeg", data: img.split(',')[1] } }))];
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts }], generationConfig: { temperature: 0.0, response_mime_type: "application/json" } })
            });
            const json = await res.json();
            const text = json.candidates[0].content.parts[0].text;
            return JSON.parse(text);
        }

        async function geminiNarrator(key, signal, data, reasons) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${key}`;
            const reasonText = reasons.join(", ");
            const prompt = `Signal: ${signal}. Confluences: ${reasonText}. Write one short sentence (max 20 words) explaining why this is a ${signal} setup on ${data.asset}.`;
            const res = await fetch(url, {
                method: 'POST',
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const j = await res.json();
            return j.candidates[0].content.parts[0].text;
        }

        async function executeSurgicalScan() {
            if (files.filter(f => f).length < 4) return alert("Please upload all 4 chart images.");
            const key = localStorage.getItem('omni_apiKeyInput');
            if (!key || !key.startsWith("AIza")) return alert("Enter a valid Gemini API Key in settings.");
            const btn = ui('scanBtn');
            btn.innerText = "🔍 GEMINI EXTRACTING STRUCTURE...";
            btn.disabled = true;
            try {
                const b64 = await Promise.all(files.map(f => toBase64(f)));
                const marketData = await geminiSensor(key, b64);
                const setup = window.StrategyEngine.getBestSetup(marketData);
                const narrative = await geminiNarrator(key, setup.action, marketData, setup.reasons);
                renderUI(marketData, setup, narrative);
            } catch (err) {
                console.error(err);
                alert("Scan failed: check API key or image quality. Ensure charts are clear.");
            } finally {
                btn.innerText = "🧠 Perform Surgical Scan (Gemini 2.5 Flash Lite)";
                btn.disabled = false;
            }
        }

        function renderUI(data, setup, narrative) {
            ui('resultBox').classList.remove('hidden');
            ui('actionText').innerText = setup.action;
            ui('actionText').className = `text-6xl font-black italic uppercase glow-text ${
                setup.action === 'BUY' ? 'text-emerald-400' : (setup.action === 'SELL' ? 'text-rose-500' : 'text-slate-400')
            }`;
            ui('logicText').innerHTML = `<span class="text-indigo-300">[${setup.grade}]</span> ${narrative}`;
            ui('scoreText').innerHTML = `Confidence: ${setup.confidence}% | ${setup.reasons.slice(0,2).join(" • ")}`;
            ui('rsiVal').innerText = setup.rsi;
            ui('dxyStatus').innerText = data.dxyTrend;
            ui('gradeVal').innerText = setup.grade;
            
            if (setup.action === "WAIT") {
                ui('poiZone').classList.remove('hidden');
                ui('poiLevel').innerText = setup.poi;
                ui('entText').innerText = "---";
                ui('slText').innerText = "---";
                ui('tpText').innerText = "---";
                ui('lotText').innerText = "0.00";
                ui('rrText').innerHTML = "0:0";
            } else {
                ui('poiZone').classList.add('hidden');
                ui('entText').innerText = setup.poi;
                ui('slText').innerText = setup.sl;
                ui('tpText').innerText = setup.tp;
                const balance = parseFloat(localStorage.getItem('omni_balanceInput')) || 10000;
                const riskPct = parseFloat(localStorage.getItem('omni_riskInput')) || 1;
                const riskAmount = balance * (riskPct / 100);
                const slDistance = Math.abs(parseFloat(setup.poi) - parseFloat(setup.sl));
                // Lot size formula for forex (0.0001 pip value $10 per 0.1 lot)
                const lot = (riskAmount / (slDistance * 10000)) * 0.1;
                ui('lotText').innerText = Math.max(0.01, lot.toFixed(3));
                const reward = Math.abs(parseFloat(setup.tp) - parseFloat(setup.poi));
                const rr = (reward / slDistance).toFixed(2);
                ui('rrText').innerHTML = `1 : ${rr}`;
            }
        }
    </script>
</body>
</html>
