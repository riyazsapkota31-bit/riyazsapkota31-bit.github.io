<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI-REAL | V8.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-[#0a0a0c] text-slate-200 min-h-screen font-sans selection:bg-indigo-500/30">

    <header class="sticky top-0 z-40 bg-[#0a0a0c]/80 backdrop-blur-md border-b border-white/5 p-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black tracking-tighter text-white italic">OMNI-REAL</h1>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Infinity Scalper V8.2</p>
            </div>
        </div>
        <button onclick="toggleDrawer()" class="p-2 bg-white/5 rounded-lg border border-white/10 hover:bg-white/10 transition-colors">
            <i class="fa-solid fa-sliders text-indigo-400"></i>
        </button>
    </header>

    <main class="p-4 max-w-lg mx-auto pb-24">
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div id="box0" class="tier-box relative aspect-square bg-slate-900/50 border-2 border-dashed border-white/10 rounded-2xl flex flex-col items-center justify-center transition-all overflow-hidden">
                <input type="file" id="img0" accept="image/*" onchange="markFile(0)" class="absolute inset-0 opacity-0 cursor-pointer z-10">
                <div id="content0" class="text-center p-4">
                    <i class="fa-solid fa-layer-group text-2xl mb-2 text-indigo-500"></i>
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Tier 1</p>
                </div>
            </div>
            <div id="box1" class="tier-box relative aspect-square bg-slate-900/50 border-2 border-dashed border-white/10 rounded-2xl flex flex-col items-center justify-center transition-all overflow-hidden">
                <input type="file" id="img1" accept="image/*" onchange="markFile(1)" class="absolute inset-0 opacity-0 cursor-pointer z-10">
                <div id="content1" class="text-center p-4">
                    <i class="fa-solid fa-layer-group text-2xl mb-2 text-indigo-500"></i>
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Tier 2</p>
                </div>
            </div>
            <div id="box2" class="tier-box relative aspect-square bg-slate-900/50 border-2 border-dashed border-white/10 rounded-2xl flex flex-col items-center justify-center transition-all overflow-hidden">
                <input type="file" id="img2" accept="image/*" onchange="markFile(2)" class="absolute inset-0 opacity-0 cursor-pointer z-10">
                <div id="content2" class="text-center p-4">
                    <i class="fa-solid fa-layer-group text-2xl mb-2 text-indigo-500"></i>
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Tier 3</p>
                </div>
            </div>
            <div id="box3" class="tier-box relative aspect-square bg-slate-900/50 border-2 border-dashed border-white/10 rounded-2xl flex flex-col items-center justify-center transition-all overflow-hidden">
                <input type="file" id="img3" accept="image/*" onchange="markFile(3)" class="absolute inset-0 opacity-0 cursor-pointer z-10">
                <div id="content3" class="text-center p-4">
                    <i class="fa-solid fa-layer-group text-2xl mb-2 text-indigo-500"></i>
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Tier 4</p>
                </div>
            </div>
        </div>

        <div class="bg-slate-900/40 border border-white/5 p-4 rounded-2xl mb-6 flex gap-4">
            <div class="flex-1">
                <label class="text-[10px] font-bold text-slate-500 uppercase mb-1 block">Balance ($)</label>
                <input type="number" id="bal" value="10000" class="w-full bg-black/40 border border-white/10 rounded-lg p-2 text-emerald-400 font-mono">
            </div>
            <div class="flex-1">
                <label class="text-[10px] font-bold text-slate-500 uppercase mb-1 block">Risk (%)</label>
                <input type="number" id="risk" value="1" class="w-full bg-black/40 border border-white/10 rounded-lg p-2 text-rose-400 font-mono">
            </div>
        </div>

        <button id="scanBtn" onclick="executeScan()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-indigo-500/20 active:scale-[0.98]">
            PERFORM MULTI-CHART SCAN
        </button>

        <button id="debugBtn" onclick="runModelDiagnostic()" class="w-full mt-4 bg-amber-500/10 border border-amber-500/30 text-amber-500 font-bold py-3 rounded-xl text-xs tracking-widest hover:bg-amber-500/20 transition-all">
            DEBUG: TEST API COMPATIBILITY
        </button>

        <div id="resultBox" class="hidden mt-8 text-center animate-in fade-in slide-in-from-bottom-4 duration-500">
            <h2 id="actionText" class="text-5xl font-black italic mb-6 glow-text tracking-tighter"></h2>
            
            <div class="grid grid-cols-2 gap-4 text-left">
                <div class="bg-slate-900/60 p-4 rounded-xl border border-white/5">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Entry</p>
                    <p id="entText" class="text-xl font-mono text-white">---</p>
                </div>
                <div class="bg-slate-900/60 p-4 rounded-xl border border-white/5">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Stop Loss</p>
                    <p id="slText" class="text-xl font-mono text-rose-500">---</p>
                </div>
                <div class="bg-slate-900/60 p-4 rounded-xl border border-white/5">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Take Profit</p>
                    <p id="tpText" class="text-xl font-mono text-emerald-500">---</p>
                </div>
                <div class="bg-slate-900/60 p-4 rounded-xl border border-white/5">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Lot Size</p>
                    <p id="lotText" class="text-xl font-mono text-indigo-400">---</p>
                </div>
            </div>
            
            <div class="mt-4 bg-slate-900/60 p-4 rounded-xl border border-white/5 text-left">
                <p class="text-[10px] font-bold text-slate-500 uppercase mb-1">Analysis Logic</p>
                <p id="logicText" class="text-xs text-slate-400 leading-relaxed italic"></p>
            </div>
        </div>
    </main>

    <div id="overlay" onclick="toggleDrawer()" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 hidden opacity-0 transition-opacity"></div>
    <div id="sideDrawer" class="fixed top-0 right-0 h-full w-80 bg-[#0d0d10] border-l border-white/10 z-50 transform translate-x-full transition-transform duration-300 p-6">
        <h3 class="text-lg font-bold mb-6 flex items-center gap-2">
            <i class="fa-solid fa-terminal text-indigo-500"></i> System Sync
        </h3>
        
        <div class="space-y-4">
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase mb-2 block">Gemini API Key</label>
                <div class="flex gap-2">
                    <input type="password" id="apiInput" placeholder="Paste Key..." class="flex-1 bg-black/40 border border-white/10 rounded-lg p-2 text-sm text-indigo-300 outline-none focus:border-indigo-500">
                    <button id="lockBtn" onclick="saveApiKey()" class="bg-emerald-600 px-3 rounded-lg"><i class="fa-solid fa-check text-white"></i></button>
                    <button id="editBtn" onclick="enableEdit()" class="bg-slate-800 px-3 rounded-lg hidden"><i class="fa-solid fa-pen text-white text-xs"></i></button>
                </div>
            </div>
            <p class="text-[10px] text-slate-500 leading-relaxed italic">API key is stored locally in your browser and never leaves this device.</p>
        </div>
    </div>

    <script src="strategies.js"></script>
</body>
</html>
