<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI-REAL | INFINITY SCALPER V8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #050508; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow-x: hidden; padding: 16px 16px 100px 16px; }
        .glass-card { background: rgba(12,12,22,0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.06); border-radius: 24px; }
        
        /* Upload Boxes */
        .upload-box { background: rgba(12,12,22,0.9); border: 1.5px dashed rgba(99,102,241,0.4); border-radius: 20px; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s ease; position: relative; gap: 8px; }
        .upload-box.has-file { border: 1.5px solid #10b981; background: rgba(16,185,129,0.06); box-shadow: 0 0 20px rgba(16,185,129,0.2); }
        .upload-box.has-file .upload-icon, .upload-box.has-file .upload-label, .upload-box.has-file .chart-label { display: none; }
        
        /* Checkmark Animation */
        .tick-wrap { display: none; flex-direction: column; align-items: center; gap: 8px; }
        .upload-box.has-file .tick-wrap { display: flex; }
        .tick-icon { font-size: 32px; color: #10b981; filter: drop-shadow(0 0 10px rgba(16,185,129,0.8)); }
        
        /* Scan Button */
        .scan-btn { width: 100%; padding: 20px; border-radius: 100px; background: linear-gradient(135deg, #4f46e5, #7c3aed); font-weight: 900; font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase; border: none; color: white; cursor: pointer; box-shadow: 0 8px 32px rgba(79,70,229,0.4); transition: transform 0.2s; }
        .scan-btn:active { transform: scale(0.96); }

        /* Results Display */
        .signal-card { background: linear-gradient(145deg, rgba(12,12,22,0.95), rgba(18,18,35,0.95)); border: 1px solid rgba(255,255,255,0.07); border-radius: 24px; overflow: hidden; position: relative; }
        .signal-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, #10b981, transparent); }
        .signal-card.sell-card::before { background: linear-gradient(90deg, transparent, #ef4444, transparent); }
        .signal-card.wait-card::before { background: linear-gradient(90deg, transparent, #64748b, transparent); }

        /* Typography & Utils */
        .pill { padding: 4px 12px; border-radius: 100px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .data-label { font-size: 9px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: #475569; }
        .data-value { font-family: 'Courier New', monospace; font-size: 16px; font-weight: 700; }
        
        /* Side Drawer */
        #sideDrawer { position: fixed; top: 0; right: 0; height: 100%; width: 85%; max-width: 360px; background: #080810; border-left: 1px solid rgba(255,255,255,0.06); padding: 24px; transform: translateX(100%); transition: 0.35s ease; z-index: 1000; }
        #sideDrawer.open { transform: translateX(0); }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 999; display: none; }
        #overlay.show { display: block; }
    </style>
</head>
<body>

    <div class="flex justify-between items-center mb-8 mt-2">
        <div>
            <h1 class="text-3xl font-black italic text-slate-100 leading-tight">OMNI–REAL</h1>
            <p class="text-[9px] font-extrabold tracking-[0.25em] text-emerald-500 uppercase flex items-center gap-1.5">
                <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                Infinity Scalper V8.2
            </p>
        </div>
        <button onclick="toggleDrawer()" class="w-12 h-12 bg-indigo-500/10 border border-indigo-500/20 rounded-2xl text-indigo-400 flex items-center justify-center">
            <i class="fa-solid fa-sliders"></i>
        </button>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-4">
        <div class="upload-box" id="box0" onclick="document.getElementById('img0').click()">
            <input type="file" id="img0" class="hidden" accept="image/*" onchange="markFile(0)">
            <i class="fa-solid fa-cloud-arrow-up text-indigo-400 text-xl upload-icon"></i>
            <span class="text-[10px] font-bold text-slate-400 chart-label uppercase">1H Bias</span>
            <div class="tick-wrap"><i class="fa-solid fa-circle-check tick-icon"></i></div>
        </div>
        <div class="upload-box" id="box1" onclick="document.getElementById('img1').click()">
            <input type="file" id="img1" class="hidden" accept="image/*" onchange="markFile(1)">
            <i class="fa-solid fa-cloud-arrow-up text-indigo-400 text-xl upload-icon"></i>
            <span class="text-[10px] font-bold text-slate-400 chart-label uppercase">15M Struct</span>
            <div class="tick-wrap"><i class="fa-solid fa-circle-check tick-icon"></i></div>
        </div>
        <div class="upload-box" id="box2" onclick="document.getElementById('img2').click()">
            <input type="file" id="img2" class="hidden" accept="image/*" onchange="markFile(2)">
            <i class="fa-solid fa-cloud-arrow-up text-indigo-400 text-xl upload-icon"></i>
            <span class="text-[10px] font-bold text-slate-400 chart-label uppercase">1M Entry</span>
            <div class="tick-wrap"><i class="fa-solid fa-circle-check tick-icon"></i></div>
        </div>
        <div class="upload-box" id="box3" onclick="document.getElementById('img3').click()">
            <input type="file" id="img3" class="hidden" accept="image/*" onchange="markFile(3)">
            <i class="fa-solid fa-cloud-arrow-up text-indigo-400 text-xl upload-icon"></i>
            <span class="text-[10px] font-bold text-slate-400 chart-label uppercase">DXY Index</span>
            <div class="tick-wrap"><i class="fa-solid fa-circle-check tick-icon"></i></div>
        </div>
    </div>

    <button id="scanBtn" class="scan-btn" onclick="executeScan()">Perform Multi-Chart Scan</button>

    <div id="resultBox" class="hidden mt-6">
        <div class="signal-card p-6 mb-3" id="signalCard">
            <div class="flex justify-between items-center mb-6">
                <span id="strategyPill" class="pill bg-emerald-500/10 text-emerald-500 border border-emerald-500/20">Quant V8.2</span>
                <span id="scoreBadge" class="text-[10px] font-black text-slate-500 tracking-widest uppercase">SCORE —/10</span>
            </div>
            
            <h2 id="actionText" class="text-6xl font-black italic text-center mb-6 text-slate-600 transition-colors duration-500">---</h2>

            <div id="tradeGrid" class="hidden border-t border-white/5 pt-5">
                <div class="flex justify-between py-3 border-b border-white/5"><span class="data-label">Execution</span><span class="data-value" id="entText">—</span></div>
                <div class="flex justify-between py-3 border-b border-white/5"><span class="data-label">Hard Stop</span><span class="data-value text-red-500" id="slText">—</span></div>
                <div class="flex justify-between py-3 border-b border-white/5"><span class="data-label">Target</span><span class="data-value text-emerald-500" id="tpText">—</span></div>
                
                <div class="grid grid-cols-2 gap-3 mt-4">
                    <div class="bg-amber-500/5 border border-amber-500/20 p-4 rounded-2xl text-center">
                        <p class="data-label text-amber-500 mb-1">Lot Size</p>
                        <p id="lotText" class="text-2xl font-bold text-amber-400">0.00</p>
                    </div>
                    <div class="bg-indigo-500/5 border border-indigo-500/20 p-4 rounded-2xl text-center">
                        <p class="data-label text-indigo-400 mb-1">R : R</p>
                        <p id="rrText" class="text-2xl font-bold text-indigo-300">1:0</p>
                    </div>
                </div>
            </div>

            <div id="waitGrid" class="hidden pt-5">
                <div class="bg-amber-500/10 border border-amber-500/20 p-6 rounded-2xl text-center">
                    <p class="data-label text-amber-500 mb-2">Watch Level</p>
                    <p id="watchLevel" class="text-3xl font-black text-amber-400 tracking-tighter">—</p>
                </div>
            </div>
        </div>

        <div class="bg-slate-900/50 border border-white/5 p-5 rounded-2xl">
            <p class="data-label mb-3">Model Reasoning</p>
            <p id="logicText" class="text-xs italic text-slate-400 leading-relaxed">—</p>
        </div>
    </div>

    <div id="overlay" onclick="toggleDrawer()"></div>
    <div id="sideDrawer">
        <h3 class="text-xl font-black text-white mb-6">MASTER CONTROL</h3>
        <div class="space-y-4">
            <div>
                <label class="drawer-label">Balance ($)</label>
                <input type="number" id="bal" value="10000" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm text-white outline-none">
            </div>
            <div>
                <label class="drawer-label">Risk (%)</label>
                <input type="number" id="risk" value="1" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm text-white outline-none">
            </div>
            <div class="pt-6 border-t border-white/5">
                <label class="drawer-label">API Access Key</label>
                <input type="password" id="apiInput" placeholder="PASTE GEMINI KEY..." class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm text-white outline-none">
                <button onclick="saveApiKey()" class="w-full mt-4 bg-indigo-600 hover:bg-indigo-500 text-white font-black text-[10px] tracking-widest p-4 rounded-xl transition-all">SYNC TERMINAL</button>
            </div>
        </div>
    </div>

    <script src="strategies.js"></script>
</body>
</html>
