<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Trader | Accuracy AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #05070a; color: #e2e8f0; overflow-x: hidden; }
        
        /* THE POPUP ANIMATION */
        .slide-up-popup {
            animation: popupFrame 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes popupFrame {
            0% { transform: translateY(100%); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .glass-panel { background: #0d1117; border: 1px solid #1f2937; border-radius: 32px; }
        
        /* UI Elements */
        .upload-slot { position: relative; height: 140px; border: 2px dashed #1f2937; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0d1117; }
        .file-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .check-icon { display: none; color: #10b981; font-size: 30px; }
        input:valid ~ .check-icon { display: block; }
        input:valid ~ .label-text { display: none; }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="mb-10 text-center">
        <h1 class="text-4xl font-black italic tracking-tighter">OMNI-TRADER PRO</h1>
        <p class="text-[9px] text-indigo-500 font-bold tracking-widest uppercase mt-1">Institutional Accuracy Mode</p>
    </header>

    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
        <div class="upload-slot"><input type="file" class="file-input" required><span class="label-text text-[10px] font-black uppercase text-slate-500">4H Chart</span><i class="fas fa-check-circle check-icon"></i></div>
        <div class="upload-slot"><input type="file" class="file-input" required><span class="label-text text-[10px] font-black uppercase text-slate-500">1H Chart</span><i class="fas fa-check-circle check-icon"></i></div>
        <div class="upload-slot"><input type="file" class="file-input" required><span class="label-text text-[10px] font-black uppercase text-slate-500">M15 Chart</span><i class="fas fa-check-circle check-icon"></i></div>
        <div class="upload-slot"><input type="file" class="file-input" required><span class="label-text text-[10px] font-black uppercase text-slate-500">DXY Bias</span><i class="fas fa-check-circle check-icon"></i></div>
    </div>

    <button onclick="runAnalysis()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-6 rounded-2xl font-black uppercase tracking-widest transition-all">
        Deep Analysis Scan
    </button>

    <div id="resultContainer" class="hidden mt-8">
        <div class="glass-panel p-8 slide-up-popup">
            <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-6">
                <div>
                    <span class="text-[10px] font-bold text-indigo-400 uppercase">System Recommendation</span>
                    <h2 id="tradeVal" class="text-6xl font-black italic">---</h2>
                </div>
                <div class="text-right">
                    <span class="text-[10px] font-bold text-slate-500 uppercase">Risk Level</span>
                    <b class="block text-emerald-400">LOW</b>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-3 gap-6 mb-8">
                <div><span class="text-[9px] text-slate-500 font-black uppercase">Support :</span><b id="supVal" class="block text-lg">---</b></div>
                <div><span class="text-[9px] text-slate-500 font-black uppercase">Resistance :</span><b id="resVal" class="block text-lg">---</b></div>
                <div><span class="text-[9px] text-slate-500 font-black uppercase">Entry :</span><b id="entVal" class="block text-lg text-indigo-400">---</b></div>
                <div><span class="text-[9px] text-slate-500 font-black uppercase">TP (1:2) :</span><b id="tpVal" class="block text-lg text-emerald-400">---</b></div>
                <div><span class="text-[9px] text-slate-500 font-black uppercase">SL :</span><b id="slVal" class="block text-lg text-rose-400">---</b></div>
                <div><span class="text-[9px] text-slate-500 font-black uppercase">Lots :</span><b id="lotVal" class="block text-lg">---</b></div>
            </div>

            <div class="bg-black/40 p-5 rounded-2xl border border-slate-800">
                <span class="text-[9px] text-indigo-400 font-black uppercase block mb-1">Trade Logic :</span>
                <p id="logicVal" class="text-xs text-slate-400 italic leading-relaxed"></p>
            </div>
        </div>
    </div>

    <script>
        function runAnalysis() {
            // Simulated AI result based on your requested structure
            document.getElementById('resultContainer').classList.remove('hidden');
            
            document.getElementById('tradeVal').innerText = "BUY";
            document.getElementById('supVal').innerText = "88.13";
            document.getElementById('resVal').innerText = "92.50";
            document.getElementById('entVal').innerText = "88.68";
            document.getElementById('tpVal').innerText = "90.68"; // Exact 1:2 ratio based on SL
            document.getElementById('slVal').innerText = "87.68";
            document.getElementById('lotVal').innerText = "0.45";
            document.getElementById('logicVal').innerText = "Price swept M15 liquidity and closed above 1H support. Bullish continuation expected with 1:2 R:R target.";
        }
    </script>
</body>
</html>
