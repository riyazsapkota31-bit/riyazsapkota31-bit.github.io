<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OMNI-BLACK | UNIVERSAL V17</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon-indigo: #6366f1; --neon-emerald: #10b981; --neon-rose: #f43f5e; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; padding: 20px; -webkit-font-smoothing: antialiased; }
        
        .glass-panel { 
            background: linear-gradient(165deg, rgba(12,12,12,0.98), rgba(0,0,0,1));
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 40px;
            box-shadow: 0 30px 70px rgba(0,0,0,1);
        }

        .tier-card { 
            border: 2px dashed #1a1a1a; border-radius: 35px; min-height: 160px; 
            background: #030303; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; transition: 0.4s cubic-bezier(0.1, 1, 0.1, 1);
        }
        .has-file { 
            border: 2px solid var(--neon-indigo); background: rgba(99, 102, 241, 0.08);
            box-shadow: 0 0 45px rgba(99, 102, 241, 0.25); transform: scale(1.03);
        }

        .glow-bias { 
            text-shadow: 0 0 50px currentColor; font-size: clamp(5.5rem, 20vw, 9rem); 
            font-weight: 900; letter-spacing: -0.06em; font-style: italic; line-height: 0.9;
        }

        .btn-exec { 
            background: #fff; color: #000; border-radius: 30px; padding: 26px; 
            font-weight: 950; text-transform: uppercase; letter-spacing: 0.35em;
            transition: 0.3s; box-shadow: 0 20px 40px rgba(255,255,255,0.1);
        }
        .btn-exec:active { transform: scale(0.95); filter: brightness(1.2); }

        .data-label { font-size: 10px; font-weight: 900; color: #666; text-transform: uppercase; letter-spacing: 0.4em; }
        .data-value { font-size: 2.6rem; font-family: 'JetBrains Mono', monospace; font-weight: 800; letter-spacing: -0.05em; }

        .status-pulse { animation: pulse 1.8s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.1); } }
    </style>
</head>
<body>

    <header class="flex justify-between items-center mb-10 px-4 mt-4">
        <div>
            <h1 class="text-4xl font-black italic tracking-tighter leading-none">OMNI-BLACK</h1>
            <div class="flex items-center gap-3 mt-3">
                <div id="statusDot" class="w-3 h-3 rounded-full bg-rose-600 shadow-[0_0_20px_#f43f5e]"></div>
                <p id="riskDisp" class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.6em]">System Offline</p>
            </div>
        </div>
        <div class="px-4 py-2 border border-white/10 rounded-full text-[9px] font-black uppercase text-slate-400 tracking-widest">Global V17</div>
    </header>

    <div class="glass-panel p-8 mb-10 border-l-[12px] border-indigo-600 flex justify-between items-center">
        <div>
            <p class="data-label mb-2">Omni-Strategy Active</p>
            <h2 id="pairDisp" class="text-2xl font-black italic text-white uppercase tracking-tighter">[ STANDBY ]</h2>
        </div>
        <div class="text-right">
            <p class="data-label mb-2">IQ Level</p>
            <p id="confDisp" class="text-indigo-400 font-bold italic tracking-widest text-xs uppercase">100% PRECISION</p>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-5 mb-12">
        <div id="box0" class="tier-card" onclick="document.getElementById('i0').click()">
            <input type="file" id="i0" hidden accept="image/*" onchange="sync(0)"><i class="fa-solid fa-earth-americas text-slate-800 text-4xl mb-2" id="ic0"></i>
            <p class="data-label">1H Context</p>
        </div>
        <div id="box1" class="tier-card" onclick="document.getElementById('i1').click()">
            <input type="file" id="i1" hidden accept="image/*" onchange="sync(1)"><i class="fa-solid fa-microscope text-slate-800 text-4xl mb-2" id="ic1"></i>
            <p class="data-label">15M Macro</p>
        </div>
        <div id="box2" class="tier-card" onclick="document.getElementById('i2').click()">
            <input type="file" id="i2" hidden accept="image/*" onchange="sync(2)"><i class="fa-solid fa-crosshairs text-slate-800 text-4xl mb-2" id="ic2"></i>
            <p class="data-label">1M Entry</p>
        </div>
        <div id="box3" class="tier-card" onclick="document.getElementById('i3').click()">
            <input type="file" id="i3" hidden accept="image/*" onchange="sync(3)"><i class="fa-solid fa-bolt text-slate-800 text-4xl mb-2" id="ic3"></i>
            <p class="data-label">DXY Data</p>
        </div>
    </div>

    <button id="goBtn" onclick="executeSurgicalScan()" class="btn-exec w-full mb-12 shadow-indigo-500/20 shadow-2xl">Execute A+ Global Scan</button>

    <div id="outPanel" class="hidden space-y-12 pb-32">
        <div id="waitMsg" class="hidden py-6 rounded-[35px] bg-amber-500/5 border-2 border-amber-500/10 text-center text-amber-500 font-black italic text-2xl tracking-tighter">WAITING FOR TRIGGER...</div>
        <div class="text-center"><h2 id="biasTxt" class="glow-bias"></h2></div>
        
        <div class="grid grid-cols-2 gap-8 text-center border-y border-white/5 py-14">
            <div><p class="data-label mb-3 text-slate-400">Entry</p><p id="entVal" class="data-value">--</p></div>
            <div><p class="data-label mb-3 text-indigo-500">Lots</p><p id="lotVal" class="data-value text-indigo-400">--</p></div>
            <div><p class="data-label mb-3 text-rose-500">Stop Loss</p><p id="slVal" class="data-value text-rose-600">--</p></div>
            <div><p class="data-label mb-3 text-emerald-500">Target</p><p id="tpVal" class="data-value text-emerald-500">--</p></div>
        </div>

        <div class="p-10 glass-panel border-t-[14px] border-indigo-600 shadow-2xl">
            <p id="logicSummary" class="text-2xl text-slate-200 leading-tight italic font-bold tracking-tight"></p>
        </div>
    </div>

    <div class="mt-20 p-10 glass-panel opacity-5 hover:opacity-100 transition-all duration-700">
        <input type="password" id="kIn" placeholder="GEMINI API KEY" class="bg-black border border-white/10 rounded-3xl w-full mb-6 p-6 text-center text-sm outline-none text-indigo-400 font-mono">
        <div class="grid grid-cols-2 gap-4 mb-6">
            <input type="number" id="bIn" placeholder="BALANCE ($)" class="bg-black border border-white/10 rounded-3xl p-6 text-center text-sm outline-none">
            <input type="number" id="rIn" placeholder="RISK %" class="bg-black border border-white/10 rounded-3xl p-6 text-center text-sm outline-none">
        </div>
        <button onclick="saveConfig()" class="w-full text-[11px] font-black uppercase text-indigo-500 tracking-[0.6em]">Sync Core Engine</button>
    </div>

    <script src="strategies.js"></script>
</body>
</html>
