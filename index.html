<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Trader Pro | Accuracy AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #05070a; color: #e2e8f0; margin: 0; overflow-x: hidden; }
        
        /* SIDE DRAWER FOR BALANCE/SETTINGS */
        #sideDrawer { position: fixed; top: 0; right: -100%; width: 100%; max-width: 350px; height: 100%; background: #0d1117; z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-left: 1px solid #1f2937; }
        #sideDrawer.open { right: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 999; }
        .overlay.active { display: block; }

        /* POCKET OPTION TOGGLE */
        .toggle-container { background: #161b22; padding: 4px; border-radius: 10px; display: flex; width: 130px; }
        .toggle-btn { flex: 1; text-align: center; font-size: 9px; font-weight: 900; padding: 6px 0; border-radius: 8px; cursor: pointer; }
        .toggle-btn.active { background: #4f46e5; color: white; }

        /* UPLOAD GRID */
        .upload-slot { position: relative; height: 110px; border: 2px dashed #1f2937; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0d1117; }
        .file-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 10; }
        .tick { display: none; color: #10b981; font-size: 24px; }
        input:valid ~ .tick { display: block; }
        input:valid ~ span { display: none; }

        /* ANALYSIS RESULT AREA (PRE-POPUP STYLE) */
        .result-card { background: #0d1117; border: 1px solid #1f2937; border-radius: 24px; display: none; }
        .result-card.active { display: block; animation: fadeInUp 0.5s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="overlay" onclick="toggleDrawer()"></div>

    <div id="sideDrawer" class="p-8">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-lg font-black italic uppercase">Account Settings</h2>
            <button onclick="toggleDrawer()"><i class="fas fa-times"></i></button>
        </div>
        <div class="space-y-6">
            <div>
                <label class="text-[9px] font-black text-slate-500 uppercase block mb-2">XM Balance ($)</label>
                <input type="number" id="balIn" value="10058.73" class="w-full bg-black border border-slate-800 p-4 rounded-xl text-sm outline-none focus:border-indigo-500">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[9px] font-black text-slate-500 uppercase block mb-2">Risk (%)</label>
                    <input type="number" id="riskIn" value="1" class="w-full bg-black border border-slate-800 p-4 rounded-xl text-sm">
                </div>
                <div>
                    <label class="text-[9px] font-black text-slate-500 uppercase block mb-2">RR Ratio</label>
                    <input type="number" id="rrIn" value="2" class="w-full bg-black border border-slate-800 p-4 rounded-xl text-sm">
                </div>
            </div>
            <button onclick="saveAcc()" class="w-full bg-indigo-600 py-4 rounded-xl font-black uppercase text-[10px] tracking-widest mt-4">Save Configuration</button>
        </div>
    </div>

    <main class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <div class="toggle-container mb-4">
                    <div id="mBtn" class="toggle-btn active" onclick="setMode('manual')">MANUAL</div>
                    <div id="lBtn" class="toggle-btn" onclick="setMode('live')">LIVE</div>
                </div>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase leading-none">Omni-Trader</h1>
            </div>
            <button onclick="toggleDrawer()" class="h-12 w-12 bg-slate-900 border border-slate-800 rounded-xl flex items-center justify-center">
                <i class="fas fa-wallet text-indigo-500"></i>
            </button>
        </header>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-8">
            <div class="upload-slot"><input type="file" class="file-input" required><span class="text-[8px] font-black text-slate-500 uppercase">4H Bias</span><i class="fas fa-check-circle tick"></i></div>
            <div class="upload-slot"><input type="file" class="file-input" required><span class="text-[8px] font-black text-slate-500 uppercase">1H Setup</span><i class="fas fa-check-circle tick"></i></div>
            <div class="upload-slot"><input type="file" class="file-input" required><span class="text-[8px] font-black text-slate-500 uppercase">M15 Entry</span><i class="fas fa-check-circle tick"></i></div>
            <div class="upload-slot"><input type="file" class="file-input" required><span class="text-[8px] font-black text-slate-500 uppercase">DXY/Vol</span><i class="fas fa-check-circle tick"></i></div>
        </div>

        <button onclick="runAnalysis()" class="w-full bg-indigo-600 py-6 rounded-2xl font-black uppercase tracking-[0.4em] mb-12 shadow-lg shadow-indigo-900/20">
            Analyze the Chart
        </button>

        <div id="resBox" class="result-card p-8">
            <div class="flex justify-between items-start mb-8">
                <div>
                    <span class="text-[10px] font-black text-indigo-500 uppercase tracking-widest">Signal Detected</span>
                    <h2 id="resType" class="text-6xl font-black italic uppercase">BUY</h2>
                </div>
                <div class="text-right">
                    <span class="text-[9px] text-slate-500 font-black uppercase">Balance Used</span>
                    <b id="dispBal" class="block text-white">$10,058.73</b>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-3 gap-6 border-y border-slate-800 py-8 mb-8">
                <div><span class="text-[8px] text-slate-500 font-black uppercase">Support :</span><b id="resSup" class="block text-lg mt-1">---</b></div>
                <div><span class="text-[8px] text-slate-500 font-black uppercase">Resistance :</span><b id="resRes" class="block text-lg mt-1">---</b></div>
                <div><span class="text-[8px] text-slate-500 font-black uppercase">Entry :</span><b id="resEnt" class="block text-lg mt-1 text-indigo-400">---</b></div>
                <div><span class="text-[8px] text-slate-500 font-black uppercase">TP (1:2) :</span><b id="resTp" class="block text-lg mt-1 text-emerald-400">---</b></div>
                <div><span class="text-[8px] text-slate-500 font-black uppercase">SL :</span><b id="resSl" class="block text-lg mt-1 text-rose-400">---</b></div>
                <div><span class="text-[8px] text-slate-500 font-black uppercase">Lots :</span><b id="resLots" class="block text-lg mt-1">---</b></div>
            </div>

            <div class="bg-indigo-950/10 p-5 rounded-2xl border border-indigo-500/10">
                <span class="text-[9px] text-indigo-400 font-black uppercase block mb-1">Trade Logic:</span>
                <p id="resLogic" class="text-xs text-slate-400 italic leading-relaxed"></p>
            </div>
        </div>

        <section class="mt-12">
            <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6">Recent Executions</h3>
            <div id="historyLog" class="space-y-3">
                </div>
        </section>
    </main>

    <script>
        function toggleDrawer() {
            document.getElementById('sideDrawer').classList.toggle('open');
            document.querySelector('.overlay').classList.toggle('active');
        }

        function setMode(m) {
            document.getElementById('mBtn').classList.toggle('active', m==='manual');
            document.getElementById('lBtn').classList.toggle('active', m==='live');
        }

        function runAnalysis() {
            const bal = document.getElementById('balIn').value;
            const data = {
                type: "BUY", sup: "75,800", res: "78,500", ent: "76,491", tp: "77,875", sl: "75,800", lots: "0.45",
                logic: "Price retested M15 liquidity. 4H trend is bullish. Entry confirmed at structural floor."
            };

            document.getElementById('resType').innerText = data.type;
            document.getElementById('resSup').innerText = data.sup;
            document.getElementById('resRes').innerText = data.res;
            document.getElementById('resEnt').innerText = data.ent;
            document.getElementById('resTp').innerText = data.tp;
            document.getElementById('resSl').innerText = data.sl;
            document.getElementById('resLots').innerText = data.lots;
            document.getElementById('resLogic').innerText = data.logic;
            document.getElementById('dispBal').innerText = "$" + bal;

            document.getElementById('resBox').classList.add('active');
            addLog(data);
        }

        function addLog(d) {
            const log = document.getElementById('historyLog');
            const item = document.createElement('div');
            item.className = "flex justify-between items-center bg-[#0d1117] border border-slate-800 p-4 rounded-xl";
            item.innerHTML = `
                <div><b class="text-xs uppercase text-white">BTC/USD</b><span class="block text-[9px] text-slate-600">Manual Execution</span></div>
                <div class="text-right"><b class="text-xs ${d.type==='BUY'?'text-emerald-500':'text-rose-500'}">${d.type}</b><span class="block text-[9px] text-slate-500">${d.lots} Lots</span></div>
            `;
            log.prepend(item);
        }

        function saveAcc() { alert('Settings Updated!'); toggleDrawer(); }
    </script>
</body>
</html>
