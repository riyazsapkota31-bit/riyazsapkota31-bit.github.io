<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OMNI-BLACK | HYPER-GLOW</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --primary: #00d2ff; 
            --secondary: #92fe9d; 
            --accent: #ff00c1;
            --glass: rgba(255, 255, 255, 0.05);
        }
        
        body { 
            background: radial-gradient(circle at 50% 0%, #0a0b1e 0%, #000 100%); 
            color: #fff; font-family: 'Inter', sans-serif; 
            padding: 24px; min-height: 100vh; -webkit-font-smoothing: antialiased;
        }

        /* ✨ HYPER-ATTRACTIVE LOGO ✨ */
        .brand-logo {
            font-size: 3rem; font-weight: 900; font-style: italic; letter-spacing: -0.04em;
            color: #fff; text-align: center;
            text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary), 0 0 40px var(--primary);
            filter: brightness(1.2);
        }

        /* 🧪 GLASSMORPHISM CARDS 🧪 */
        .glass-box {
            background: var(--glass);
            backdrop-filter: blur(15px) saturate(150%);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            transition: all 0.5s ease;
        }

        /* ⚡️ GLOWING UPLOAD TILES ⚡️ */
        .upload-tile {
            position: relative; height: 150px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; overflow: hidden;
        }

        .upload-tile i { 
            font-size: 2.5rem; color: rgba(255,255,255,0.2); 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        /* SUCCESS GLOW STATE */
        .has-file {
            border: 1px solid var(--primary) !important;
            background: rgba(0, 210, 255, 0.1) !important;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4), inset 0 0 15px rgba(0, 210, 255, 0.1);
        }
        
        .has-file i { 
            color: var(--primary); 
            text-shadow: 0 0 15px var(--primary); 
            transform: scale(1.1) translateY(-5px); 
        }

        .has-file p { color: #fff !important; font-weight: 800; }

        /* 🚀 THE "EINSTEIN" BUTTON 🚀 */
        .btn-hyper {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: #000; font-weight: 900; text-transform: uppercase;
            letter-spacing: 0.3em; padding: 24px; border-radius: 20px;
            width: 100%; margin-top: 30px; transition: 0.3s;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.4);
        }

        .btn-hyper:active { transform: scale(0.95); box-shadow: 0 0 10px rgba(0, 210, 255, 0.2); }

        .label-style { font-size: 10px; font-weight: 800; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.2em; margin-top: 12px; }

        /* SETTINGS GEAR GLOW */
        .gear-btn {
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
            border-radius: 18px; color: var(--primary); font-size: 1.2rem;
            box-shadow: inset 0 0 10px rgba(0, 210, 255, 0.2);
        }
    </style>
</head>
<body>

    <header class="flex justify-between items-center mb-12 mt-4">
        <button onclick="toggleSettings()" class="glass-box gear-btn">
            <i class="fa-solid fa-microchip"></i>
        </button>
        <div class="flex-1 text-right">
            <h1 class="brand-logo">OMNI—BLACK</h1>
            <p class="text-[10px] font-bold text-cyan-400 tracking-[0.4em] uppercase opacity-70">Quant Terminal V2.8</p>
        </div>
    </header>

    <div class="grid grid-cols-2 gap-6">
        <div id="box0" class="glass-box upload-tile" onclick="document.getElementById('i0').click()">
            <input type="file" id="i0" hidden accept="image/*" onchange="sync(0)">
            <i class="fa-solid fa-satellite-dish"></i>
            <p class="label-style">1H Context</p>
        </div>
        <div id="box1" class="glass-box upload-tile" onclick="document.getElementById('i1').click()">
            <input type="file" id="i1" hidden accept="image/*" onchange="sync(1)">
            <i class="fa-solid fa-eye"></i>
            <p class="label-style">15M Macro</p>
        </div>
        <div id="box2" class="glass-box upload-tile" onclick="document.getElementById('i2').click()">
            <input type="file" id="i2" hidden accept="image/*" onchange="sync(2)">
            <i class="fa-solid fa-bolt-lightning"></i>
            <p class="label-style">1M Trigger</p>
        </div>
        <div id="box3" class="glass-box upload-tile" onclick="document.getElementById('i3').click()">
            <input type="file" id="i3" hidden accept="image/*" onchange="sync(3)">
            <i class="fa-solid fa-chart-line"></i>
            <p class="label-style">DXY Sync</p>
        </div>
    </div>

    <button id="goBtn" onclick="executeSurgicalScan()" class="btn-hyper">Execute Command</button>

    <div id="outPanel" class="hidden mt-16 pb-40 space-y-12">
        <div class="text-center">
            <h2 id="biasTxt" class="text-9xl font-black italic tracking-tighter" style="filter: drop-shadow(0 0 30px currentColor);"></h2>
        </div>
        
        <div class="grid grid-cols-2 glass-box overflow-hidden">
            <div class="p-8 text-center border-r border-white/10">
                <p class="label-style text-cyan-400 mb-2">Entry</p>
                <p id="entVal" class="text-4xl font-bold font-mono text-white">--</p>
            </div>
            <div class="p-8 text-center">
                <p class="label-style text-cyan-400 mb-2">Lots</p>
                <p id="lotVal" class="text-4xl font-bold font-mono text-white">--</p>
            </div>
            <div class="p-8 text-center border-t border-white/10 border-r">
                <p class="label-style text-rose-500 mb-2">Stop Loss</p>
                <p id="slVal" class="text-4xl font-bold font-mono text-rose-500">--</p>
            </div>
            <div class="p-8 text-center border-t border-white/10">
                <p class="label-style text-emerald-400 mb-2">Take Profit</p>
                <p id="tpVal" class="text-4xl font-bold font-mono text-emerald-400">--</p>
            </div>
        </div>

        <div class="glass-box p-10 border-l-[12px] border-cyan-500">
            <p id="logicSummary" class="text-2xl text-slate-100 leading-snug italic font-bold tracking-tight"></p>
        </div>
    </div>

    <div id="settingsModal" class="fixed inset-0 bg-black/80 z-50 hidden flex-col items-center justify-center p-8 backdrop-blur-xl">
        <div class="w-full max-w-sm glass-box p-10 border-cyan-500/30 border">
            <h3 class="text-center font-black italic mb-10 tracking-tighter text-white text-2xl">SYSTEM CORE</h3>
            <input type="password" id="kIn" placeholder="API KEY" class="bg-black/50 border border-white/10 rounded-2xl w-full mb-4 p-5 text-sm outline-none text-cyan-400 font-mono">
            <div class="grid grid-cols-2 gap-4">
                <input type="number" id="bIn" placeholder="BAL ($)" class="bg-black/50 border border-white/10 rounded-2xl p-5 text-sm outline-none">
                <input type="number" id="rIn" placeholder="RISK %" class="bg-black/50 border border-white/10 rounded-2xl p-5 text-sm outline-none">
            </div>
            <button onclick="saveConfig()" class="btn-hyper mt-8 text-xs py-5">Link Neural Engine</button>
            <p class="text-center text-[10px] mt-10 text-slate-500 font-black uppercase cursor-pointer tracking-widest" onclick="toggleSettings()">Return to Dashboard</p>
        </div>
    </div>

    <script src="strategies.js"></script>
    <script>
        function toggleSettings() {
            const m = document.getElementById('settingsModal');
            m.classList.toggle('hidden'); m.classList.toggle('flex');
        }
        function sync(i) {
            const f = document.getElementById(`i${i}`).files[0];
            if(f) {
                document.getElementById(`box${i}`).classList.add('has-file');
                if (typeof files !== 'undefined') files[i] = f;
            }
        }
    </script>
</body>
</html>
