<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Trader Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #05070a; color: #e2e8f0; margin: 0; }
        .glass { background: #0d1117; border: 1px solid #1f2937; border-radius: 24px; }
        .main-container { width: 95%; max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* UPLOAD GRID: Responsive 4-col desktop, 2-col mobile */
        .upload-grid { display: grid; gap: 16px; margin-top: 40px; }
        @media (min-width: 1024px) { .upload-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 1023px) { .upload-grid { grid-template-columns: repeat(2, 1fr); } }

        .upload-box { position: relative; height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0d1117; border: 1px solid #1f2937; border-radius: 24px; }
        .box-label { font-size: 11px; font-weight: 900; color: #fff; text-transform: uppercase; margin-bottom: 8px; }
        .btn-ui { background: #4f46e5; color: white; padding: 6px 14px; border-radius: 6px; font-size: 10px; font-weight: 800; pointer-events: none; }
        .file-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 10; }
        .tick { display: none; color: #10b981; font-size: 32px; }
        input:valid ~ .btn-ui, input:valid ~ .box-label { display: none; }
        input:valid ~ .tick { display: block; }

        /* JOURNAL FORMAT RESULT */
        .result-card { background: #0d1117; border: 1px solid #1f2937; border-radius: 40px; padding: 40px; margin-top: 30px; }
        .action-label { font-size: 10px; font-weight: 900; color: #6366f1; text-transform: uppercase; letter-spacing: 2px; }
        .action-main { font-size: 72px; font-weight: 900; font-style: italic; text-transform: uppercase; line-height: 1; }
        
        .journal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; border-top: 1px solid #1f2937; padding-top: 25px; margin-top: 25px; }
        .j-item span { display: block; font-size: 10px; color: #64748b; font-weight: 900; text-transform: uppercase; margin-bottom: 4px; }
        .j-item b { font-size: 18px; color: #fff; }
        .logic-box { background: #161b22; padding: 20px; border-radius: 20px; margin-top: 20px; border: 1px dashed #1f2937; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <main class="main-container">
        <header class="flex justify-between items-center py-12">
            <h1 class="text-4xl md:text-6xl font-black italic text-white uppercase tracking-tighter leading-none">OMNI-TRADER</h1>
        </header>

        <div class="upload-grid">
            <div class="upload-box"><input type="file" class="file-input" required><div class="box-label">4H Bias</div><div class="btn-ui">Upload</div><i class="fas fa-check-circle tick"></i></div>
            <div class="upload-box"><input type="file" class="file-input" required><div class="box-label">1H Structure</div><div class="btn-ui">Upload</div><i class="fas fa-check-circle tick"></i></div>
            <div class="upload-box"><input type="file" class="file-input" required><div class="box-label">M15 Entry</div><div class="btn-ui">Upload</div><i class="fas fa-check-circle tick"></i></div>
            <div class="upload-box"><input type="file" class="file-input" required><div class="box-label">DXY Context</div><div class="btn-ui">Upload</div><i class="fas fa-check-circle tick"></i></div>
        </div>

        <button onclick="executeScan()" class="w-full mt-12 bg-indigo-600 py-8 rounded-[32px] font-black uppercase tracking-[0.5em] hover:bg-indigo-500 transition-all">Analyze the Chart</button>

        <div id="resultBox" class="hidden">
            <div class="result-card">
                <span class="action-label">System Recommendation</span>
                <h2 id="tradeAction" class="action-main text-white">---</h2>
                
                <div class="logic-box">
                    <span class="text-[10px] font-black text-indigo-400 uppercase block mb-1">Trade Logic :</span>
                    <p id="tradeLogic" class="text-xs text-slate-400 leading-relaxed italic"></p>
                </div>

                <div class="journal-grid">
                    <div class="j-item"><span>Support :</span><b id="supVal">---</b></div>
                    <div class="j-item"><span>Resistance :</span><b id="resVal">---</b></div>
                    <div class="j-item"><span>Entry :</span><b id="entVal" class="text-indigo-400">---</b></div>
                    <div class="j-item"><span>TP :</span><b id="tpVal" class="text-emerald-400">---</b></div>
                    <div class="j-item"><span>SL :</span><b id="slVal" class="text-rose-400">---</b></div>
                    <div class="j-item"><span>Optimal Lots :</span><b id="lotVal">0.00</b></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function executeScan() {
            const res = document.getElementById('resultBox');
            res.classList.remove('hidden');
            
            // This is where the Gemini AI data would fill in
            document.getElementById('tradeAction').innerText = "BUY";
            document.getElementById('supVal').innerText = "88.10";
            document.getElementById('resVal').innerText = "92.40";
            document.getElementById('entVal').innerText = "88.68 (Market)";
            document.getElementById('tpVal').innerText = "90.50";
            document.getElementById('slVal').innerText = "88.00";
            document.getElementById('lotVal').innerText = "0.45";
            document.getElementById('tradeLogic').innerText = "Strong 4H Demand hold + M15 BOS confirmed. DXY rejection at daily resistance suggests USD weakness.";
        }
    </script>
</body>
</html>
