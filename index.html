<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI-REAL | INFINITY SCALPER V8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glow-text { text-shadow: 0 0 20px rgba(16, 185, 129, 0.3); }
        .glass-card { background: rgba(15, 15, 25, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; transition: all 0.3s ease; }
        .has-file { border-color: #10b981 !important; box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); }
        #sideDrawer { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100; }
        #sideDrawer.open { transform: translateX(0); }
    </style>
</head>
<body class="p-4 pb-24">

    <div class="flex justify-between items-center mb-10 mt-4 px-2">
        <div>
            <h1 class="text-3xl font-black tracking-tighter italic text-slate-100 uppercase">OMNI–REAL</h1>
            <p class="text-[10px] uppercase tracking-[0.2em] font-bold text-emerald-500 flex items-center">
                <span class="w-2 h-2 bg-emerald-500 rounded-full mr-2 animate-pulse"></span>
                Infinity Scalper V8
            </p>
        </div>
        <button onclick="toggleDrawer()" class="w-12 h-12 glass-card flex items-center justify-center text-slate-400 active:scale-90">
            <i class="fa-solid fa-sliders text-xl"></i>
        </button>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-10">
        <div id="box0" onclick="document.getElementById('img0').click()" class="glass-card aspect-square flex flex-col items-center justify-center border-2 border-dashed border-slate-800 relative">
            <input type="file" id="img0" class="hidden" accept="image/*" onchange="markFile(0)">
            <i id="icon0" class="fa-solid fa-circle-check text-3xl text-emerald-500 hidden"></i>
            <span id="label0" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest text-center px-2">HTF Bias (1H)</span>
        </div>
        <div id="box1" onclick="document.getElementById('img1').click()" class="glass-card aspect-square flex flex-col items-center justify-center border-2 border-dashed border-slate-800 relative">
            <input type="file" id="img1" class="hidden" accept="image/*" onchange="markFile(1)">
            <i id="icon1" class="fa-solid fa-circle-check text-3xl text-emerald-500 hidden"></i>
            <span id="label1" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest text-center px-2">LTF Struct (15M)</span>
        </div>
        <div id="box2" onclick="document.getElementById('img2').click()" class="glass-card aspect-square flex flex-col items-center justify-center border-2 border-dashed border-slate-800 relative">
            <input type="file" id="img2" class="hidden" accept="image/*" onchange="markFile(2)">
            <i id="icon2" class="fa-solid fa-circle-check text-3xl text-emerald-500 hidden"></i>
            <span id="label2" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest text-center px-2">Entry (1M)</span>
        </div>
        <div id="box3" onclick="document.getElementById('img3').click()" class="glass-card aspect-square flex flex-col items-center justify-center border-2 border-dashed border-slate-800 relative">
            <input type="file" id="img3" class="hidden" accept="image/*" onchange="markFile(3)">
            <i id="icon3" class="fa-solid fa-circle-check text-3xl text-emerald-500 hidden"></i>
            <span id="label3" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest text-center px-2">DXY DATA</span>
        </div>
    </div>

    <button id="scanBtn" onclick="executeScan()" class="w-full py-6 rounded-full bg-indigo-600 font-black uppercase tracking-widest text-sm shadow-2xl active:scale-95 transition-all mb-10">
        Perform Multi-Chart Scan
    </button>

    <div id="resultBox" class="hidden space-y-4">
        <div class="glass-card p-8 text-center border-t-2 border-indigo-500/30">
            <div class="mb-6">
                <p id="strategyText" class="text-[10px] uppercase font-black tracking-[0.3em] text-indigo-400 mb-2">Analysis Results</p>
                <div class="w-full h-1 bg-slate-800 rounded-full overflow-hidden mx-auto max-w-[150px]">
                    <div id="scoreBar" class="h-full bg-indigo-500 transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>

            <h2 id="actionText" class="text-5xl font-extrabold italic mb-10 glow-text uppercase">---</h2>
            
            <div class="grid grid-cols-2 gap-6 text-left border-t border-slate-800 pt-8">
                <div>
                    <p class="text-[9px] uppercase font-bold text-slate-500 tracking-widest mb-1">Execution</p>
                    <p id="entText" class="font-mono text-xl text-slate-200">---</p>
                </div>
                <div>
                    <p class="text-[9px] uppercase font-bold text-slate-500 tracking-widest mb-1">Hard Stop</p>
                    <p id="slText" class="font-mono text-xl text-rose-400">---</p>
                </div>
                <div>
                    <p class="text-[9px] uppercase font-bold text-slate-500 tracking-widest mb-1">Target</p>
                    <p id="tpText" class="font-mono text-xl text-emerald-400">---</p>
                </div>
                <div>
                    <p class="text-[9px] uppercase font-bold text-slate-500 tracking-widest mb-1">Lot Size</p>
                    <p id="lotText" class="font-mono text-xl text-amber-400">---</p>
                </div>
            </div>
        </div>

        <div class="glass-card p-6">
            <p id="logicText" class="text-xs leading-relaxed text-slate-400 italic">Standby...</p>
        </div>
    </div>

    <div id="overlay" onclick="toggleDrawer()" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden"></div>
    <div id="sideDrawer" class="fixed top-0 right-0 h-full w-[85%] bg-[#0a0a0f] border-l border-slate-800 p-6 transform translate-x-full overflow-hidden">
        <h3 class="text-xl font-black italic text-slate-300 uppercase mb-10">Master Control</h3>
        <div class="space-y-6">
            <div class="glass-card p-5">
                <input type="password" id="apiInput" placeholder="ENTER ACCESS KEY..." class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-xs outline-none mb-4">
                <button id="lockBtn" onclick="saveApiKey()" class="w-full py-3 bg-indigo-600 rounded-xl text-[10px] font-bold uppercase">Sync Terminal</button>
                <button id="editBtn" onclick="enableEdit()" class="hidden w-full py-3 bg-slate-800 rounded-xl text-[10px] font-bold uppercase">Edit Link</button>
            </div>
            <div class="glass-card p-5 space-y-4">
                <div>
                    <label class="text-[9px] uppercase font-bold text-slate-500 mb-2 block">Instrument</label>
                    <select id="instrument" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-xs text-slate-300 outline-none">
                        <option value="GOLD">XAUUSD (GOLD)</option>
                        <option value="BTC">BTCUSD (BITCOIN)</option>
                        <option value="FOREX">FOREX PAIRS</option>
                    </select>
                </div>
                <div>
                    <label class="text-[9px] uppercase font-bold text-slate-500 mb-2 block">Balance (USD)</label>
                    <input type="number" id="bal" value="10000" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-xs outline-none">
                </div>
                <div>
                    <label class="text-[9px] uppercase font-bold text-slate-500 mb-2 block">Risk %</label>
                    <input type="number" id="risk" value="1" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-xs outline-none">
                </div>
            </div>
        </div>
    </div>

    <script src="strategies.js"></script>
</body>
</html>
