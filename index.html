<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OMNI-BLACK | BALANCED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --cyan: #00f2ff; 
            /* Reduced intensity from 0.4 to 0.25 for a subtler look */
            --blue-glow: rgba(0, 242, 255, 0.25);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --border-glow: rgba(255, 255, 255, 0.08);
        }
        
        body { 
            background: radial-gradient(circle at 50% 10%, #0d1117 0%, #000 100%); 
            color: #fff; font-family: 'Inter', sans-serif; 
            padding: 20px; min-height: 100vh; overflow-x: hidden;
        }

        /* ✨ LOGO (SHIFTED LEFT + REDUCED GLOW) ✨ */
        .brand-container {
            display: flex; flex-direction: column; align-items: flex-start;
        }
        .logo-text {
            font-size: 2.8rem; font-weight: 900; font-style: italic; letter-spacing: -0.05em;
            color: #fff; line-height: 1;
            /* Softer text shadow for less intensity */
            text-shadow: 0 0 12px var(--blue-glow);
            -webkit-text-stroke: 0.5px rgba(0, 242, 255, 0.5);
        }

        /* 🧪 GLASSMORPHISM 🧪 */
        .glass-terminal {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glow);
            border-radius: 35px;
        }

        /* ⚡️ UPLOAD CARDS ⚡️ */
        .upload-card {
            height: 155px; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            border-radius: 28px; background: rgba(255,255,255,0.01);
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.4s ease-out;
        }

        .upload-card i { font-size: 2rem; color: rgba(255,255,255,0.1); margin-bottom: 12px; }

        /* UPLOADED STATE (REDUCED INTENSITY) [Ref: 1000040692.jpg] */
        .has-file {
            border: 1.5px solid var(--cyan) !important;
            background: rgba(0, 242, 255, 0.03) !important;
            /* Softened shadow to be less distracting */
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }
        .has-file i { color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }
        .has-file p { color: #fff !important; font-weight: 700; opacity: 1; }

        .btn-command {
            background: #fff; color: #000; font-weight: 900;
            text-transform: uppercase; letter-spacing: 0.4em;
            padding: 24px; border-radius: 22px; width: 100%;
            margin-top: 30px; transition: 0.3s;
        }

        .label-vibrant { font-size: 10px; font-weight: 800; color: rgba(255,255,255,0.25); letter-spacing: 0.2em; text-transform: uppercase; }

        /* CORE LINK (SHIFTED RIGHT) [Ref: 1000040681.jpg] */
        .settings-trigger {
            background: var(--glass-bg); border: 1px solid var(--border-glow);
            width: 50px; height: 50px; border-radius: 18px; display: flex; align-items: center; justify-content: center;
            color: var(--cyan); transition: 0.3s;
        }
        .settings-trigger:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <header class="flex justify-between items-center mb-10 pt-4 px-2">
        <div class="brand-container">
            <h1 class="logo-text">OMNI—BLACK</h1>
            <p class="text-[9px] font-black tracking-[0.4em] text-cyan-400 opacity-50 uppercase ml-1">Precision Scan</p>
        </div>
        <button onclick="toggleSettings()" class="settings-trigger">
            <i class="fa-solid fa-sliders text-xl"></i>
        </button>
    </header>

    <div class="grid grid-cols-2 gap-5">
        <div id="box0" class="upload-card" onclick="document.getElementById('i0').click()">
            <input type="file" id="i0" hidden accept="image/*" onchange="sync(0)">
            <i class="fa-solid fa-chart-pie"></i>
            <p class="label-vibrant">1H Context</p>
        </div>
        <div id="box1" class="upload-card" onclick="document.getElementById('i1').click()">
            <input type="file" id="i1" hidden accept="image/*" onchange="sync(1)">
            <i class="fa-solid fa-microscope"></i>
            <p class="label-vibrant">15M Macro</p>
        </div>
        <div id="box2" class="upload-card" onclick="document.getElementById('i2').click()">
            <input type="file" id="i2" hidden accept="image/*" onchange="sync(2)">
            <i class="fa-solid fa-bolt"></i>
            <p class="label-vibrant">1M Trigger</p>
        </div>
        <div id="box3" class="upload-card" onclick="document.getElementById('i3').click()">
            <input type="file" id="i3" hidden accept="image/*" onchange="sync(3)">
            <i class="fa-solid fa-wave-square"></i>
            <p class="label-vibrant">DXY Sync</p>
        </div>
    </div>

    <button id="goBtn" onclick="executeSurgicalScan()" class="btn-command">Execute Command</button>

    <div id="outPanel" class="hidden mt-12 pb-40 space-y-6">
        <div class="text-center mb-10">
            <h2 id="biasTxt" class="text-8xl font-black italic tracking-tighter" style="filter: drop-shadow(0 0 25px currentColor);"></h2>
        </div>
        
        <div class="grid grid-cols-2 glass-terminal overflow-hidden border border-white/5">
            <div class="p-8 text-center border-r border-white/5">
                <p class="label-vibrant mb-1">Execution</p>
                <p id="entVal" class="text-3xl font-bold font-mono">--</p>
            </div>
            <div class="p-8 text-center">
                <p class="label-vibrant mb-1">Lot Size</p>
                <p id="lotVal" class="text-3xl font-bold font-mono text-cyan-400">--</p>
            </div>
            <div class="p-8 text-center border-t border-white/5 border-r">
                <p class="label-vibrant mb-1 text-rose-500/50">Stop Loss</p>
                <p id="slVal" class="text-3xl font-bold font-mono text-rose-500">--</p>
            </div>
            <div class="p-8 text-center border-t border-white/5">
                <p class="label-vibrant mb-1 text-emerald-400/50">Target</p>
                <p id="tpVal" class="text-3xl font-bold font-mono text-emerald-400">--</p>
            </div>
        </div>

        <div class="glass-terminal p-8 border-l-[6px] border-cyan-500/50">
            <p id="logicSummary" class="text-lg text-slate-300 leading-relaxed italic font-medium"></p>
        </div>
    </div>

    <div id="settingsModal" class="fixed inset-0 bg-black/90 z-50 hidden flex-col items-center justify-center p-8 backdrop-blur-3xl">
        <div class="w-full max-w-sm glass-terminal p-10 border-white/5 border">
            <h3 class="text-center font-black italic mb-10 tracking-tighter text-white text-xl">SYSTEM CORE</h3>
            <input type="password" id="kIn" placeholder="API KEY" class="bg-black/40 border border-white/10 rounded-2xl w-full mb-4 p-5 text-sm outline-none text-cyan-400 font-mono">
            <div class="grid grid-cols-2 gap-4">
                <input type="number" id="bIn" placeholder="BAL" class="bg-black/40 border border-white/10 rounded-2xl p-5 text-sm outline-none">
                <input type="number" id="rIn" placeholder="RISK %" class="bg-black/40 border border-white/10 rounded-2xl p-5 text-sm outline-none">
            </div>
            <button onclick="saveConfig()" class="btn-command mt-8 text-[10px] py-5">Sync Hardware</button>
            <p class="text-center text-[10px] mt-10 text-slate-600 font-bold uppercase cursor-pointer" onclick="toggleSettings()">Close Settings</p>
        </div>
    </div>

    <script src="strategies.js"></script>
    <script>
        function toggleSettings() {
            const m = document.getElementById('settingsModal');
            m.classList.toggle('hidden'); m.classList.toggle('flex');
        }
        function sync(i) {
            const f = document.getElementById(`i${i}`).files[0];
            if(f) {
                document.getElementById(`box${i}`).classList.add('has-file');
                if (typeof files !== 'undefined') files[i] = f;
            }
        }
    </script>
</body>
</html>
