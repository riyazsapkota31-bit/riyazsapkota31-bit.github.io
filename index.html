<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OMNI-BLACK | FINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; padding: 20px; -webkit-font-smoothing: antialiased; }
        .glass-panel { background: rgba(10, 10, 10, 0.9); border: 1px solid rgba(255,255,255,0.08); border-radius: 35px; backdrop-filter: blur(15px); }
        .tier-card { border: 2px dashed #222; border-radius: 32px; min-height: 155px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; position: relative; }
        .has-file { border: 2.5px solid #6366f1; background: rgba(99, 102, 241, 0.08); box-shadow: 0 0 40px rgba(99, 102, 241, 0.15); }
        .glow-bias { text-shadow: 0 0 60px currentColor; font-size: clamp(5.5rem, 20vw, 9rem); font-weight: 900; letter-spacing: -0.06em; font-style: italic; line-height: 1; }
        .btn-exec { background: #fff; color: #000; border-radius: 28px; padding: 24px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; transition: 0.2s; box-shadow: 0 20px 40px rgba(255,255,255,0.1); }
        .btn-exec:active { transform: scale(0.95); filter: brightness(0.9); }
        .status-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.1); } }
    </style>
</head>
<body>

    <header class="flex justify-between items-center mb-8 px-2">
        <div>
            <h1 class="text-3xl font-black italic tracking-tighter leading-none">OMNI-BLACK</h1>
            <p id="riskHeader" class="text-[10px] font-bold text-indigo-500 uppercase tracking-[0.5em] mt-2">Tactical Link: Active</p>
        </div>
        <div id="statusDot" class="w-4 h-4 rounded-full bg-rose-600 shadow-[0_0_20px_#e11d48]"></div>
    </header>

    <div class="glass-panel p-6 mb-8 text-center border-l-8 border-indigo-600">
        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1">Current Bias Matrix</p>
        <h2 id="pairName" class="text-2xl font-black italic tracking-tighter text-white uppercase">[ System Standby ]</h2>
    </div>

    <div class="grid grid-cols-2 gap-5 mb-8">
        <div id="box0" class="tier-card" onclick="document.getElementById('i0').click()">
            <input type="file" id="i0" hidden accept="image/*" onchange="sync(0)">
            <i class="fa-solid fa-compass text-slate-700 text-3xl mb-2" id="ic0"></i>
            <p class="text-[10px] font-black text-slate-500 uppercase tracking-wider">1H Context</p>
        </div>
        <div id="box1" class="tier-card" onclick="document.getElementById('i1').click()">
            <input type="file" id="i1" hidden accept="image/*" onchange="sync(1)">
            <i class="fa-solid fa-layer-group text-slate-700 text-3xl mb-2" id="ic1"></i>
            <p class="text-[10px] font-black text-slate-500 uppercase tracking-wider">15M Struct</p>
        </div>
        <div id="box2" class="tier-card" onclick="document.getElementById('i2').click()">
            <input type="file" id="i2" hidden accept="image/*" onchange="sync(2)">
            <i class="fa-solid fa-crosshairs text-slate-700 text-3xl mb-2" id="ic2"></i>
            <p class="text-[10px] font-black text-slate-500 uppercase tracking-wider">1M Entry</p>
        </div>
        <div id="box3" class="tier-card" onclick="document.getElementById('i3').click()">
            <input type="file" id="i3" hidden accept="image/*" onchange="sync(3)">
            <i class="fa-solid fa-chart-line text-slate-700 text-3xl mb-2" id="ic3"></i>
            <p class="text-[10px] font-black text-slate-500 uppercase tracking-wider">DXY Index</p>
        </div>
    </div>

    <button id="goBtn" onclick="executeSurgicalScan()" class="btn-exec w-full mb-10">Execute A+ Scan</button>

    <div id="outPanel" class="hidden space-y-10 pb-24 animate-in fade-in slide-in-from-bottom-5 duration-500">
        <div id="waitMsg" class="hidden py-5 rounded-[30px] bg-amber-500/10 border-2 border-amber-500/20 text-center text-amber-500 font-black italic text-3xl tracking-tighter"></div>
        <div class="text-center"><h2 id="biasTxt" class="glow-bias"></h2></div>
        
        <div class="grid grid-cols-2 gap-5 text-center border-y border-white/5 py-10">
            <div><p class="text-[11px] text-slate-500 font-black uppercase mb-2">Entry</p><p id="entVal" class="text-4xl font-mono tracking-tighter">--</p></div>
            <div><p class="text-[11px] text-slate-500 font-black uppercase mb-2">Lots</p><p id="lotVal" class="text-4xl font-mono tracking-tighter text-indigo-400">--</p></div>
            <div><p class="text-[11px] text-slate-500 font-black uppercase mb-2">Stop</p><p id="slVal" class="text-4xl font-mono tracking-tighter text-rose-600">--</p></div>
            <div><p class="text-[11px] text-slate-500 font-black uppercase mb-2">Target</p><p id="tpVal" class="text-4xl font-mono tracking-tighter text-emerald-500">--</p></div>
        </div>

        <div class="p-8 glass-panel border-t-4 border-indigo-600 shadow-2xl">
            <p id="logicSummary" class="text-xl text-slate-200 leading-tight italic font-bold tracking-tight"></p>
        </div>
    </div>

    <div class="mt-20 p-8 glass-panel opacity-10 hover:opacity-100 transition-all duration-300">
        <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.5em] mb-6 text-center">System Parameters</p>
        <input type="password" id="keyIn" placeholder="Gemini API Key" class="bg-black/40 border border-white/10 rounded-2xl w-full mb-4 p-4 text-sm outline-none text-indigo-400 font-mono text-center">
        <div class="grid grid-cols-2 gap-4 mb-6">
            <input type="number" id="balIn" placeholder="Balance ($)" class="bg-black/40 border border-white/10 rounded-2xl p-4 text-center text-sm outline-none">
            <input type="number" id="rskIn" placeholder="Risk %" class="bg-black/40 border border-white/10 rounded-2xl p-4 text-center text-sm outline-none">
        </div>
        <button onclick="commitConfig()" class="w-full text-[11px] font-black uppercase text-indigo-500 tracking-[0.3em] hover:text-white transition-colors">Sync Core Engine</button>
    </div>

    <script>
        let API_KEY = localStorage.getItem('omni_key_v11') || "";
        let BALANCE = parseFloat(localStorage.getItem('omni_bal_v11')) || 1000;
        let RISK_PCT = parseFloat(localStorage.getItem('omni_risk_v11')) || 1;
        let dataTiers = [null, null, null, null];

        document.getElementById('riskHeader').innerText = `Risk: ${RISK_PCT}% | Bal: $${BALANCE}`;
        if (API_KEY) validateEngine(API_KEY);

        async function validateEngine(k) {
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.0-flash:generateContent?key=${k}`, {
                    method: 'POST', body: JSON.stringify({ contents: [{ parts: [{ text: 'ping' }] }] })
                });
                if (res.ok) { 
                    document.getElementById('statusDot').className = "w-4 h-4 rounded-full bg-emerald-500 shadow-[0_0_20px_#10b981] status-pulse"; 
                    document.getElementById('pairName').innerText = "[ ENGINE OPTIMIZED ]";
                }
            } catch (e) { document.getElementById('pairName').innerText = "[ AUTH FAILED ]"; }
        }

        function commitConfig() {
            localStorage.setItem('omni_key_v11', document.getElementById('keyIn').value.trim());
            localStorage.setItem('omni_bal_v11', document.getElementById('balIn').value || 1000);
            localStorage.setItem('omni_risk_v11', document.getElementById('rskIn').value || 1);
            location.reload();
        }

        function sync(i) {
            dataTiers[i] = document.getElementById(`i${i}`).files[0];
            document.getElementById(`box${i}`).classList.add('has-file');
            document.getElementById(`ic${i}`).className = "fa-solid fa-circle-check text-indigo-500 text-4xl mb-2";
        }

        async function executeSurgicalScan() {
            if (!API_KEY || dataTiers.includes(null)) return alert("Missing Tier Data.");
            const btn = document.getElementById('goBtn'); btn.innerHTML = `<i class="fa-solid fa-microchip fa-spin"></i> CALCULATING...`;
            
            try {
                const parts = await Promise.all(dataTiers.map(f => {
                    return new Promise(r => {
                        const rd = new FileReader(); rd.readAsDataURL(f);
                        rd.onload = () => r({ inlineData: { mimeType: f.type, data: rd.result.split(',')[1] } });
                    });
                }));

                const prompt = `Act as an Elite Real-Time Analyst. 
                SMC Strategy: Sweep -> MSS -> Entry. 
                Accuracy: A+ Precision (Verify Axis Prices).
                Logic: Exactly 10-15 words. Format: C: [Info] T: [Info] Tr: [Info]
                JSON ONLY: {"p": "PAIR", "b": "BUY|SELL|WAIT", "e": number, "s": number, "t": number, "tr": number, "l": "C: ... T: ... Tr: ..."}`;

                const req = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST', body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, ...parts] }] })
                });

                const res = JSON.parse((await req.json()).candidates[0].content.parts[0].text.match(/\{[\s\S]*\}/)[0]);
                document.getElementById('pairName').innerText = res.p;
                renderFinalResults(res);
            } catch (e) { alert("Matrix Error: Check API/Connection."); } finally { btn.innerText = "Execute A+ Scan"; }
        }

        function renderFinalResults(d) {
            document.getElementById('outPanel').classList.remove('hidden');
            const bTxt = document.getElementById('biasTxt'); const wBox = document.getElementById('waitMsg');
            bTxt.innerText = d.b;
            if (d.b === "WAIT") {
                wBox.classList.remove('hidden'); wBox.innerText = `TRIGGER: ${d.tr || '--'}`;
                bTxt.className = "glow-bias text-amber-500";
            } else {
                wBox.classList.add('hidden');
                bTxt.className = d.b === 'BUY' ? "glow-bias text-emerald-500" : "glow-bias text-rose-600";
            }
            document.getElementById('entVal').innerText = d.e || "--";
            document.getElementById('slVal').innerText = d.s || "--";
            document.getElementById('tpVal').innerText = d.t || "--";
            document.getElementById('logicSummary').innerText = d.l;
            
            const dist = Math.abs(d.e - d.s);
            const rVal = (BALANCE * (RISK_PCT/100));
            document.getElementById('lotVal').innerText = dist > 0 ? (rVal / (dist * 10)).toFixed(2) : "0.01";
            document.getElementById('outPanel').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
