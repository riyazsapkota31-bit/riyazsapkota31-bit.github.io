<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Trader Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#0b0e14] text-slate-200 font-sans p-4">

    <div class="max-w-md mx-auto">
        <header class="text-center my-6">
            <h1 class="text-3xl font-black text-indigo-500 italic uppercase tracking-tighter">Omni-Trader</h1>
            <p class="text-[9px] text-slate-500 tracking-[0.4em] uppercase font-bold">Institutional SMC Engine</p>
        </header>

        <div class="bg-[#161b22] p-4 rounded-2xl border border-slate-800 mb-4 shadow-xl">
            <div class="relative flex items-center">
                <input type="password" id="apiKey" 
                       class="w-full bg-[#0d1117] border border-slate-700 rounded-xl py-3 px-4 text-indigo-400 focus:outline-none focus:border-indigo-500 text-sm" 
                       placeholder="Enter API Key">
                <button onclick="toggleKey()" class="absolute right-3 text-slate-600 hover:text-white transition-colors">
                    <i id="eyeIcon" class="fas fa-eye"></i>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="bg-[#161b22] p-3 rounded-xl border border-slate-800 text-center">
                <p class="text-[9px] font-bold text-slate-400 uppercase mb-2">4H Bias</p>
                <input type="file" id="img1" class="text-[10px] text-slate-500 w-full">
            </div>
            <div class="bg-[#161b22] p-3 rounded-xl border border-slate-800 text-center">
                <p class="text-[9px] font-bold text-slate-400 uppercase mb-2">1H Structure</p>
                <input type="file" id="img2" class="text-[10px] text-slate-500 w-full">
            </div>
            <div class="bg-[#161b22] p-3 rounded-xl border border-slate-800 text-center">
                <p class="text-[9px] font-bold text-slate-400 uppercase mb-2">15M Entry</p>
                <input type="file" id="img3" class="text-[10px] text-slate-500 w-full">
            </div>
            <div class="bg-[#161b22] p-3 rounded-xl border border-slate-800 text-center">
                <p class="text-[9px] font-bold text-slate-400 uppercase mb-2">DXY Context</p>
                <input type="file" id="img4" class="text-[10px] text-slate-500 w-full">
            </div>
        </div>

        <button onclick="analyze()" id="mainBtn" class="w-full bg-indigo-600 py-4 rounded-xl font-bold uppercase tracking-widest shadow-lg active:scale-95 transition-all hover:bg-indigo-500">
            Execute Pro Analysis
        </button>

        <div id="resultBox" class="mt-6 hidden bg-[#0d1117] rounded-2xl border border-slate-800 p-5 shadow-2xl">
            <div id="loader" class="hidden text-center py-4">
                <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-indigo-500 mx-auto"></div>
                <p class="text-[9px] text-indigo-500 mt-2 font-bold uppercase animate-pulse">Calculating High RR Setups...</p>
            </div>
            <div id="output" class="text-sm font-bold text-white space-y-3 leading-relaxed"></div>
        </div>
    </div>

    <script>
        function toggleKey() {
            const input = document.getElementById('apiKey');
            const icon = document.getElementById('eyeIcon');
            input.type = input.type === "password" ? "text" : "password";
            icon.className = input.type === "password" ? "fas fa-eye" : "fas fa-eye-slash";
        }

        async function toBase64(f) { return new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result.split(',')[1]); }); }

        async function analyze() {
            const key = document.getElementById('apiKey').value;
            const output = document.getElementById('output');
            const loader = document.getElementById('loader');
            const resBox = document.getElementById('resultBox');
            const btn = document.getElementById('mainBtn');
            
            const files = [
                document.getElementById('img1').files[0], 
                document.getElementById('img2').files[0],
                document.getElementById('img3').files[0],
                document.getElementById('img4').files[0]
            ].filter(f => f);

            if(!key || files.length < 2) return alert("Upload charts + API key.");

            btn.disabled = true;
            resBox.classList.remove('hidden');
            loader.classList.remove('hidden');
            output.innerHTML = "";

            try {
                const b64 = await Promise.all(files.map(f => toBase64(f)));
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Professional SMC Trader. Analyze 4H, 1H, 15M, and DXY context. Internalize CHoCH/FVG. OUTPUT ONLY THIS FORMAT: TRADE: [BUY/SELL/NO-TRADE] | ENTRY: [Price] | TP: [Target for 1:2 R:R MINIMUM, but aim for 1:3 to 1:10 if liquidity allows] | SL: [Price] | LOGIC: [One very simple, logical sentence in plain English explaining the move]. Accuracy and speed are critical." },
                                ...b64.map(data => ({ inline_data: { mime_type: "image/jpeg", data } }))
                            ]
                        }]
                    })
                });

                const data = await response.json();
                loader.classList.add('hidden');
                btn.disabled = false;
                
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    const rawText = data.candidates[0].content.parts[0].text;
                    output.innerHTML = rawText.split('|').map(item => `<div class="border-b border-slate-800 pb-1 mb-1 last:border-0">${item.trim()}</div>`).join('');
                } else {
                    output.innerText = "Check API Key or limits.";
                }
            } catch (e) {
                loader.classList.add('hidden');
                btn.disabled = false;
                output.innerText = "Sync Error. Check network.";
            }
        }
    </script>
</body>
</html>
