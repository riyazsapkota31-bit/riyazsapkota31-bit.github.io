<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OMNI-BLACK | TERMINAL V19</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon-indigo: #6366f1; --neon-emerald: #10b981; --neon-rose: #f43f5e; --bg-card: rgba(12, 12, 12, 0.95); }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; padding: 15px; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        
        /* ULTRA-MODERN GLASS */
        .glass-panel { 
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 35px;
            box-shadow: 0 40px 100px rgba(0,0,0,1);
            backdrop-filter: blur(25px);
        }

        /* NEON SCANNER ANIMATION */
        .tier-card { 
            border: 1.5px solid #1a1a1a; border-radius: 30px; min-height: 140px; 
            background: linear-gradient(145deg, #080808, #020202); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: 0.5s cubic-bezier(0.2, 1, 0.2, 1); cursor: pointer;
        }
        .has-file { 
            border: 1.5px solid var(--neon-indigo); 
            background: rgba(99, 102, 241, 0.04);
            box-shadow: 0 0 35px rgba(99, 102, 241, 0.15);
            transform: translateY(-5px) scale(1.02);
        }

        /* INSTITUTIONAL BIAS DISPLAY */
        .glow-bias { 
            text-shadow: 0 0 60px currentColor; font-size: clamp(5.5rem, 21vw, 9rem); 
            font-weight: 950; letter-spacing: -0.07em; font-style: italic; line-height: 0.8;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
        }

        /* BUTTON DESIGN */
        .btn-exec { 
            background: #fff; color: #000; border-radius: 25px; padding: 24px; 
            font-weight: 900; text-transform: uppercase; letter-spacing: 0.3em;
            transition: 0.3s cubic-bezier(0.2, 1, 0.2, 1);
        }
        .btn-exec:active { transform: scale(0.96) rotate(-0.5deg); filter: brightness(1.1); }

        /* DATA REFINEMENT */
        .data-label { font-size: 9px; font-weight: 950; color: #444; text-transform: uppercase; letter-spacing: 0.4em; }
        .data-value { font-size: 2.3rem; font-family: 'JetBrains Mono', monospace; font-weight: 800; letter-spacing: -0.05em; }

        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* SCALPER STRATEGY BADGES */
        .badge { font-size: 8px; font-weight: 900; padding: 4px 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); color: #666; }
        .badge-active { color: var(--neon-indigo); border-color: var(--neon-indigo); }
    </style>
</head>
<body>

    <header class="flex justify-between items-start mb-8 px-4 mt-4">
        <div>
            <h1 class="text-3xl font-black italic tracking-tighter leading-none text-white">OMNI-BLACK</h1>
            <div class="flex items-center gap-2 mt-2">
                <div id="statusDot" class="w-2.5 h-2.5 rounded-full bg-rose-600 shadow-[0_0_15px_#f43f5e]"></div>
                <p id="riskDisp" class="text-[8px] font-bold text-slate-600 uppercase tracking-[0.5em]">Neural Link: Standby</p>
            </div>
        </div>
        <div class="flex flex-col items-end gap-1">
            <span class="badge badge-active">SMC</span>
            <span class="badge badge-active">ICT</span>
            <span class="badge">WYCKOFF</span>
        </div>
    </header>

    <div class="glass-panel p-6 mb-8 border-l-[12px] border-indigo-600 flex justify-between items-center">
        <div>
            <p class="data-label mb-1">Universal Asset Hunt</p>
            <h2 id="pairDisp" class="text-xl font-black italic text-white uppercase tracking-tighter">Initializing...</h2>
        </div>
        <div class="text-right">
            <p class="data-label mb-1">Accuracy</p>
            <p class="text-indigo-400 font-black italic tracking-widest text-[10px]">EINSTEIN-IQ</p>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-8">
        <div id="box0" class="tier-card" onclick="document.getElementById('i0').click()">
            <input type="file" id="i0" hidden accept="image/*" onchange="sync(0)"><i class="fa-solid fa-globe text-slate-800 text-3xl mb-2" id="ic0"></i>
            <p class="data-label">1H Global</p>
        </div>
        <div id="box1" class="tier-card" onclick="document.getElementById('i1').click()">
            <input type="file" id="i1" hidden accept="image/*" onchange="sync(1)"><i class="fa-solid fa-layer-group text-slate-800 text-3xl mb-2" id="ic1"></i>
            <p class="data-label">15M Macro</p>
        </div>
        <div id="box2" class="tier-card" onclick="document.getElementById('i2').click()">
            <input type="file" id="i2" hidden accept="image/*" onchange="sync(2)"><i class="fa-solid fa-bolt text-slate-800 text-3xl mb-2" id="ic2"></i>
            <p class="data-label">1M Trigger</p>
        </div>
        <div id="box3" class="tier-card" onclick="document.getElementById('i3').click()">
            <input type="file" id="i3" hidden accept="image/*" onchange="sync(3)"><i class="fa-solid fa-chart-line text-slate-800 text-3xl mb-2" id="ic3"></i>
            <p class="data-label">DXY Data</p>
        </div>
    </div>

    <button id="goBtn" onclick="executeSurgicalScan()" class="btn-exec w-full mb-10 shadow-2xl">Execute Scalp Scan</button>

    <div id="outPanel" class="hidden space-y-10 pb-32">
        <div id="waitMsg" class="hidden py-5 rounded-[30px] bg-amber-500/5 border border-amber-500/20 text-center text-amber-500 font-black italic text-xl tracking-tighter uppercase">Waiting for Liquidity Sweep...</div>
        
        <div class="text-center relative">
            <h2 id="biasTxt" class="glow-bias"></h2>
            <p class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 opacity-5 text-[15rem] font-black -z-10 tracking-tighter">QUANT</p>
        </div>
        
        <div class="grid grid-cols-2 gap-8 text-center border-y border-white/5 py-12">
            <div><p class="data-label mb-2">Entry</p><p id="entVal" class="data-value text-white">--</p></div>
            <div><p class="data-label mb-2">Lots (1% Risk)</p><p id="lotVal" class="data-value text-indigo-400">--</p></div>
            <div><p class="data-label mb-2">Stop Loss</p><p id="slVal" class="data-value text-rose-500">--</p></div>
            <div><p class="data-label mb-2">Target</p><p id="tpVal" class="data-value text-emerald-500">--</p></div>
        </div>

        <div class="p-10 glass-panel border-t-[10px] border-indigo-600">
            <div class="flex items-center gap-2 mb-4">
                <i class="fa-solid fa-shield-halved text-indigo-500 text-xs"></i>
                <p class="text-[10px] font-black text-indigo-500 uppercase tracking-widest">Strategic Proof</p>
            </div>
            <p id="logicSummary" class="text-xl text-slate-200 leading-snug italic font-bold tracking-tight"></p>
        </div>
    </div>

    <div class="mt-20 p-8 glass-panel opacity-5 hover:opacity-100 transition-all duration-1000">
        <input type="password" id="kIn" placeholder="API KEY" class="bg-black border border-white/10 rounded-2xl w-full mb-4 p-5 text-center text-sm outline-none text-indigo-400 font-mono">
        <div class="grid grid-cols-2 gap-4">
            <input type="number" id="bIn" placeholder="BALANCE" class="bg-black border border-white/10 rounded-2xl p-5 text-center text-sm outline-none">
            <input type="number" id="rIn" placeholder="RISK %" class="bg-black border border-white/10 rounded-2xl p-5 text-center text-sm outline-none">
        </div>
        <button onclick="saveConfig()" class="w-full mt-6 text-[9px] font-black uppercase text-slate-600 tracking-[0.5em] hover:text-indigo-400">Sync Core</button>
    </div>

    <script src="strategies.js"></script>
</body>
</html>
