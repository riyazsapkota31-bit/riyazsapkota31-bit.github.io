<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Trader | Multi-Chart Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #05070a; color: #e2e8f0; margin: 0; }
        .glass { background: #0d1117; border: 1px solid #1f2937; }
        
        /* Sidebar System */
        #sideDrawer {
            position: fixed; top: 0; right: -350px; width: 350px; height: 100%;
            background: #0d1117; z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 1px solid #1f2937;
        }
        #sideDrawer.open { right: 0; }
        .sub-panel { position: absolute; top: 0; left: 100%; width: 100%; height: 100%; background: #0d1117; transition: 0.3s ease; z-index: 1001; padding: 24px; }
        .sub-panel.active { left: 0; }

        /* Upload Grid */
        .upload-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 24px; }
        .upload-box { 
            position: relative; height: 120px; display: flex; align-items: center; 
            justify-content: center; background: #0d1117; border: 1px solid #1f2937; 
            border-radius: 16px; transition: 0.3s; text-align: center;
        }
        .upload-box:hover { border-color: #4f46e5; }
        .box-label { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
        .file-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 10; }
        .tick { display: none; color: #10b981; font-size: 24px; }
        input:valid ~ .box-label { display: none; }
        input:valid ~ .tick { display: block; }

        /* Dashboard labels */
        .res-label { font-size: 8px; font-weight: 900; color: #475569; text-transform: uppercase; letter-spacing: 1px; }
        .res-value { font-size: 14px; font-weight: 700; color: #f8fafc; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4">
    <div id="overlay" class="fixed inset-0 bg-black/80 hidden z-[999]" onclick="toggleDrawer()"></div>

    <div id="sideDrawer">
        <div class="p-6 space-y-6">
            <div class="flex justify-between items-center">
                <button onclick="toggleDrawer()"><i class="fas fa-times text-slate-500"></i></button>
                <span class="text-xs font-black uppercase text-indigo-500 tracking-widest">Master Terminal</span>
            </div>
            
            <div onclick="openSub('settingsPanel')" class="flex items-center justify-between p-4 glass rounded-xl cursor-pointer">
                <div class="flex items-center gap-4"><i class="fas fa-sliders-h text-slate-400"></i><span class="text-sm font-bold">Trade Configuration</span></div>
                <i class="fas fa-chevron-right text-[10px] text-slate-600"></i>
            </div>
        </div>

        <div id="settingsPanel" class="sub-panel">
            <button onclick="closeSub('settingsPanel')" class="flex items-center gap-2 text-indigo-400 text-xs font-bold mb-6"><i class="fas fa-arrow-left"></i> BACK</button>
            <div class="space-y-4">
                <label class="text-[9px] font-black text-slate-500 uppercase">Account Balance ($)</label>
                <input type="number" id="bal" value="10000" class="w-full bg-black border border-slate-800 rounded-xl p-3 text-xs outline-none focus:border-indigo-500">
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[9px] font-black text-slate-500 uppercase">Risk %</label>
                        <input type="number" id="risk" value="0.5" class="w-full bg-black border border-slate-800 rounded-xl p-3 text-xs outline-none">
                    </div>
                    <div>
                        <label class="text-[9px] font-black text-slate-500 uppercase">R:R Ratio</label>
                        <input type="number" id="ratio" value="3.0" class="w-full bg-black border border-slate-800 rounded-xl p-3 text-xs outline-none">
                    </div>
                </div>
                <button onclick="saveSettings()" class="w-full bg-indigo-600 text-white font-bold p-3 rounded-xl uppercase text-[10px] mt-4">Save Configuration</button>
            </div>
        </div>
    </div>

    <header class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-4">
            <div class="h-12 w-12 bg-indigo-600 rounded-xl flex items-center justify-center">
                <i class="fas fa-bolt text-2xl text-white"></i>
            </div>
            <div>
                <h1 class="text-2xl font-black italic text-white uppercase tracking-tighter">OMNI-TRADER</h1>
                <p class="text-[8px] font-bold text-indigo-500 uppercase tracking-widest">REAL-TIME MULTI-CHART ANALYST</p>
            </div>
        </div>
        <button onclick="toggleDrawer()" class="h-10 w-10 glass rounded-xl flex items-center justify-center"><i class="fas fa-bars-staggered"></i></button>
    </header>

    <div class="upload-grid">
        <div class="upload-box"><input type="file" id="img0" class="file-input" required><span class="box-label">4H Chart</span><i class="fas fa-check-circle tick"></i></div>
        <div class="upload-box"><input type="file" id="img1" class="file-input" required><span class="box-label">1H Chart</span><i class="fas fa-check-circle tick"></i></div>
        <div class="upload-box"><input type="file" id="img2" class="file-input" required><span class="box-label">M15 Chart</span><i class="fas fa-check-circle tick"></i></div>
        <div class="upload-box"><input type="file" id="img3" class="file-input" required><span class="box-label">DXY Index</span><i class="fas fa-check-circle tick"></i></div>
    </div>

    <button id="scanBtn" onclick="executeScan()" class="w-full mt-6 bg-indigo-600 py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl">
        Perform Multi-Chart Scan
    </button>

    <div id="resultBox" class="hidden mt-6 glass rounded-3xl p-6 border-t-2 border-indigo-500">
        <div class="flex justify-between items-start mb-6 pb-6 border-b border-slate-800">
            <div><span class="res-label">Institutional Bias</span><h2 id="actionText" class="text-4xl font-black italic uppercase">SCANNING</h2></div>
            <div class="text-right max-w-[150px]"><span class="res-label">Market Logic</span><p id="logicText" class="text-[9px] text-indigo-400 font-bold italic">Awaiting data...</p></div>
        </div>
        
        <div class="grid grid-cols-3 gap-4">
            <div><span class="res-label">Support</span><p id="supText" class="res-value">---</p></div>
            <div><span class="res-label">Resistance</span><p id="resText" class="res-value">---</p></div>
            <div><span class="res-label">Entry Price</span><p id="entText" class="res-value text-indigo-400">---</p></div>
            <div><span class="res-label">Take Profit</span><p id="tpText" class="res-value text-emerald-400">---</p></div>
            <div><span class="res-label">Stop Loss</span><p id="slText" class="res-value text-rose-400">---</p></div>
            <div><span class="res-label">Lots to Trade</span><p id="lotText" class="res-value text-yellow-500">0.00</p></div>
        </div>
    </div>

    <script src="strategies.js"></script>
    <script>
        const API_KEY = "AIzaSyCt90KDSpWVE3KlNLUfDd7PtKx43IdN8Cg"; //

        function toggleDrawer() { document.getElementById('sideDrawer').classList.toggle('open'); document.getElementById('overlay').classList.toggle('hidden'); }
        function openSub(id) { document.getElementById(id).classList.add('active'); }
        function closeSub(id) { document.getElementById(id).classList.remove('active'); }
        function saveSettings() { toggleDrawer(); }

        async function fileToPart(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve({ inline_data: { mime_type: "image/jpeg", data: reader.result.split(',')[1] } });
            });
        }

        async function executeScan() {
            const btn = document.getElementById('scanBtn');
            const files = [document.getElementById('img0').files[0], document.getElementById('img1').files[0], document.getElementById('img2').files[0], document.getElementById('img3').files[0]];
            if (files.some(f => !f)) return alert("Upload all 4 charts.");

            btn.innerText = "EXTRACTING DATA...";
            document.getElementById('resultBox').classList.remove('hidden');

            try {
                const imageParts = await Promise.all(files.map(fileToPart));
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Analyze charts. Return ONLY JSON: {entry: number, sl: number, support: number, resistance: number, bias: 'BUY/SELL', logic: 'string'}" }, ...imageParts] }] })
                });

                const data = await response.json();
                const result = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, ''));
                
                // Link to strategies.js
                const balance = parseFloat(document.getElementById('bal').value);
                const risk = parseFloat(document.getElementById('risk').value);
                const ratio = parseFloat(document.getElementById('ratio').value);
                
                const lotSize = calculatePositionSize(balance, risk, result.entry, result.sl);
                const tpValue = result.entry + (Math.abs(result.entry - result.sl) * ratio);

                document.getElementById('actionText').innerText = result.bias;
                document.getElementById('entText').innerText = result.entry;
                document.getElementById('slText').innerText = result.sl;
                document.getElementById('supText').innerText = result.support;
                document.getElementById('resText').innerText = result.resistance;
                document.getElementById('tpText').innerText = tpValue.toFixed(2);
                document.getElementById('lotText').innerText = lotSize;
                document.getElementById('logicText').innerText = result.logic;
            } catch (e) {
                document.getElementById('logicText').innerText = "Sync Error: Could not read chart pixels.";
            } finally { btn.innerText = "Perform Multi-Chart Scan"; }
        }
    </script>
</body>
</html>
