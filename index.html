<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Trader Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #05070a; color: #e2e8f0; margin: 0; overflow-x: hidden; }
        .glass { background: #0d1117; border: 1px solid #1f2937; }
        
        /* Dashboard Scaling (Zoom Out) */
        .main-container { max-width: 480px; margin: 0 auto; padding: 24px; }

        /* RIGHT-SIDE DRAWER */
        #sideDrawer {
            position: fixed; top: 0; right: -320px; width: 320px; height: 100%;
            background: #0d1117; z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 1px solid #1f2937; box-shadow: -20px 0 50px rgba(0,0,0,0.8);
        }
        #sideDrawer.open { right: 0; }
        .sub-panel { position: absolute; top: 0; left: 100%; width: 100%; height: 100%; background: #0d1117; transition: 0.3s ease; z-index: 1001; padding: 24px; }
        .sub-panel.active { left: 0; }

        /* REVERSED SIZE: Upload Boxes */
        .upload-box { position: relative; height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(145deg, #0d1117, #161b22); border: 1px solid #1f2937; border-radius: 16px; transition: 0.3s; padding: 10px; }
        .box-label { font-size: 11px; font-weight: 900; color: #e2e8f0; text-transform: uppercase; margin-bottom: 10px; }
        .btn-ui { background: #1f2937; color: #94a3b8; padding: 4px 10px; border-radius: 4px; font-size: 8px; font-weight: 700; pointer-events: none; border: 1px solid #334155; }
        
        .file-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 10; }
        .tick { display: none; color: #10b981; font-size: 24px; }
        input:valid ~ .btn-ui, input:valid ~ .box-label { display: none; }
        input:valid ~ .tick { display: block; }

        /* Toggle Switch UI */
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #1f2937; border-radius: 34px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: #4f46e5; }
        input:checked + .slider:before { transform: translateX(24px); }

        .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 999; backdrop-filter: blur(4px); }
        .drawer-overlay.active { display: block; }
        .hidden { display: none !important; }
        
        /* Utility */
        .lock-btn { width: 100%; background: #4f46e5; color: white; font-size: 9px; font-weight: bold; padding: 8px; border-radius: 6px; margin-top: 10px; text-transform: uppercase; }
        .edit-link { font-size: 9px; font-weight: 900; color: #6366f1; text-transform: uppercase; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

    <div id="overlay" class="drawer-overlay" onclick="toggleDrawer()"></div>

    <div id="sideDrawer">
        <div class="p-6 space-y-8">
            <div class="flex justify-between items-center">
                <button onclick="toggleDrawer()"><i class="fas fa-times text-slate-500"></i></button>
                <span class="text-xs font-black uppercase text-indigo-500 tracking-widest">Master Terminal</span>
            </div>

            <div class="p-4 glass rounded-2xl border-indigo-500/30">
                <label class="text-[9px] font-black text-indigo-400 uppercase block mb-2">Gemini AI Key</label>
                <div id="gemInput">
                    <input type="password" id="gem" placeholder="Enter API Key" class="w-full bg-black/50 border border-slate-800 rounded-lg p-2 text-xs outline-none">
                    <button onclick="toggleLock('gem')" class="lock-btn">Save & Lock</button>
                </div>
                <div id="gemLocked" class="hidden flex justify-between items-center bg-black/20 p-2 rounded-lg">
                    <span class="text-[10px] text-slate-500 italic">••••••••••••••••</span>
                    <span onclick="toggleLock('gem')" class="edit-link">Edit</span>
                </div>
            </div>

            <nav class="space-y-4">
                <div onclick="openSub('historyPanel')" class="flex items-center justify-between p-4 glass rounded-xl cursor-pointer hover:bg-white/5">
                    <div class="flex items-center gap-4"><i class="fas fa-clock text-indigo-500"></i><span class="text-sm font-bold">Analysis History</span></div>
                    <i class="fas fa-chevron-right text-[10px] text-slate-600"></i>
                </div>
                <div onclick="openSub('settingsPanel')" class="flex items-center justify-between p-4 glass rounded-xl cursor-pointer hover:bg-white/5">
                    <div class="flex items-center gap-4"><i class="fas fa-cog text-slate-400"></i><span class="text-sm font-bold">Trade Configuration</span></div>
                    <i class="fas fa-chevron-right text-[10px] text-slate-600"></i>
                </div>
            </nav>
        </div>

        <div id="settingsPanel" class="sub-panel">
            <button onclick="closeSub('settingsPanel')" class="flex items-center gap-2 text-indigo-400 text-xs font-bold mb-6"><i class="fas fa-arrow-left"></i> BACK</button>
            
            <div class="flex justify-between items-center mb-8 bg-black/30 p-4 rounded-2xl">
                <span id="modeLabel" class="text-[10px] font-black uppercase text-slate-400">MANUAL</span>
                <label class="switch">
                    <input type="checkbox" id="modeSw" onchange="toggleMode()">
                    <span class="slider"></span>
                </label>
            </div>
            
            <div class="space-y-4">
                <div id="accInput">
                    <div id="manFields" class="space-y-3">
                        <input type="number" id="bal" placeholder="XM Balance ($)" class="w-full bg-black border border-slate-800 rounded-xl p-3 text-xs outline-none">
                    </div>
                    <div id="liveFields" class="hidden space-y-3">
                        <input type="password" id="tok" placeholder="MetaApi Token" class="w-full bg-black border border-slate-800 rounded-xl p-3 text-xs outline-none">
                        <input type="text" id="accId" placeholder="Account ID" class="w-full bg-black border border-slate-800 rounded-xl p-3 text-xs outline-none">
                    </div>
                    <button onclick="toggleLock('acc')" class="lock-btn">Save Account</button>
                </div>
                <div id="accLocked" class="hidden flex justify-between items-center bg-black/20 p-3 rounded-xl border border-white/5">
                    <span id="lockedAccInfo" class="text-xs font-bold text-slate-400">Linked</span>
                    <span onclick="toggleLock('acc')" class="edit-link">Edit</span>
                </div>
            </div>

            <div class="mt-6 space-y-4">
                <div id="riskInput">
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <input type="number" id="riskPct" placeholder="Risk %" class="bg-black border border-slate-800 rounded-xl p-3 text-xs outline-none">
                        <div class="flex items-center gap-1 bg-black border border-slate-800 rounded-xl px-2">
                            <input type="number" id="rr1" placeholder="R" class="w-full bg-transparent p-1 text-xs outline-none text-center">
                            <span class="text-indigo-500 font-bold">:</span>
                            <input type="number" id="rr2" placeholder="R" class="w-full bg-transparent p-1 text-xs outline-none text-center">
                        </div>
                    </div>
                    <button onclick="toggleLock('risk')" class="lock-btn">Save Risk Parameters</button>
                </div>
                <div id="riskLocked" class="hidden flex justify-between items-center bg-black/20 p-3 rounded-xl border border-white/5">
                    <span id="lockedRiskInfo" class="text-xs font-bold text-slate-400">Risk Locked</span>
                    <span onclick="toggleLock('risk')" class="edit-link">Edit</span>
                </div>
            </div>
        </div>
    </div>

    <main class="main-container">
        <header class="flex justify-between items-center py-10">
            <div class="flex items-center gap-5">
                <div class="h-16 w-16 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-xl">
                    <i class="fas fa-bolt text-3xl text-white"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-black italic text-white tracking-tighter uppercase leading-none">OMNI-TRADER</h1>
                    <p id="modeStatus" class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.2em] mt-2">Manual Mode</p>
                </div>
            </div>
            <button onclick="toggleDrawer()" class="h-12 w-12 flex items-center justify-center glass rounded-2xl transition-all"><i class="fas fa-bars-staggered text-xl"></i></button>
        </header>

        <div class="mt-20 grid grid-cols-2 gap-3">
            <div class="upload-box">
                <input type="file" class="file-input" required>
                <div class="box-label">4H Bias Scan</div>
                <div class="btn-ui">Choose File</div>
                <i class="fas fa-check-circle tick"></i>
            </div>
            <div class="upload-box">
                <input type="file" class="file-input" required>
                <div class="box-label">1H Structure</div>
                <div class="btn-ui">Choose File</div>
                <i class="fas fa-check-circle tick"></i>
            </div>
            <div class="upload-box">
                <input type="file" class="file-input" required>
                <div class="box-label">M15 Entry</div>
                <div class="btn-ui">Choose File</div>
                <i class="fas fa-check-circle tick"></i>
            </div>
            <div class="upload-box">
                <input type="file" class="file-input" required>
                <div class="box-label">DXY Overview</div>
                <div class="btn-ui">Choose File</div>
                <i class="fas fa-check-circle tick"></i>
            </div>
        </div>

        <button onclick="run()" class="w-full mt-12 bg-indigo-600 py-6 rounded-2xl font-black uppercase text-xs tracking-[0.4em] active:scale-95 transition-all shadow-xl">
            Analyze the Chart
        </button>

        <div id="res" class="hidden mt-8 glass rounded-3xl p-8 border-t-2 border-indigo-500">
            <div class="flex justify-between items-center">
                <h2 id="rAct" class="text-4xl font-black italic uppercase leading-none">---</h2>
                <div class="text-right">
                    <span class="text-[9px] text-slate-500 font-black uppercase block">Lots</span>
                    <span id="rLot" class="text-2xl font-bold">0.00</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        function toggleDrawer() { document.getElementById('sideDrawer').classList.toggle('open'); document.getElementById('overlay').classList.toggle('active'); }
        function openSub(id) { document.getElementById(id).classList.add('active'); }
        function closeSub(id) { document.getElementById(id).classList.remove('active'); }

        function toggleMode() {
            const isLive = document.getElementById('modeSw').checked;
            document.getElementById('modeLabel').innerText = isLive ? "LIVE" : "MANUAL";
            document.getElementById('manFields').classList.toggle('hidden', isLive);
            document.getElementById('liveFields').classList.toggle('hidden', !isLive);
            document.getElementById('modeStatus').innerText = isLive ? "Live Mode" : "Manual Mode";
        }

        function toggleLock(type) {
            const input = document.getElementById(type + 'Input');
            const locked = document.getElementById(type + 'Locked');
            const isHiding = !input.classList.contains('hidden');
            
            if(type === 'acc') {
                const isLive = document.getElementById('modeSw').checked;
                document.getElementById('lockedAccInfo').innerText = isLive ? "Live Account Saved" : "$" + document.getElementById('bal').value + " Balance";
            }
            if(type === 'risk') {
                document.getElementById('lockedRiskInfo').innerText = document.getElementById('riskPct').value + "% Risk | " + document.getElementById('rr1').value + ":" + document.getElementById('rr2').value + " RR";
            }

            input.classList.toggle('hidden', isHiding);
            locked.classList.toggle('hidden', !isHiding);
        }

        function run() { document.getElementById('res').classList.remove('hidden'); document.getElementById('rAct').innerText = "BUY"; document.getElementById('rLot').innerText = "0.15"; }
    </script>
</body>
</html>
