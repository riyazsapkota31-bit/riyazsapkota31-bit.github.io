<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Trader Pro | Elite Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0b0e14; color: #e2e8f0; padding: 15px; overflow-x: hidden; }
        .glass { background: rgba(22, 27, 34, 0.9); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-box { background: #0d1117; border: 1px solid #1e293b; border-radius: 10px; padding: 12px; color: white; width: 100%; outline: none; font-size: 12px; }
        
        /* Large Upload Buttons */
        input[type="file"]::file-selector-button {
            background: #4f46e5; color: white; border: none; padding: 12px 20px;
            border-radius: 8px; cursor: pointer; font-weight: 900; text-transform: uppercase;
            font-size: 10px; letter-spacing: 0.1em; transition: 0.3s; width: 100%; margin-bottom: 8px;
        }
        input[type="file"]::file-selector-button:hover { background: #4338ca; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <header class="max-w-4xl mx-auto flex justify-between items-center mb-6">
        <div class="flex items-center gap-3">
            <div class="h-10 w-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-900/20">
                <i class="fas fa-bolt text-white"></i>
            </div>
            <div>
                <h1 class="text-lg font-black text-white italic uppercase tracking-tighter leading-none">Omni-Trader</h1>
                <p id="topInfo" class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mt-1">Ready for Analysis</p>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="togglePanel('historyPanel')" class="p-3 glass rounded-xl text-slate-400 hover:text-indigo-400 transition-all"><i class="fas fa-history"></i></button>
            <button onclick="togglePanel('settingsPanel')" class="p-3 glass rounded-xl text-slate-400 hover:text-indigo-400 transition-all"><i class="fas fa-cog"></i></button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto">
        
        <div id="settingsPanel" class="hidden glass p-6 rounded-3xl mb-6 shadow-2xl space-y-4">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-[10px] font-black text-indigo-400 uppercase tracking-widest">System Config</h3>
                <div class="flex bg-black/40 p-1 rounded-lg scale-90">
                    <button onclick="setMode('manual')" id="btnMan" class="px-3 py-1 rounded-md text-[9px] font-bold uppercase transition-all">Manual</button>
                    <button onclick="setMode('live')" id="btnLive" class="px-3 py-1 rounded-md text-[9px] font-bold uppercase transition-all">Live</button>
                </div>
            </div>

            <div id="manFields" class="space-y-3">
                <input type="number" id="manualBal" onchange="save()" placeholder="XM Balance ($)" class="input-box">
            </div>
            
            <div id="liveFields" class="hidden space-y-3">
                <input type="password" id="metaToken" onchange="save()" placeholder="MetaApi Token" class="input-box">
                <input type="text" id="metaId" onchange="save()" placeholder="MetaApi ID" class="input-box">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <input type="number" id="riskPct" onchange="save()" placeholder="Risk % (1)" class="input-box">
                <input type="number" id="riskRatio" onchange="save()" placeholder="R:R Ratio (2.5)" class="input-box">
            </div>
            <input type="password" id="geminiKey" onchange="save()" placeholder="Gemini API Key (Permanent)" class="input-box">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="glass p-5 rounded-3xl border-2 border-dashed border-slate-800 hover:border-indigo-500/50 transition-all">
                <span class="text-[9px] font-black text-slate-500 uppercase mb-3 block">Primary 4H/1H Bias</span>
                <input type="file" id="img1" class="text-transparent">
            </div>
            <div class="glass p-5 rounded-3xl border-2 border-dashed border-slate-800 hover:border-indigo-500/50 transition-all">
                <span class="text-[9px] font-black text-slate-500 uppercase mb-3 block">Entry M15/M5 Flow</span>
                <input type="file" id="img2" class="text-transparent">
            </div>
        </div>

        <button onclick="analyze()" id="execBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 py-5 rounded-2xl font-black uppercase tracking-[0.3em] shadow-2xl transition-all active:scale-95">
            Execute Institutional Scan
        </button>

        <div id="resultBox" class="hidden mt-8">
            <div class="glass rounded-3xl p-8 border-t-4 border-indigo-500 relative overflow-hidden">
                <div id="loader" class="hidden py-10 text-center animate-pulse text-[10px] font-bold text-indigo-400 uppercase tracking-[0.4em]">Decoding Market Structure...</div>
                
                <div id="resDisplay" class="hidden space-y-6">
                    <div class="flex justify-between items-end">
                        <div>
                            <span id="resStrat" class="text-[10px] font-black text-indigo-500 uppercase tracking-widest block mb-1">STRATEGY</span>
                            <h2 id="resTrade" class="text-4xl font-black italic uppercase leading-none">BUY</h2>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] font-black text-slate-500 uppercase block mb-1">Calculated Lots</span>
                            <span id="resLots" class="text-2xl font-bold text-white leading-none">0.00</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-4 border-y border-white/5 py-6">
                        <div><span class="text-[9px] text-slate-500 block uppercase font-bold">Entry</span><span id="resEntry" class="font-bold">---</span></div>
                        <div><span class="text-[9px] text-red-500 block uppercase font-bold">Stop Loss</span><span id="resSL" class="font-bold">---</span></div>
                        <div><span class="text-[9px] text-green-500 block uppercase font-bold">Target</span><span id="resTP" class="font-bold">---</span></div>
                    </div>

                    <p id="resLogic" class="text-[11px] text-slate-400 leading-relaxed italic"></p>
                </div>
            </div>
        </div>

        <div id="historyPanel" class="fixed inset-y-0 right-0 w-80 glass shadow-2xl transform translate-x-full transition-transform duration-300 z-50 p-6 overflow-y-auto">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-[11px] font-black text-white uppercase tracking-widest">Trade Journal</h3>
                <button onclick="togglePanel('historyPanel')" class="text-slate-500"><i class="fas fa-times"></i></button>
            </div>
            <div id="historyList" class="space-y-4"></div>
        </div>
    </main>

    <script>
        function togglePanel(id) { document.getElementById(id).classList.toggle('translate-x-full'); document.getElementById(id).classList.toggle('hidden'); }
        
        function setMode(mode) {
            const isMan = mode === 'manual';
            document.getElementById('manFields').classList.toggle('hidden', !isMan);
            document.getElementById('liveFields').classList.toggle('hidden', isMan);
            document.getElementById('btnMan').className = isMan ? "px-3 py-1 rounded-md text-[9px] font-bold uppercase bg-indigo-600 text-white" : "px-3 py-1 rounded-md text-[9px] font-bold uppercase text-slate-500";
            document.getElementById('btnLive').className = !isMan ? "px-3 py-1 rounded-md text-[9px] font-bold uppercase bg-indigo-600 text-white" : "px-3 py-1 rounded-md text-[9px] font-bold uppercase text-slate-500";
            localStorage.setItem('omni_mode', mode);
            updateHeader();
        }

        function save() {
            localStorage.setItem('omni_gem', document.getElementById('geminiKey').value);
            localStorage.setItem('omni_m_tok', document.getElementById('metaToken').value);
            localStorage.setItem('omni_m_id', document.getElementById('metaId').value);
            localStorage.setItem('omni_bal', document.getElementById('manualBal').value);
            localStorage.setItem('omni_risk', document.getElementById('riskPct').value);
            localStorage.setItem('omni_rr', document.getElementById('riskRatio').value);
            updateHeader();
        }

        function load() {
            document.getElementById('geminiKey').value = localStorage.getItem('omni_gem') || "";
            document.getElementById('metaToken').value = localStorage.getItem('omni_m_tok') || "";
            document.getElementById('metaId').value = localStorage.getItem('omni_m_id') || "";
            document.getElementById('manualBal').value = localStorage.getItem('omni_bal') || "1000";
            document.getElementById('riskPct').value = localStorage.getItem('omni_risk') || "1";
            document.getElementById('riskRatio').value = localStorage.getItem('omni_rr') || "2.5";
            setMode(localStorage.getItem('omni_mode') || 'manual');
            renderHistory();
        }

        function updateHeader() {
            const mode = localStorage.getItem('omni_mode');
            const bal = mode === 'manual' ? localStorage.getItem('omni_bal') : "LIVE";
            document.getElementById('topInfo').innerText = `$${bal} | RISK ${localStorage.getItem('omni_risk')}% | RR ${localStorage.getItem('omni_rr')}`;
        }

        function analyze() {
            document.getElementById('resultBox').classList.remove('hidden');
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('resDisplay').classList.add('hidden');
            
            // Simulation
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('resDisplay').classList.remove('hidden');
                
                const data = { strat: "SMC + FVG", trade: "BUY", entry: "88.13", sl: "87.50", tp: "90.20", lots: "0.25", logic: "Price tapped 1H FVG after liquidating internal lows. Expecting expansion to Friday's high." };
                
                document.getElementById('resStrat').innerText = data.strat;
                document.getElementById('resTrade').innerText = data.trade;
                document.getElementById('resEntry').innerText = data.entry;
                document.getElementById('resSL').innerText = data.sl;
                document.getElementById('resTP').innerText = data.tp;
                document.getElementById('resLots').innerText = data.lots;
                document.getElementById('resLogic').innerText = data.logic;
                
                saveHistory(data);
            }, 2000);
        }

        function saveHistory(data) {
            let h = JSON.parse(localStorage.getItem('omni_h') || '[]');
            h.unshift({ time: new Date().toLocaleTimeString(), ...data });
            localStorage.setItem('omni_h', JSON.stringify(h));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            const h = JSON.parse(localStorage.getItem('omni_h') || '[]');
            list.innerHTML = h.map((x, i) => `
                <div class="bg-black/40 p-4 rounded-2xl border-l-2 border-indigo-500 cursor-pointer overflow-hidden transition-all" onclick="this.classList.toggle('h-auto'); this.classList.toggle('max-h-12')">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[10px] font-black uppercase text-indigo-400">${x.trade} ${x.strat}</span>
                        <span class="text-[8px] text-slate-600">${x.time}</span>
                    </div>
                    <div class="text-[9px] text-slate-400 space-y-1">
                        <p>ENTRY: ${x.entry} | SL: ${x.sl} | TP: ${x.tp}</p>
                        <p class="border-t border-white/5 pt-2 mt-2 italic">${x.logic}</p>
                    </div>
                </div>
            `).join('');
        }

        window.onload = load;
    </script>
</body>
</html>
