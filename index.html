<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Trader Pro | Hybrid Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0b0e14; color: #e2e8f0; padding: 15px; }
        .glass { background: rgba(22, 27, 34, 0.85); backdrop-filter: blur(14px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-box { background: #0d1117; border: 1px solid #1e293b; border-radius: 10px; padding: 12px; color: white; width: 100%; outline: none; transition: 0.3s; font-size: 12px; }
        .input-box:focus { border-color: #6366f1; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <header class="max-w-4xl mx-auto flex justify-between items-center mb-8">
        <div>
            <h1 class="text-xl font-black text-indigo-500 italic uppercase tracking-tighter">Omni-Trader</h1>
            <p id="balanceDisplay" class="text-xs font-bold text-slate-400 mt-1">Balance: $0.00 (Manual)</p>
        </div>
        <button onclick="toggleSettings()" class="p-3 glass rounded-full text-slate-400 hover:text-white"><i class="fas fa-cog"></i></button>
    </header>

    <main class="max-w-4xl mx-auto">
        <div id="settingsPanel" class="hidden glass p-6 rounded-3xl mb-6 space-y-4 shadow-2xl">
            <h3 class="text-[10px] font-black text-indigo-400 uppercase tracking-widest border-b border-slate-800 pb-2">Terminal Settings</h3>
            
            <div class="flex gap-2 p-1 bg-black/40 rounded-xl">
                <button onclick="setMode('manual')" id="btnManual" class="flex-1 py-2 rounded-lg text-[10px] font-bold uppercase transition-all">Manual Mode</button>
                <button onclick="setMode('live')" id="btnLive" class="flex-1 py-2 rounded-lg text-[10px] font-bold uppercase transition-all">Live (MetaApi)</button>
            </div>

            <div id="manualInputs" class="space-y-3">
                <label class="text-[9px] text-slate-500 uppercase font-bold">Trading Balance ($)</label>
                <input type="number" id="manualBal" onchange="saveAll()" class="input-box" placeholder="Enter XM Balance">
            </div>

            <div id="liveInputs" class="hidden space-y-3">
                <input type="password" id="metaToken" onchange="saveAll()" class="input-box" placeholder="MetaApi Token">
                <input type="text" id="metaId" onchange="saveAll()" class="input-box" placeholder="MetaApi Account ID">
            </div>

            <input type="password" id="geminiKey" onchange="saveAll()" class="input-box" placeholder="Gemini AI Key">
            <button onclick="toggleSettings()" class="w-full py-2 bg-indigo-600 rounded-xl text-[10px] font-black uppercase mt-2">Save & Close</button>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="glass p-3 rounded-xl border-dashed border-slate-700 border-2">
                <input type="file" id="img1" class="text-[9px] w-full file:bg-indigo-600 file:border-0 file:rounded file:text-white file:px-2">
            </div>
            <div class="glass p-3 rounded-xl border-dashed border-slate-700 border-2"><input type="file" id="img2" class="text-[9px] w-full"></div>
            <div class="glass p-3 rounded-xl border-dashed border-slate-700 border-2"><input type="file" id="img3" class="text-[9px] w-full"></div>
            <div class="glass p-3 rounded-xl border-dashed border-slate-700 border-2"><input type="file" id="img4" class="text-[9px] w-full"></div>
        </div>

        <button onclick="runAnalysis()" class="w-full bg-indigo-600 py-4 rounded-2xl font-black uppercase tracking-[0.2em] mb-10">Run Analysis</button>

        <section class="glass p-5 rounded-3xl">
            <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Analysis History</h3>
            <div id="historyTable" class="space-y-3 max-h-60 overflow-y-auto pr-2">
                </div>
        </section>
    </main>

    <script>
        // --- MODE & STORAGE LOGIC ---
        function setMode(mode) {
            const man = document.getElementById('manualInputs');
            const live = document.getElementById('liveInputs');
            const btnM = document.getElementById('btnManual');
            const btnL = document.getElementById('btnLive');

            if(mode === 'manual') {
                man.classList.remove('hidden');
                live.classList.add('hidden');
                btnM.className = "flex-1 py-2 rounded-lg text-[10px] font-bold uppercase bg-indigo-600 text-white";
                btnL.className = "flex-1 py-2 rounded-lg text-[10px] font-bold uppercase text-slate-500";
            } else {
                man.classList.add('hidden');
                live.classList.remove('hidden');
                btnL.className = "flex-1 py-2 rounded-lg text-[10px] font-bold uppercase bg-indigo-600 text-white";
                btnM.className = "flex-1 py-2 rounded-lg text-[10px] font-bold uppercase text-slate-500";
            }
            localStorage.setItem('omni_mode', mode);
            updateBalanceUI();
        }

        function saveAll() {
            localStorage.setItem('omni_gemini', document.getElementById('geminiKey').value);
            localStorage.setItem('omni_meta_token', document.getElementById('metaToken').value);
            localStorage.setItem('omni_meta_id', document.getElementById('metaId').value);
            localStorage.setItem('omni_manual_bal', document.getElementById('manualBal').value);
            updateBalanceUI();
        }

        function loadAll() {
            document.getElementById('geminiKey').value = localStorage.getItem('omni_gemini') || "";
            document.getElementById('metaToken').value = localStorage.getItem('omni_meta_token') || "";
            document.getElementById('metaId').value = localStorage.getItem('omni_meta_id') || "";
            document.getElementById('manualBal').value = localStorage.getItem('omni_manual_bal') || "1000";
            setMode(localStorage.getItem('omni_mode') || 'manual');
            renderHistory();
        }

        function updateBalanceUI() {
            const mode = localStorage.getItem('omni_mode');
            const bal = mode === 'manual' ? localStorage.getItem('omni_manual_bal') : "---";
            document.getElementById('balanceDisplay').innerText = `Balance: $${bal} (${mode.toUpperCase()})`;
        }

        function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('hidden'); }

        // --- HISTORY / JOURNAL LOGIC ---
        function saveToHistory(data) {
            let history = JSON.parse(localStorage.getItem('omni_history') || '[]');
            history.unshift({ date: new Date().toLocaleString(), ...data });
            if(history.length > 20) history.pop();
            localStorage.setItem('omni_history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('historyTable');
            const history = JSON.parse(localStorage.getItem('omni_history') || '[]');
            container.innerHTML = history.map(h => `
                <div class="p-3 bg-black/20 rounded-xl border-l-2 border-indigo-500 text-[10px]">
                    <div class="flex justify-between font-black text-indigo-400"><span>${h.strategy}</span><span>${h.date}</span></div>
                    <div class="text-slate-400 mt-1">${h.trade} | Entry: ${h.entry} | Lots: ${h.lots}</div>
                </div>
            `).join('');
        }

        function runAnalysis() {
            // Your existing Gemini logic here...
            // At the end, call saveToHistory({ strategy: "SMC", trade: "BUY", entry: "88.13", lots: "0.15" });
            alert("Analysis Complete! Added to History.");
            saveToHistory({ strategy: "SMC", trade: "BUY", entry: "88.13", lots: "0.15" });
        }

        window.onload = loadAll;
    </script>
</body>
</html>
