<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI-REAL | INFINITY MASTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020204; color: #f1f5f9; font-family: system-ui, sans-serif; overflow-x: hidden; padding: 20px; }
        .master-glass { background: rgba(15, 15, 25, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.07); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .tier-card { border-radius: 35px; border: 2px dashed #27272a; min-height: 180px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        .has-file { border: 3px solid #10b981; background: rgba(16, 185, 129, 0.05); box-shadow: 0 0 30px rgba(16, 185, 129, 0.1); }
        .glow-bias { text-shadow: 0 0 45px currentColor; filter: brightness(1.2); letter-spacing: -0.05em; line-height: 0.8; }
        .btn-exec { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); padding: 26px; border-radius: 30px; transition: 0.2s; }
        .btn-exec:active { transform: scale(0.96); brightness: 1.1; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
    </style>
</head>
<body>

    <header class="flex justify-between items-center mb-8 px-2">
        <div>
            <h1 class="text-3xl font-black italic tracking-tighter text-white">OMNI-REAL</h1>
            <p class="text-[10px] font-bold text-indigo-500 uppercase tracking-[0.4em]">Institutional V10.0</p>
        </div>
        <div id="status" class="w-4 h-4 rounded-full bg-rose-600 shadow-[0_0_15px_rgba(225,29,72,0.5)]"></div>
    </header>

    <div class="master-glass p-6 rounded-[35px] mb-8 text-center border-l-8 border-indigo-600">
        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Optical Asset Scanner</p>
        <h2 id="assetDisplay" class="text-2xl font-black text-white uppercase italic tracking-tight">[ STANDBY ]</h2>
    </div>

    <div class="grid grid-cols-2 gap-5 mb-8">
        <div id="box0" class="tier-card flex flex-col items-center justify-center group">
            <input type="file" id="img0" accept="image/*" onchange="sync(0)" class="absolute inset-0 opacity-0 z-20 cursor-pointer">
            <div id="c0" class="text-center p-4">
                <i class="fa-solid fa-compass text-indigo-500 text-2xl mb-2"></i>
                <p class="text-[11px] font-black text-slate-400 uppercase tracking-tighter">1H Bias</p>
            </div>
        </div>
        <div id="box1" class="tier-card flex flex-col items-center justify-center">
            <input type="file" id="img1" accept="image/*" onchange="sync(1)" class="absolute inset-0 opacity-0 z-20 cursor-pointer">
            <div id="c1" class="text-center p-4">
                <i class="fa-solid fa-network-wired text-indigo-500 text-2xl mb-2"></i>
                <p class="text-[11px] font-black text-slate-400 uppercase tracking-tighter">15M Struct</p>
            </div>
        </div>
        <div id="box2" class="tier-card flex flex-col items-center justify-center">
            <input type="file" id="img2" accept="image/*" onchange="sync(2)" class="absolute inset-0 opacity-0 z-20 cursor-pointer">
            <div id="c2" class="text-center p-4">
                <i class="fa-solid fa-crosshairs text-indigo-500 text-2xl mb-2"></i>
                <p class="text-[11px] font-black text-slate-400 uppercase tracking-tighter">1M Entry</p>
            </div>
        </div>
        <div id="box3" class="tier-card flex flex-col items-center justify-center">
            <input type="file" id="img3" accept="image/*" onchange="sync(3)" class="absolute inset-0 opacity-0 z-20 cursor-pointer">
            <div id="c3" class="text-center p-4">
                <i class="fa-solid fa-chart-line text-indigo-500 text-2xl mb-2"></i>
                <p class="text-[11px] font-black text-slate-400 uppercase tracking-tighter">DXY Index</p>
            </div>
        </div>
    </div>

    <button id="go" onclick="run()" class="btn-exec w-full text-white font-black uppercase tracking-[0.2em] text-lg shadow-2xl mb-12">Perform Multi-Strategy Scan</button>

    <div id="results" class="hidden space-y-8 animate-in fade-in slide-in-from-bottom-10 duration-700">
        
        <div id="waitBox" class="hidden p-8 rounded-[40px] bg-amber-500/10 border-2 border-amber-500/30 text-center relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4 opacity-10"><i class="fa-solid fa-hourglass-start text-4xl"></i></div>
            <p class="text-[11px] font-black text-amber-500 uppercase tracking-[0.3em] mb-2">System Pause Trigger</p>
            <h3 id="waitMsg" class="text-3xl font-black text-white italic tracking-tighter"></h3>
        </div>

        <div class="text-center py-6">
            <h2 id="bias" class="text-[10rem] font-black italic glow-bias"></h2>
        </div>

        <div class="grid grid-cols-2 gap-4 text-center">
            <div class="master-glass p-6 rounded-3xl"><p class="text-[10px] text-slate-500 font-bold uppercase mb-2">Execution</p><p id="e" class="text-2xl font-mono text-white">--</p></div>
            <div class="master-glass p-6 rounded-3xl"><p class="text-[10px] text-indigo-400 font-bold uppercase mb-2">Lot Size (1%)</p><p id="l" class="text-2xl font-mono text-indigo-400">--</p></div>
            <div class="master-glass p-6 rounded-3xl border-rose-500/20"><p class="text-[10px] text-rose-500 font-bold uppercase mb-2">Stop Loss</p><p id="s" class="text-2xl font-mono text-rose-500">--</p></div>
            <div class="master-glass p-6 rounded-3xl border-emerald-500/20"><p class="text-[10px] text-emerald-500 font-bold uppercase mb-2">Take Profit</p><p id="t" class="text-2xl font-mono text-emerald-500">--</p></div>
        </div>

        <div class="master-glass p-8 rounded-[40px] border-t-4 border-indigo-500">
            <p class="text-[11px] text-indigo-400 font-black uppercase mb-4 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></span> Strategy Confluence Verdict
            </p>
            <p id="logic" class="text-md text-slate-300 leading-relaxed font-medium whitespace-pre-wrap"></p>
        </div>
    </div>

    <div class="mt-20 p-8 master-glass rounded-[35px] text-center opacity-40 hover:opacity-100 transition-opacity">
        <input type="password" id="key" placeholder="Terminal API Key" class="bg-transparent border-b border-white/20 w-full mb-6 p-3 text-center text-sm outline-none text-indigo-400">
        <button onclick="save()" class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Connect Terminal Engine</button>
    </div>

    <script src="strategies.js"></script>
</body>
</html>
