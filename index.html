<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Trader Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #05070a; color: #e2e8f0; margin: 0; overflow-x: hidden; }
        .glass { background: #0d1117; border: 1px solid #1f2937; }
        
        /* Pocket Option Style Sidebar Drawer */
        #sideDrawer {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: #0d1117; z-index: 1000; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid #1f2937;
        }
        #sideDrawer.open { left: 0; }
        .drawer-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); 
            display: none; z-index: 999;
        }
        .drawer-overlay.active { display: block; }

        /* Centered File Uploads */
        .upload-box {
            position: relative; height: 80px; display: flex; 
            align-items: center; justify-content: center;
            background: #0d1117; border: 1px dashed #1f2937; border-radius: 12px;
        }
        .file-input {
            position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 10;
        }
        .btn-label {
            background: #4f46e5; color: white; padding: 8px 16px;
            border-radius: 6px; font-size: 10px; font-weight: 900; text-transform: uppercase;
        }
        .status-icon { display: none; color: #10b981; font-size: 18px; }
        input:valid + .btn-label { display: none; }
        input:valid ~ .status-icon { display: block; }

        /* Toggle Switch */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #1f2937; border-radius: 20px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: #4f46e5; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

    <div id="overlay" class="drawer-overlay" onclick="toggleDrawer()"></div>

    <div id="sideDrawer" class="p-6">
        <div class="flex justify-between items-center mb-8">
            <span class="text-xs font-black uppercase text-indigo-400">Trading Terminal</span>
            <button onclick="toggleDrawer()"><i class="fas fa-times"></i></button>
        </div>
        
        <div class="space-y-6">
            <div class="flex items-center gap-4 p-3 hover:bg-white/5 rounded-xl cursor-pointer">
                <i class="fas fa-clock text-indigo-500"></i>
                <span class="text-sm font-bold">Analysis History</span>
            </div>
            
            <div class="flex items-center gap-4 p-3 hover:bg-white/5 rounded-xl cursor-pointer">
                <i class="fas fa-cog text-slate-400"></i>
                <span class="text-sm font-bold">System Settings</span>
            </div>

            <hr class="border-slate-800">

            <div class="p-3">
                <div class="flex justify-between items-center">
                    <span class="text-xs font-bold text-slate-500 uppercase">Live Engine</span>
                    <label class="switch">
                        <input type="checkbox" onchange="toggleMode()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto p-4">
        <header class="flex justify-between items-center py-8">
            <div class="flex items-center gap-4">
                <div class="h-16 w-16 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-2xl">
                    <i class="fas fa-bolt text-3xl text-white"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-black italic text-white tracking-tighter uppercase leading-none">OMNI-TRADER</h1>
                    <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mt-1">Multi-Strategy Scan</p>
                </div>
            </div>
            <button onclick="toggleDrawer()" class="h-10 w-10 flex items-center justify-center bg-white/5 rounded-lg">
                <i class="fas fa-bars text-xl"></i>
            </button>
        </header>

        <div class="mt-20 grid grid-cols-2 gap-4">
            <div class="upload-box glass">
                <input type="file" class="file-input" required>
                <div class="btn-label">4H Bias</div>
                <i class="fas fa-check-circle status-icon"></i>
            </div>
            <div class="upload-box glass">
                <input type="file" class="file-input" required>
                <div class="btn-label">1H Struct</div>
                <i class="fas fa-check-circle status-icon"></i>
            </div>
            <div class="upload-box glass">
                <input type="file" class="file-input" required>
                <div class="btn-label">Entry Flow</div>
                <i class="fas fa-check-circle status-icon"></i>
            </div>
            <div class="upload-box glass">
                <input type="file" class="file-input" required>
                <div class="btn-label">DXY Context</div>
                <i class="fas fa-check-circle status-icon"></i>
            </div>
        </div>

        <div class="mt-8">
            <button class="w-full bg-indigo-600 py-5 rounded-2xl font-black uppercase text-xs tracking-[0.3em] shadow-xl shadow-indigo-900/30">
                Run AI Analysis
            </button>
        </div>
    </div>

    <script>
        function toggleDrawer() {
            document.getElementById('sideDrawer').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }
        function toggleMode() {
            // Logic for switching between manual and live mode
        }
    </script>
</body>
</html>
