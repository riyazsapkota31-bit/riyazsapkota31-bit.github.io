<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OMNI-BLACK | TERMINAL v65.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --cyan: #00f2ff; --blue-glow: rgba(0, 242, 255, 0.3); }
        body { background: radial-gradient(circle at 50% 10%, #0d1117 0%, #000 100%); color: #fff; font-family: 'Inter', sans-serif; padding: 20px; min-height: 100vh; }
        .logo-text { font-size: 2.6rem; font-weight: 900; font-style: italic; letter-spacing: -0.04em; -webkit-text-stroke: 1.5px var(--cyan); text-shadow: 0 0 10px var(--blue-glow); }
        .upload-card { height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 24px; background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.06); transition: 0.3s; cursor: pointer; }
        .has-file { border: 1px solid var(--cyan) !important; background: rgba(0, 242, 255, 0.05) !important; }
        .btn-main { background: #fff; color: #000; font-weight: 900; text-transform: uppercase; letter-spacing: 0.3em; padding: 20px; border-radius: 18px; width: 100%; margin-top: 20px; }
        .label-v { font-size: 9px; font-weight: 800; color: rgba(255,255,255,0.3); text-transform: uppercase; margin-top: 8px; }
        .stat-box { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 18px; padding: 15px; text-align: center; }
    </style>
</head>
<body>
    <header class="flex justify-between items-center mb-8 pt-4">
        <div>
            <h1 class="logo-text">OMNI—BLACK</h1>
            <p class="text-[9px] font-black tracking-[0.3em] text-cyan-400 opacity-50 uppercase">v65.0 DUAL-CORE</p>
        </div>
        <button onclick="toggleSettings()" class="bg-white/5 w-12 h-12 rounded-xl text-cyan-400 border border-white/10"><i class="fa-solid fa-bolt"></i></button>
    </header>

    <div class="grid grid-cols-2 gap-3">
        <div id="box0" class="upload-card" onclick="document.getElementById('i0').click()">
            <input type="file" id="i0" hidden accept="image/*" onchange="sync(0)"><i class="fa-solid fa-chart-line opacity-20 text-xl"></i><p class="label-v">1H Chart</p>
        </div>
        <div id="box1" class="upload-card" onclick="document.getElementById('i1').click()">
            <input type="file" id="i1" hidden accept="image/*" onchange="sync(1)"><i class="fa-solid fa-layer-group opacity-20 text-xl"></i><p class="label-v">15M Struct</p>
        </div>
        <div id="box2" class="upload-card" onclick="document.getElementById('i2').click()">
            <input type="file" id="i2" hidden accept="image/*" onchange="sync(2)"><i class="fa-solid fa-crosshairs opacity-20 text-xl"></i><p class="label-v">1M Entry</p>
        </div>
        <div id="box3" class="upload-card" onclick="document.getElementById('i3').click()">
            <input type="file" id="i3" hidden accept="image/*" onchange="sync(3)"><i class="fa-solid fa-gauge-high opacity-20 text-xl"></i><p class="label-v">DXY Correlation</p>
        </div>
    </div>

    <button id="goBtn" onclick="executeSurgicalScan()" class="btn-main">Launch Scan</button>

    <div id="outPanel" class="hidden mt-8 pb-20 space-y-4">
        <div class="text-center py-4"><h2 id="biasTxt" class="text-7xl font-black italic tracking-tighter">--</h2></div>
        <div class="grid grid-cols-2 gap-3">
            <div class="stat-box"><p class="label-v">Entry</p><p id="entVal" class="text-xl font-bold font-mono">--</p></div>
            <div class="stat-box"><p class="label-v text-cyan-400">Lots</p><p id="lotVal" class="text-xl font-bold font-mono text-cyan-400">--</p></div>
            <div class="stat-box border-rose-900/30"><p class="label-v text-rose-500">SL</p><p id="slVal" class="text-xl font-bold font-mono text-rose-500">--</p></div>
            <div class="stat-box border-emerald-900/30"><p class="label-v text-emerald-400">TP</p><p id="tpVal" class="text-xl font-bold font-mono text-emerald-400">--</p></div>
        </div>
        <div id="logicSummary" class="p-5 rounded-2xl border border-white/5 bg-white/[0.01] text-[11px] font-bold text-white/60 uppercase italic leading-relaxed"></div>
    </div>

    <div id="settingsModal" class="fixed inset-0 bg-black/98 z-50 hidden flex-col items-center justify-center p-6">
        <div class="w-full max-w-xs space-y-4">
            <h3 class="text-center font-black italic text-white tracking-widest uppercase">Sync Core</h3>
            <input type="password" id="kIn" placeholder="GEMINI API KEY" class="bg-white/5 border border-white/10 rounded-xl w-full p-4 text-sm text-cyan-400 font-mono outline-none">
            <div class="grid grid-cols-2 gap-3">
                <input type="number" id="bIn" placeholder="BAL" class="bg-white/5 border border-white/10 rounded-xl p-4 text-sm outline-none">
                <input type="number" id="rIn" placeholder="RISK %" class="bg-white/5 border border-white/10 rounded-xl p-4 text-sm outline-none">
            </div>
            <button onclick="saveConfig()" class="btn-main">Update Hardware</button>
            <p onclick="toggleSettings()" class="text-center text-[10px] text-white/30 uppercase font-black cursor-pointer">Close</p>
        </div>
    </div>

    <script src="strategies.js"></script>
    <script>
        window.omniFiles = [null, null, null, null];
        function sync(i) {
            const f = document.getElementById(`i${i}`).files[0];
            if(f) { document.getElementById(`box${i}`).classList.add('has-file'); window.omniFiles[i] = f; }
        }
        function toggleSettings() { document.getElementById('settingsModal').classList.toggle('hidden'); document.getElementById('settingsModal').classList.toggle('flex'); }
        function saveConfig() {
            localStorage.setItem('omni_api_key', document.getElementById('kIn').value);
            localStorage.setItem('omni_balance', document.getElementById('bIn').value);
            localStorage.setItem('omni_risk', document.getElementById('rIn').value);
            alert("Terminal Synced."); toggleSettings();
        }
        window.onload = () => {
            document.getElementById('kIn').value = localStorage.getItem('omni_api_key') || '';
            document.getElementById('bIn').value = localStorage.getItem('omni_balance') || '';
            document.getElementById('rIn').value = localStorage.getItem('omni_risk') || '';
        };
    </script>
</body>
</html>
