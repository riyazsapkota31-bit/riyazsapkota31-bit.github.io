<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Omni-Trader Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0e14] text-slate-200 p-4 md:p-8">
    <div class="max-w-md mx-auto bg-[#161b22] border border-slate-800 p-6 rounded-3xl shadow-2xl">
        <h1 class="text-3xl font-black text-indigo-500 italic text-center mb-6">OMNI-TRADER</h1>
        
        <input type="password" id="key" class="w-full bg-[#0d1117] border border-slate-700 rounded-2xl py-4 px-5 mb-4 text-sm focus:border-indigo-500 outline-none" placeholder="Enter Gemini API Key">
        
        <div class="space-y-3 mb-6">
            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest">Upload Charts</label>
            <input type="file" id="f1" class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-500">
            <input type="file" id="f2" class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-500">
        </div>

        <button onclick="analyze()" id="btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-2xl font-bold uppercase tracking-widest transition-all">Start AI Analysis</button>
        
        <div id="out" class="mt-6 p-4 bg-[#0d1117] rounded-2xl border border-slate-800 text-sm whitespace-pre-wrap min-h-[100px] leading-relaxed"></div>
    </div>

    <script>
        async function toB64(f) { return new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result.split(',')[1]); }); }

        async function analyze() {
            const key = document.getElementById('key').value;
            const files = [document.getElementById('f1').files[0], document.getElementById('f2').files[0]].filter(x => x);
            const out = document.getElementById('out');
            if(!key || files.length < 1) return alert("Please provide your key and at least one chart.");

            out.innerText = "Connecting to AI... Trying available models...";
            const b64 = await Promise.all(files.map(f => toB64(f)));

            // Fallback list to handle "Model Not Found" errors
            const modelList = ["gemini-1.5-flash", "gemini-1.5-flash-8b", "gemini-1.5-pro"];
            let success = false;

            for (let modelName of modelList) {
                if (success) break;
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${key}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [
                                { text: "Analyze these charts. Provide Trade (Buy/Sell), Entry, SL, TP, and one-sentence logic." },
                                ...b64.map(d => ({ inline_data: { mime_type: "image/jpeg", data: d } }))
                            ]}]
                        })
                    });

                    const data = await response.json();
                    if (data.candidates) {
                        out.innerText = data.candidates[0].content.parts[0].text;
                        success = true;
                    } else if (data.error && data.error.status === "RESOURCE_EXHAUSTED") {
                        out.innerText = "Quota full for " + modelName + ". Trying next model...";
                    }
                } catch (e) { console.error(modelName + " failed."); }
            }
            if (!success) out.innerText = "Critical: No compatible models found or Daily Quota Exceeded. Please try a new API key.";
        }
    </script>
</body>
</html>
