<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Strategy AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="strategies.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#0b0e14] text-slate-200 font-sans min-h-screen">

    <div class="max-w-2xl mx-auto p-5">
        <header class="text-center py-8">
            <h1 class="text-4xl font-black text-indigo-500 tracking-tighter italic">OMNI<span class="text-white text-2xl not-italic">TRADER</span></h1>
            <p class="text-slate-500 text-sm mt-2 uppercase tracking-widest">Multi-Timeframe Analysis Engine</p>
        </header>

        <div class="bg-[#161b22] border border-slate-800 p-4 rounded-2xl mb-8 shadow-xl">
            <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Secure API Access</label>
            <div class="relative flex items-center">
                <input type="password" id="apiKey" 
                       class="w-full bg-[#0d1117] border border-slate-700 rounded-xl py-3 px-4 text-indigo-400 focus:outline-none focus:border-indigo-500 transition-all" 
                       placeholder="Enter Gemini API Key...">
                <button onclick="toggleKey()" class="absolute right-4 text-slate-500 hover:text-white">
                    <i id="eyeIcon" class="fas fa-eye"></i>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-[#161b22] p-4 rounded-2xl border border-slate-800 text-center">
                <span class="text-xs font-bold text-indigo-400 uppercase">Step 1: Trend</span>
                <h3 class="font-bold my-2">4H Chart</h3>
                <input type="file" id="img4h" class="hidden" onchange="updateLabel('img4h', 'lbl4h')">
                <label for="img4h" id="lbl4h" class="cursor-pointer block bg-[#21262d] py-3 rounded-xl border-2 border-dashed border-slate-700 hover:border-indigo-500 transition-all text-xs text-slate-400">
                    <i class="fas fa-cloud-upload-alt mb-1 text-lg"></i><br>Choose File
                </label>
            </div>
            <div class="bg-[#161b22] p-4 rounded-2xl border border-slate-800 text-center">
                <span class="text-xs font-bold text-indigo-400 uppercase">Step 2: Level</span>
                <h3 class="font-bold my-2">1H Chart</h3>
                <input type="file" id="img1h" class="hidden" onchange="updateLabel('img1h', 'lbl1h')">
                <label for="img1h" id="lbl1h" class="cursor-pointer block bg-[#21262d] py-3 rounded-xl border-2 border-dashed border-slate-700 hover:border-indigo-500 transition-all text-xs text-slate-400">
                    <i class="fas fa-cloud-upload-alt mb-1 text-lg"></i><br>Choose File
                </label>
            </div>
            <div class="bg-[#161b22] p-4 rounded-2xl border border-slate-800 text-center">
                <span class="text-xs font-bold text-indigo-400 uppercase">Step 3: Entry</span>
                <h3 class="font-bold my-2">15M Chart</h3>
                <input type="file" id="img15m" class="hidden" onchange="updateLabel('img15m', 'lbl15m')">
                <label for="img15m" id="lbl15m" class="cursor-pointer block bg-[#21262d] py-3 rounded-xl border-2 border-dashed border-slate-700 hover:border-indigo-500 transition-all text-xs text-slate-400">
                    <i class="fas fa-cloud-upload-alt mb-1 text-lg"></i><br>Choose File
                </label>
            </div>
        </div>

        <button onclick="analyze()" id="mainBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-5 rounded-2xl font-black uppercase tracking-[0.2em] shadow-lg shadow-indigo-500/20 transition-all transform active:scale-95">
            Execute Strategy Analysis
        </button>

        <div id="result" class="mt-8 hidden bg-[#161b22] rounded-3xl border border-slate-800 p-6">
            <div id="loader" class="hidden text-center py-10">
                <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-indigo-500 border-t-transparent mb-4"></div>
                <p class="text-indigo-400 font-bold animate-pulse">Scanning Price Action...</p>
            </div>
            <div id="setupContent" class="text-sm leading-relaxed font-mono text-slate-300"></div>
        </div>
    </div>

    <script>
        function toggleKey() {
            const input = document.getElementById('apiKey');
            const icon = document.getElementById('eyeIcon');
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = "password";
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function updateLabel(inputId, labelId) {
            const input = document.getElementById(inputId);
            const label = document.getElementById(labelId);
            if (input.files.length > 0) {
                label.innerHTML = `<i class="fas fa-check-circle text-green-500"></i><br>${input.files[0].name.substring(0,10)}...`;
                label.classList.replace('border-slate-700', 'border-green-500');
            }
        }

        async function toBase64(f) { return new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result.split(',')[1]); }); }

        async function analyze() {
            const key = document.getElementById('apiKey').value;
            const btn = document.getElementById('mainBtn');
            const resDiv = document.getElementById('result');
            const content = document.getElementById('setupContent');
            const loader = document.getElementById('loader');

            if(!key) return alert("Please enter API Key");
            
            const imgs = [document.getElementById('img4h').files[0], document.getElementById('img1h').files[0], document.getElementById('img15m').files[0]];
