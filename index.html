<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Trader Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #05070a; color: #e2e8f0; margin: 0; overflow-x: hidden; }
        .glass { background: #0d1117; border: 1px solid #1f2937; }
        
        /* Sidebar Navigation */
        #sideDrawer {
            position: fixed; top: 0; left: -320px; width: 320px; height: 100%;
            background: #0d1117; z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid #1f2937; box-shadow: 20px 0 50px rgba(0,0,0,0.8);
        }
        #sideDrawer.open { left: 0; }
        .sub-panel { position: absolute; top: 0; left: 100%; width: 100%; height: 100%; background: #0d1117; transition: 0.3s; z-index: 1001; padding: 24px; }
        .sub-panel.active { left: 0; }

        /* Trading Aesthetic Uploads */
        .upload-box {
            position: relative; height: 100px; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: linear-gradient(145deg, #0d1117, #161b22);
            border: 1px solid #1f2937; border-radius: 16px; transition: 0.3s;
        }
        .upload-box:hover { border-color: #4f46e5; box-shadow: 0 0 15px rgba(79, 70, 229, 0.2); }
        .file-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 10; }
        .box-label { font-size: 8px; font-weight: 900; color: #475569; text-transform: uppercase; margin-top: 8px; }
        .btn-ui { background: #4f46e5; color: white; padding: 6px 12px; border-radius: 4px; font-size: 9px; font-weight: 900; pointer-events: none; }
        
        /* Success Tick */
        .tick { display: none; color: #10b981; font-size: 24px; }
        input:valid ~ .btn-ui, input:valid ~ .box-label { display: none; }
        input:valid ~ .tick { display: block; }

        /* Switch */
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #1f2937; border-radius: 34px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: #4f46e5; }
        input:checked + .slider:before { transform: translateX(24px); }

        .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 999; backdrop-filter: blur(4px); }
        .drawer-overlay.active { display: block; }
    </style>
</head>
<body>

    <div id="overlay" class="drawer-overlay" onclick="toggleDrawer()"></div>

    <div id="sideDrawer">
        <div class="p-6 space-y-8">
            <div class="flex justify-between items-center">
                <span class="text-xs font-black uppercase text-indigo-500 tracking-widest">Main Terminal</span>
                <button onclick="toggleDrawer()"><i class="fas fa-times text-slate-500"></i></button>
            </div>

            <div class="p-4 glass rounded-2xl border-indigo-500/30">
                <label class="text-[9px] font-black text-indigo-400 uppercase block mb-2">Gemini AI Key</label>
                <input type="password" id="gem" onchange="save()" placeholder="Enter Permanent API" class="w-full bg-black/50 border border-slate-800 rounded-lg p-2 text-xs outline-none focus:border-indigo-500">
            </div>

            <nav class="space-y-4">
                <div onclick="openSub('historyPanel')" class="flex items-center justify-between p-4 glass rounded-xl cursor-pointer hover:bg-white/5">
                    <div class="flex items-center gap-4"><i class="fas fa-clock text-indigo-500"></i><span class="text-sm font-bold">Trade History</span></div>
                    <i class="fas fa-chevron-right text-[10px] text-slate-600"></i>
                </div>
                <div onclick="openSub('settingsPanel')" class="flex items-center justify-between p-4 glass rounded-xl cursor-pointer hover:bg-white/5">
                    <div class="flex items-center gap-4"><i class="fas fa-cog text-slate-400"></i><span class="text-sm font-bold">Configuration</span></div>
                    <i class="fas fa-chevron-right text-[10px] text-slate-600"></i>
                </div>
            </nav>
        </div>

        <div id="historyPanel" class="sub-panel">
            <button onclick="closeSub('historyPanel')" class="flex items-center gap-2 text-indigo-400 text-xs font-bold mb-6"><i class="fas fa-arrow-left"></i> BACK</button>
            <h3 class="text-xs font-black uppercase mb-4">Recent Analysis</h3>
            <div id="histList" class="space-y-3">
                </div>
            <div id="histDetail" class="hidden mt-4 p-4 glass rounded-xl text-[10px] space-y-2 border-l-2 border-indigo-500">
                <p id="detText"></p>
                <button onclick="document.getElementById('histDetail').classList.add('hidden')" class="text-indigo-400 underline uppercase mt-2">Close Details</button>
            </div>
        </div>

        <div id="settingsPanel" class="sub-panel">
            <button onclick="closeSub('settingsPanel')" class="flex items-center gap-2 text-indigo-400 text-xs font-bold mb-6"><i class="fas fa-arrow-left"></i> BACK</button>
            <div class="flex justify-between items-center mb-8">
                <span class="text-xs font-bold uppercase">Trading Mode</span>
                <label class="switch">
                    <input type="checkbox" id="modeSw" onchange="toggleMode()">
                    <span class="slider"></span>
                </label>
            </div>
            
            <div id="manFields" class="space-y-4">
                <input type="number" id="bal" onchange="save()" placeholder="XM Balance ($)" class="w-full bg-black border border-slate-800 rounded-xl p-3 text-xs outline-none">
            </div>
            <div id="liveFields" class="hidden space-y-4">
                <input type="password" id="tok" onchange="save()" placeholder="MetaApi Token" class="w-full bg-black border border-slate-800 rounded-xl p-3 text-xs outline-none">
                <input type="text" id="acc" onchange="save()" placeholder="Account ID" class="w-full bg-black border border-slate-800 rounded-xl p-3 text-xs outline-none">
            </div>
            <div class="grid grid-cols-2 gap-4 mt-4">
                <input type="number" id="risk" onchange="save()" placeholder="Risk %" class="w-full bg-black border border-slate-800 rounded-xl p-3 text-xs outline-none">
                <input type="number" id="rr" onchange="save()" placeholder="R:R Ratio" class="w-full bg-black border border-slate-800 rounded-xl p-3 text-xs outline-none">
            </div>
        </div>
    </div>

    <main class="max-w-md mx-auto p-4">
        <header class="flex justify-between items-center py-10">
            <div class="flex items-center gap-5">
                <div class="h-20 w-20 bg-indigo-600 rounded-3xl flex items-center justify-center shadow-2xl shadow-indigo-900/50">
                    <i class="fas fa-chart-line text-4xl text-white"></i>
                </div>
                <div>
                    <h1 class="text-4xl font-black italic text-white tracking-tighter uppercase leading-none">OMNI-TRADER</h1>
                    <p id="modeStatus" class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em] mt-2">Manual Calculation</p>
                </div>
            </div>
            <button onclick="toggleDrawer()" class="h-12 w-12 flex items-center justify-center glass rounded-2xl hover:border-indigo-500 transition-all">
                <i class="fas fa-bars text-xl"></i>
            </button>
        </header>

        <div class="mt-24 grid grid-cols-2 gap-4">
            <div class="upload-box">
                <input type="file" class="file-input" required>
                <div class="btn-ui">Choose File</div>
                <div class="box-label">4H Timeframe</div>
                <i class="fas fa-check-circle tick"></i>
            </div>
            <div class="upload-box">
                <input type="file" class="file-input" required>
                <div class="btn-ui">Choose File</div>
                <div class="box-label">1H Structure</div>
                <i class="fas fa-check-circle tick"></i>
            </div>
            <div class="upload-box">
                <input type="file" class="file-input" required>
                <div class="btn-ui">Choose File</div>
                <div class="box-label">M15 Entry</div>
                <i class="fas fa-check-circle tick"></i>
            </div>
            <div class="upload-box">
                <input type="file" class="file-input" required>
                <div class="btn-ui">Choose File</div>
                <div class="box-label">DXY Index</div>
                <i class="fas fa-check-circle tick"></i>
            </div>
        </div>

        <button onclick="simulate()" class="w-full mt-10 bg-indigo-600 py-6 rounded-2xl font-black uppercase text-sm tracking-[0.4em] shadow-xl hover:bg-indigo-500 active:scale-95 transition-all">
            Initiate Scan
        </button>

        <div id="res" class="hidden mt-10 glass rounded-3xl p-8 border-t-2 border-indigo-500">
            <div class="flex justify-between items-center mb-6">
                <h2 id="rAct" class="text-4xl font-black italic uppercase">---</h2>
                <div class="text-right">
                    <span class="text-[9px] text-slate-500 font-black uppercase block">Lots</span>
                    <span id="rLot" class="text-2xl font-bold">0.00</span>
                </div>
            </div>
            <div class="grid grid-cols-3 gap-2 py-4 border-t border-white/5">
                <div><label class="text-[8px] text-slate-500 block">ENTRY</label><span id="rE" class="font-bold text-xs">---</span></div>
                <div><label class="text-[8px] text-red-500 block">STOP</label><span id="rS" class="font-bold text-xs">---</span></div>
                <div><label class="text-[8px] text-green-500 block">TARGET</label><span id="rT" class="font-bold text-xs">---</span></div>
            </div>
        </div>
    </main>

    <script>
        function toggleDrawer() {
            document.getElementById('sideDrawer').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }
        function openSub(id) { document.getElementById(id).classList.add('active'); }
        function closeSub(id) { document.getElementById(id).classList.remove('active'); }

        function toggleMode() {
            const isLive = document.getElementById('modeSw').checked;
            document.getElementById('manFields').classList.toggle('hidden', isLive);
            document.getElementById('liveFields').classList.toggle('hidden', !isLive);
            document.getElementById('modeStatus').innerText = isLive ? "Live Sync Active" : "Manual Calculation";
        }

        function simulate() {
            document.getElementById('res').classList.remove('hidden');
            const data = { act: "Long", lot: "0.20", e: "88.13", s: "87.50", t: "90.00", info: "Bullish divergence on M15. Price reclaimed 1H FVG." };
            document.getElementById('rAct').innerText = data.act;
            document.getElementById('rLot').innerText = data.lot;
            document.getElementById('rE').innerText = data.e;
            document.getElementById('rS').innerText = data.s;
            document.getElementById('rT').innerText = data.t;
            saveHistory(data);
        }

        function saveHistory(d) {
            const list = document.getElementById('histList');
            const item = document.createElement('div');
            item.className = "p-3 bg-black/40 rounded-xl text-[10px] cursor-pointer hover:border-indigo-500 border border-transparent";
            item.innerHTML = `<strong>${d.act}</strong> - ${new Date().toLocaleTimeString()}`;
            item.onclick = () => {
                document.getElementById('detText').innerText = `Setup: ${d.act} at ${d.e}\nStop: ${d.s} | Target: ${d.t}\nLogic: ${d.info}`;
                document.getElementById('histDetail').classList.remove('hidden');
            };
            list.prepend(item);
        }
    </script>
</body>
</html>
