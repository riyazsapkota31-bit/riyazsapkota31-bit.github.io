<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OMNI-BLACK | MASTER TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: system-ui, sans-serif; padding: 20px; -webkit-font-smoothing: antialiased; }
        .glass { background: rgba(12, 12, 15, 0.98); border: 1px solid rgba(255,255,255,0.08); border-radius: 40px; }
        .tier-box { border: 2px dashed #262626; border-radius: 45px; min-height: 185px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .has-file { border: 3px solid #10b981; background: rgba(16, 185, 129, 0.05); box-shadow: 0 0 30px rgba(16, 185, 129, 0.2); }
        .glow-bias { text-shadow: 0 0 60px currentColor; font-size: clamp(7rem, 18vw, 10rem); font-weight: 900; line-height: 0.8; letter-spacing: -0.05em; italic; }
        .btn-exec { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); border-radius: 35px; padding: 28px; font-weight: 900; transition: 0.2s; border: 1px solid rgba(255,255,255,0.1); }
        .btn-exec:active { transform: scale(0.96); filter: brightness(1.2); }
        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
    </style>
</head>
<body>

    <header class="flex justify-between items-center mb-10 px-2">
        <div>
            <h1 class="text-3xl font-black italic tracking-tighter leading-none">OMNI-BLACK</h1>
            <p class="text-[10px] font-bold text-indigo-500 uppercase tracking-[0.5em] mt-1">Surgical Terminal V10</p>
        </div>
        <div id="status" class="w-4 h-4 rounded-full bg-rose-600 shadow-[0_0_20px_rgba(225,29,72,0.5)]"></div>
    </header>

    <div class="glass p-7 mb-10 border-l-[10px] border-indigo-600 shadow-2xl">
        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 italic">Neural Analysis Engine</p>
        <h2 id="pairDisp" class="text-2xl font-black text-white italic uppercase tracking-tighter">[ SYSTEM STANDBY ]</h2>
    </div>

    <div class="grid grid-cols-2 gap-6 mb-10">
        <div id="box0" class="tier-box">
            <input type="file" id="i0" accept="image/*" onchange="sync(0)" class="absolute inset-0 opacity-0 z-30 cursor-pointer">
            <div id="t0" class="text-center"><i class="fa-solid fa-compass text-indigo-500 text-3xl mb-2"></i><p class="text-[11px] font-black text-slate-400 uppercase">1H Bias</p></div>
        </div>
        <div id="box1" class="tier-box">
            <input type="file" id="i1" accept="image/*" onchange="sync(1)" class="absolute inset-0 opacity-0 z-30 cursor-pointer">
            <div id="t1" class="text-center"><i class="fa-solid fa-layer-group text-indigo-500 text-3xl mb-2"></i><p class="text-[11px] font-black text-slate-400 uppercase">15M Struct</p></div>
        </div>
        <div id="box2" class="tier-box">
            <input type="file" id="i2" accept="image/*" onchange="sync(2)" class="absolute inset-0 opacity-0 z-30 cursor-pointer">
            <div id="t2" class="text-center"><i class="fa-solid fa-crosshairs text-indigo-500 text-3xl mb-2"></i><p class="text-[11px] font-black text-slate-400 uppercase">1M Entry</p></div>
        </div>
        <div id="box3" class="tier-box">
            <input type="file" id="i3" accept="image/*" onchange="sync(3)" class="absolute inset-0 opacity-0 z-30 cursor-pointer">
            <div id="t3" class="text-center"><i class="fa-solid fa-chart-line text-indigo-500 text-3xl mb-2"></i><p class="text-[11px] font-black text-slate-400 uppercase">DXY Index</p></div>
        </div>
    </div>

    <button id="go" onclick="runScan()" class="btn-exec w-full text-white uppercase text-lg mb-12 shadow-2xl">Execute Surgical Scan</button>

    <div id="results" class="hidden space-y-10 pb-24 animate-in fade-in slide-in-from-bottom-12 duration-700">
        
        <div id="waitBox" class="hidden p-8 rounded-[45px] bg-amber-500/10 border-2 border-amber-500/30 text-center relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4 opacity-10"><i class="fa-solid fa-shield-halved text-4xl"></i></div>
            <p class="text-[11px] font-black text-amber-500 uppercase tracking-[0.3em] mb-2">Execution Guard</p>
            <h3 id="waitMsg" class="text-3xl font-black text-white italic tracking-tighter"></h3>
        </div>

        <div class="text-center"><h2 id="bias" class="italic glow-bias"></h2></div>

        <div class="grid grid-cols-2 gap-5 text-center">
            <div class="glass p-7"><p class="text-[10px] text-slate-500 font-bold uppercase mb-2">Execution</p><p id="e" class="text-3xl font-mono text-white">--</p></div>
            <div class="glass p-7 text-indigo-400"><p class="text-[10px] font-bold uppercase mb-2">Lots (1%)</p><p id="l" class="text-3xl font-mono">--</p></div>
            <div class="glass p-7 text-rose-500 border-rose-500/10"><p class="text-[10px] font-bold uppercase mb-2">Stop Loss</p><p id="s" class="text-3xl font-mono">--</p></div>
            <div class="glass p-7 text-emerald-500 border-emerald-500/10"><p class="text-[10px] font-bold uppercase mb-2">Profit</p><p id="t" class="text-3xl font-mono">--</p></div>
        </div>

        <div class="glass p-10 border-t-[6px] border-indigo-600 shadow-inner">
            <p class="text-[11px] text-indigo-400 font-black uppercase mb-5 flex items-center gap-3">
                <span class="w-3 h-3 rounded-full bg-indigo-500 status-pulse"></span> Tactical Confluence
            </p>
            <p id="logic" class="text-lg text-slate-200 leading-snug font-bold italic whitespace-pre-wrap"></p>
        </div>
    </div>

    <div class="mt-20 p-10 glass opacity-10 hover:opacity-100 transition-all duration-700 text-center">
        <input type="password" id="keyIn" placeholder="Enter API Key" class="bg-transparent border-b border-white/20 w-full mb-8 p-3 text-center text-sm outline-none text-indigo-400 font-mono">
        <button onclick="saveKey()" class="text-[10px] font-black uppercase text-slate-400 tracking-[0.5em]">Sync Neural Key</button>
    </div>

    <script>
        let KEY = localStorage.getItem('omni_master_v10') || "";
        let files = [null, null, null, null];

        if (KEY) validate(KEY);

        async function validate(k) {
            const s = document.getElementById('status');
            const d = document.getElementById('pairDisp');
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${k}`, {
                    method: 'POST', body: JSON.stringify({ contents: [{ parts: [{ text: 'ping' }] }] })
                });
                if (res.ok) {
                    s.className = "w-4 h-4 rounded-full bg-emerald-500 shadow-[0_0_25px_#10b981] status-pulse";
                    d.innerText = "[ TERMINAL LINK ACTIVE ]";
                } else throw new Error();
            } catch (e) {
                s.className = "w-4 h-4 rounded-full bg-rose-600 shadow-[0_0_25px_#e11d48]";
                d.innerText = "[ API AUTH FAILED ]";
            }
        }

        function saveKey() {
            const v = document.getElementById('keyIn').value.trim();
            if (v) { localStorage.setItem('omni_master_v10', v); location.reload(); }
        }

        function sync(i) {
            files[i] = document.getElementById(`i${i}`).files[0];
            document.getElementById(`box${i}`).classList.add('has-file');
            document.getElementById(`t${i}`).innerHTML = `<i class="fa-solid fa-shield-check text-emerald-500 text-5xl"></i>`;
        }

        async function runScan() {
            if (!KEY || files.includes(null)) return alert("Connect Key & Upload all 4 Tiers.");
            
            const btn = document.getElementById('go');
            const disp = document.getElementById('pairDisp');
            btn.innerHTML = `<i class="fa-solid fa-atom fa-spin mr-3"></i> DECODING CONFLUENCE...`;
            disp.innerText = "OPTICAL DETECTION ACTIVE...";

            try {
                const parts = await Promise.all(files.map(f => {
                    return new Promise(r => {
                        const rd = new FileReader();
                        rd.readAsDataURL(f);
                        rd.onload = () => r({ inlineData: { mimeType: f.type, data: rd.result.split(',')[1] } });
                    });
                }));

                const prompt = `Task: Surgical Asset Analysis.
                1. Detect Asset Pair.
                2. Logic: 1H Context + 15M Structure + 1M Precision + DXY Alignment.
                3. IF choppy: set bias "WAIT" + trigger_price. 
                4. Self-Correct: Ensure SL/TP allows min 1:3 RR.
                5. VERDICT: Strictly 30-40 words total. 

                FORMAT:
                CONTEXT: [Trend/DXY]
                TRAP: [Liquidity/Inducement]
                TRIGGER: [1M Entry Condition]

                JSON ONLY:
                {
                    "p": "PAIR", "b": "BUY|SELL|WAIT", "e": number, "s": number, "t": number, "tr": number,
                    "l": "CONTEXT: [Short]\\nTRAP: [Short]\\nTRIGGER: [Short]"
                }`;

                const req = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${KEY}`, {
                    method: 'POST',
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, ...parts] }] })
                });

                const raw = await req.json();
                const res = JSON.parse(raw.candidates[0].content.parts[0].text.match(/\{[\s\S]*\}/)[0]);
                
                disp.innerText = `TARGET: ${res.p}`;
                render(res);
            } catch (e) { alert("SCAN ERROR: Ensure images are clear."); }
            finally { btn.innerText = "Execute Surgical Scan"; }
        }

        function render(d) {
            document.getElementById('results').classList.remove('hidden');
            const b = document.getElementById('bias');
            const w = document.getElementById('waitBox');
            
            b.innerText = d.b;
            if (d.b === "WAIT") {
                w.classList.remove('hidden');
                document.getElementById('waitMsg').innerText = `TRIGGER PRICE: ${d.tr || 'N/A'}`;
                b.className = "italic glow-bias text-amber-500";
            } else {
                w.classList.add('hidden');
                b.className = d.b === 'BUY' ? "italic glow-bias text-emerald-500" : "italic glow-bias text-rose-600";
            }

            document.getElementById('e').innerText = d.e || "--";
            document.getElementById('s').innerText = d.s || "--";
            document.getElementById('t').innerText = d.t || "--";
            document.getElementById('logic').innerText = d.l;
            
            const dist = Math.abs(d.e - d.s);
            document.getElementById('l').innerText = dist > 0 ? ((1000 * 0.01) / (dist * 10)).toFixed(2) : "ADAPTIVE";
            document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
