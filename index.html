<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OMNI-BLACK | NEON</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon: #3b82f6; --glow: rgba(59, 130, 246, 0.5); }
        
        body { 
            background: #000; color: #fff; font-family: 'Inter', sans-serif; 
            padding: 24px; overflow-x: hidden; -webkit-font-smoothing: antialiased;
        }

        /* ⚡️ ATTRACTIVE LOGO: WHITE TEXT + BLUE BORDER GLOW ⚡️ */
        .brand-header {
            font-size: 2.8rem; font-weight: 900; font-style: italic; letter-spacing: -0.02em;
            color: #fff;
            text-shadow: 
                -1px -1px 0 var(--neon),  
                 1px -1px 0 var(--neon),
                -1px  1px 0 var(--neon),
                 1px  1px 0 var(--neon),
                 0 0 20px var(--glow);
            margin-bottom: 5px;
        }

        /* 💎 ATTRACTIVE GLOW BOXES 💎 */
        .upload-box { 
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; height: 140px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Hover/Active Glow */
        .upload-box:active { transform: scale(0.93); border-color: var(--neon); }
        
        /* THE "UPLOADED" GLOW STATE */
        .has-file { 
            border: 2px solid var(--neon) !important;
            background: rgba(59, 130, 246, 0.05) !important;
            box-shadow: 0 0 25px var(--glow), inset 0 0 15px rgba(59, 130, 246, 0.2) !important;
        }
        .has-file i { color: var(--neon); text-shadow: 0 0 15px var(--neon); transform: scale(1.1); }

        /* EXECUTE BUTTON */
        .btn-glow {
            background: #fff; color: #000; font-weight: 900;
            text-transform: uppercase; letter-spacing: 0.4em;
            border-radius: 18px; padding: 22px; width: 100%;
            transition: 0.3s; margin-top: 20px;
        }
        .btn-glow:active { transform: scale(0.96); box-shadow: 0 0 40px rgba(255,255,255,0.2); }

        .label-text { font-size: 10px; font-weight: 900; color: #444; letter-spacing: 0.3em; text-transform: uppercase; margin-top: 10px; }
        .glass-panel { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border-radius: 30px; border: 1px solid rgba(255,255,255,0.08); }
    </style>
</head>
<body>

    <header class="flex justify-between items-start mb-12 mt-4">
        <div>
            <h1 class="brand-header">OMNI—BLACK</h1>
            <p class="text-[9px] font-black tracking-[0.6em] text-slate-500 uppercase ml-1">Precision Terminal</p>
        </div>
        <button onclick="toggleSettings()" class="w-12 h-12 glass-panel flex items-center justify-center">
            <i class="fa-solid fa-gear text-blue-500"></i>
        </button>
    </header>

    <div class="grid grid-cols-2 gap-6 mb-10">
        <div id="box0" class="upload-box" onclick="document.getElementById('i0').click()">
            <input type="file" id="i0" hidden accept="image/*" onchange="sync(0)">
            <i class="fa-solid fa-chart-pie text-slate-800 text-3xl transition-all" id="ic0"></i>
            <p class="label-text">1H Context</p>
        </div>
        <div id="box1" class="upload-box" onclick="document.getElementById('i1').click()">
            <input type="file" id="i1" hidden accept="image/*" onchange="sync(1)">
            <i class="fa-solid fa-microscope text-slate-800 text-3xl transition-all" id="ic1"></i>
            <p class="label-text">15M Macro</p>
        </div>
        <div id="box2" class="upload-box" onclick="document.getElementById('i2').click()">
            <input type="file" id="i2" hidden accept="image/*" onchange="sync(2)">
            <i class="fa-solid fa-bolt text-slate-800 text-3xl transition-all" id="ic2"></i>
            <p class="label-text">1M Trigger</p>
        </div>
        <div id="box3" class="upload-box" onclick="document.getElementById('i3').click()">
            <input type="file" id="i3" hidden accept="image/*" onchange="sync(3)">
            <i class="fa-solid fa-wave-square text-slate-800 text-3xl transition-all" id="ic3"></i>
            <p class="label-text">DXY Sync</p>
        </div>
    </div>

    <button id="goBtn" onclick="executeSurgicalScan()" class="btn-glow">Execute Scan</button>

    <div id="outPanel" class="hidden mt-16 pb-32 space-y-10">
        <div class="text-center">
            <h2 id="biasTxt" class="text-8xl font-black italic tracking-tighter" style="text-shadow: 0 0 50px currentColor;"></h2>
        </div>
        
        <div class="grid grid-cols-2 glass-panel overflow-hidden">
            <div class="p-8 text-center border-r border-white/5">
                <p class="label-text text-slate-500 mb-2">Entry</p>
                <p id="entVal" class="text-3xl font-bold font-mono text-white">--</p>
            </div>
            <div class="p-8 text-center">
                <p class="label-text text-blue-400 mb-2">Lots</p>
                <p id="lotVal" class="text-3xl font-bold font-mono text-blue-400">--</p>
            </div>
            <div class="p-8 text-center border-t border-white/5 border-r">
                <p class="label-text text-rose-500 mb-2">Stop Loss</p>
                <p id="slVal" class="text-3xl font-bold font-mono text-rose-500">--</p>
            </div>
            <div class="p-8 text-center border-t border-white/5">
                <p class="label-text text-emerald-400 mb-2">Target</p>
                <p id="tpVal" class="text-3xl font-bold font-mono text-emerald-400">--</p>
            </div>
        </div>

        <div class="glass-panel p-10 border-l-[10px] border-blue-600">
            <p id="logicSummary" class="text-xl text-slate-200 leading-snug italic font-bold"></p>
        </div>
    </div>

    <div id="settingsModal" class="fixed inset-0 bg-black/98 z-50 hidden flex-col items-center justify-center p-8 backdrop-blur-3xl">
        <div class="w-full max-w-sm glass-panel p-10 border-blue-500/20 border">
            <h3 class="text-center font-black italic mb-10 tracking-tighter text-white">CORE CONFIG</h3>
            <input type="password" id="kIn" placeholder="API KEY" class="bg-black/50 border border-white/10 rounded-2xl w-full mb-4 p-5 text-sm outline-none text-blue-400 font-mono">
            <div class="grid grid-cols-2 gap-4">
                <input type="number" id="bIn" placeholder="BALANCE" class="bg-black/50 border border-white/10 rounded-2xl p-5 text-sm outline-none">
                <input type="number" id="rIn" placeholder="RISK %" class="bg-black/50 border border-white/10 rounded-2xl p-5 text-sm outline-none">
            </div>
            <button onclick="saveConfig()" class="btn-glow mt-8 text-[10px] py-5">Sync Hardware</button>
            <p class="text-center text-[10px] mt-8 text-slate-600 font-black uppercase cursor-pointer tracking-widest" onclick="toggleSettings()">Close Settings</p>
        </div>
    </div>

    <script src="strategies.js"></script>
    <script>
        function toggleSettings() {
            const m = document.getElementById('settingsModal');
            m.classList.toggle('hidden'); m.classList.toggle('flex');
        }
        function sync(i) {
            const f = document.getElementById(`i${i}`).files[0];
            if(f) {
                document.getElementById(`box${i}`).classList.add('has-file');
                files[i] = f;
            }
        }
    </script>
</body>
</html>
