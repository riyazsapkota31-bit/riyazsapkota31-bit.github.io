<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Trader Pro | XM Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0b0e14; color: #e2e8f0; }
        .glass { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex flex-col items-center">

    <div class="w-full max-w-4xl">
        <header class="text-center mb-10">
            <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-purple-400 italic tracking-tighter uppercase">Omni-Trader Pro</h1>
            <p class="text-[10px] text-slate-500 tracking-[0.4em] uppercase font-bold mt-2">XM Institutional Multi-Strategy Engine</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-2 space-y-6">
                
                <div class="glass p-6 rounded-3xl shadow-2xl">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="relative">
                            <label class="text-[9px] font-black text-indigo-500 uppercase mb-2 block tracking-widest">Gemini API Key</label>
                            <input type="password" id="apiKey" class="w-full bg-[#0d1117] border border-slate-800 rounded-xl py-3 px-4 text-indigo-400 focus:outline-none focus:border-indigo-500" placeholder="Paste Key Here">
                            <button onclick="toggleKey()" class="absolute right-4 top-9 text-slate-600"><i id="eyeIcon" class="fas fa-eye"></i></button>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[9px] font-black text-indigo-500 uppercase mb-2 block tracking-widest">XM Balance ($)</label>
                                <input type="number" id="balance" value="1000" class="w-full bg-[#0d1117] border border-slate-800 rounded-xl py-3 px-4 text-white focus:outline-none">
                            </div>
                            <div>
                                <label class="text-[9px] font-black text-indigo-500 uppercase mb-2 block tracking-widest">Risk (%)</label>
                                <input type="number" id="riskPct" value="1" class="w-full bg-[#0d1117] border border-slate-800 rounded-xl py-3 px-4 text-white focus:outline-none">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="glass p-4 rounded-2xl border border-slate-800/50">
                        <p class="text-[9px] font-bold text-slate-500 mb-3 uppercase tracking-widest">4H Bias</p>
                        <input type="file" id="img1" class="text-[10px] text-slate-500 file:bg-slate-800 file:text-white file:border-0 file:rounded-md file:px-2 cursor-pointer">
                    </div>
                    <div class="glass p-4 rounded-2xl border border-slate-800/50">
                        <p class="text-[9px] font-bold text-slate-500 mb-3 uppercase tracking-widest">1H Structure</p>
                        <input type="file" id="img2" class="text-[10px] text-slate-500 file:bg-slate-800 file:text-white file:border-0 file:rounded-md file:px-2 cursor-pointer">
                    </div>
                    <div class="glass p-4 rounded-2xl border border-slate-800/50">
                        <p class="text-[9px] font-bold text-slate-500 mb-3 uppercase tracking-widest">15M Entry</p>
                        <input type="file" id="img3" class="text-[10px] text-slate-500 file:bg-slate-800 file:text-white file:border-0 file:rounded-md file:px-2 cursor-pointer">
                    </div>
                    <div class="glass p-4 rounded-2xl border border-slate-800/50">
                        <p class="text-[9px] font-bold text-slate-500 mb-3 uppercase tracking-widest">DXY Context</p>
                        <input type="file" id="img4" class="text-[10px] text-slate-500 file:bg-slate-800 file:text-white file:border-0 file:rounded-md file:px-2 cursor-pointer">
                    </div>
                </div>

                <button onclick="analyze()" id="mainBtn" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 py-5 rounded-2xl font-black uppercase tracking-[0.3em] shadow-xl transition-all active:scale-95">
                    Execute Multi-Strategy Scan
                </button>

                <div id="resultBox" class="hidden">
                    <div id="captureZone" class="glass p-8 rounded-3xl border-l-4 border-indigo-500 shadow-2xl relative overflow-hidden">
                        <div id="loader" class="hidden text-center py-10">
                            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-500 mx-auto"></div>
                            <p class="text-[10px] text-indigo-400 mt-4 uppercase font-bold tracking-widest">Aggregating XM Confluences...</p>
                        </div>
                        <div id="output" class="text-sm font-bold text-white space-y-4"></div>
                        <div id="xmCheatSheet" class="mt-6"></div>
                        
                        <div class="mt-8 flex gap-3">
                            <button onclick="exportImage()" class="flex-1 bg-slate-800 hover:bg-slate-700 py-3 rounded-xl text-[10px] font-bold uppercase transition-all">Save Analysis</button>
                            <a href="https://www.xm.com/mt5-webtrader" target="_blank" class="flex-[2] bg-indigo-600 hover:bg-indigo-500 py-3 rounded-xl text-[10px] font-black uppercase text-center tracking-widest">Open XM WebTrader</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-1">
                <div class="glass p-6 rounded-3xl h-full">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Recent Journal</h3>
                        <button onclick="clearJournal()" class="text-[9px] text-red-900 hover:text-red-500 uppercase font-bold">Clear</button>
                    </div>
                    <div id="journalList" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleKey() {
            const i = document.getElementById('apiKey');
            const e = document.getElementById('eyeIcon');
            i.type = i.type === "password" ? "text" : "password";
            e.className = i.type === "password" ? "fas fa-eye" : "fas fa-eye-slash";
        }

        async function toBase64(f) { return new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result.split(',')[1]); }); }

        function calculateLots(entry, sl) {
            const bal = document.getElementById('balance').value;
            const risk = document.getElementById('riskPct').value;
            const riskUSD = bal * (risk / 100);
            const pips = Math.abs(entry - sl);
            const lots = (riskUSD / (pips * 10)).toFixed(2); // Standard MT5 lot calc
            return lots > 0.01 ? lots : 0.01;
        }

        async function analyze() {
            const key = document.getElementById('apiKey').value;
            const output = document.getElementById('output');
            const loader = document.getElementById('loader');
            const resBox = document.getElementById('resultBox');
            const btn = document.getElementById('mainBtn');
            const xmCheat = document.getElementById('xmCheatSheet');
            
            const files = [document.getElementById('img1').files[0], document.getElementById('img2').files[0], document.getElementById('img3').files[0], document.getElementById('img4').files[0]].filter(f => f);

            if(!key || files.length < 2) return alert("Strategic Error: 2 Charts + API Key Required.");

            btn.disabled = true;
            resBox.classList.remove('hidden');
            loader.classList.remove('hidden');
            output.innerHTML = "";
            xmCheat.innerHTML = "";

            try {
                const b64 = await Promise.all(files.map(f => toBase64(f)));
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Expert Multi-Strategy Trader. Analyze 4H, 1H, 15M, and DXY context. Strategies: 1.SMC, 2.Breakout/Retest, 3.Price Action, 4.Candlestick, 5.Trend Following. SELECT THE BEST ONE. OUTPUT FORMAT: STRATEGY: [Name] | TRADE: [BUY/SELL] | ENTRY: [Price] | TP: [Target 1:2 R:R Min] | SL: [Price] | LOGIC: [One simple sentence]. Only numeric values for Entry/TP/SL." },
                                ...b64.map(data => ({ inline_data: { mime_type: "image/jpeg", data } }))
                            ]
                        }]
                    })
                });

                const data = await response.json();
                loader.classList.add('hidden');
                btn.disabled = false;
                
                const text = data.candidates[0].content.parts[0].text;
                const parts = text.split('|').map(p => p.trim());
                
                // Parse values for calculator
                const entry = parseFloat(parts.find(p => p.includes('ENTRY')).split(':')[1]);
                const sl = parseFloat(parts.find(p => p.includes('SL')).split(':')[1]);
                const tp = parseFloat(parts.find(p => p.includes('TP')).split(':')[1]);
                const strategy = parts.find(p => p.includes('STRATEGY')).split(':')[1];
                const trade = parts.find(p => p.includes('TRADE')).split(':')[1];
                const lots = calculateLots(entry, sl);

                output.innerHTML = parts.map(p => `<div class="border-b border-white/5 py-2 flex gap-3 items-center"><i class="fas fa-chevron-right text-[8px] text-indigo-500"></i>${p}</div>`).join('');
                
                xmCheat.innerHTML = `
                    <div class="bg-indigo-950/40 p-4 rounded-2xl border border-indigo-500/20">
                        <p class="text-[9px] text-indigo-400 font-black uppercase mb-3 tracking-widest">XM MT5 Ready Order</p>
                        <div class="grid grid-cols-2 gap-3 text-[11px] font-bold">
                            <div class="bg-black/30 p-2 rounded">LOTS: ${lots}</div>
                            <div class="bg-black/30 p-2 rounded">TYPE: ${trade}</div>
                            <div class="bg-black/30 p-2 rounded">SL: ${sl}</div>
                            <div class="bg-black/30 p-2 rounded">TP: ${tp}</div>
                        </div>
                    </div>
                `;

                saveToJournal({ strategy, trade, entry, sl, tp });

            } catch (e) {
                loader.classList.add('hidden');
                btn.disabled = false;
                output.innerText = "System Sync Failed. Verify Key/Data.";
            }
        }

        function saveToJournal(t) {
            let j = JSON.parse(localStorage.getItem('omni_j') || '[]');
            j.unshift({ ...t, time: new Date().toLocaleTimeString() });
            if(j.length > 8) j.pop();
            localStorage.setItem('omni_j', JSON.stringify(j));
            renderJournal();
        }

        function renderJournal() {
            const list = document.getElementById('journalList');
            const j = JSON.parse(localStorage.getItem('omni_j') || '[]');
            list.innerHTML = j.map(x => `
                <div class="glass p-3 rounded-xl text-[10px] border-l-2 border-indigo-500">
                    <div class="flex justify-between font-black text-indigo-400"><span>${x.strategy}</span><span>${x.time}</span></div>
                    <div class="flex justify-between text-slate-500 mt-1 uppercase"><span>${x.trade}</span><span>Entry: ${x.entry}</span></div>
                </div>
            `).join('');
        }

        async function exportImage() {
            const canvas = await html2canvas(document.getElementById('captureZone'), { backgroundColor: '#0b0e14' });
            const link = document.createElement('a');
            link.download = `Omni-Setup-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        function clearJournal() { localStorage.removeItem('omni_j'); renderJournal(); }
        window.onload = renderJournal;
    </script>
</body>
</html>
