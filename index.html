<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Trader Pro AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="strategies.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#0b0e14] text-slate-200 font-sans min-h-screen">

    <div class="max-w-3xl mx-auto p-4 md:p-8">
        <header class="text-center py-6">
            <h1 class="text-5xl font-black text-indigo-500 tracking-tighter italic">OMNI<span class="text-white text-3xl not-italic">TRADER PRO</span></h1>
            <p class="text-slate-500 text-xs mt-2 uppercase tracking-[0.3em]">Institutional Grade Analysis Engine</p>
        </header>

        <div class="bg-[#161b22] border border-slate-800 p-5 rounded-3xl mb-6 shadow-2xl">
            <div class="flex justify-between items-center mb-3 px-1">
                <label class="text-xs font-bold text-slate-500 uppercase">Gemini API Access</label>
                <span class="text-[10px] bg-indigo-500/10 text-indigo-400 px-2 py-1 rounded-full border border-indigo-500/20">Free Tier Active</span>
            </div>
            <div class="relative flex items-center">
                <input type="password" id="apiKey" 
                       class="w-full bg-[#0d1117] border border-slate-700 rounded-2xl py-4 px-5 text-indigo-400 focus:outline-none focus:border-indigo-500 transition-all text-sm" 
                       placeholder="Paste your API key here...">
                <button onclick="toggleKey()" class="absolute right-5 text-slate-500 hover:text-white">
                    <i id="eyeIcon" class="fas fa-eye"></i>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
            <div class="bg-[#161b22] p-4 rounded-2xl border border-slate-800 text-center">
                <h3 class="text-[10px] font-black text-slate-500 uppercase mb-2">1. Bias (4H)</h3>
                <input type="file" id="img4h" class="hidden" onchange="updateLabel('img4h', 'lbl4h')">
                <label for="img4h" id="lbl4h" class="cursor-pointer block bg-[#21262d] py-5 rounded-xl border-2 border-dashed border-slate-700 hover:border-indigo-500 transition-all">
                    <i class="fas fa-chart-line text-lg text-slate-500"></i>
                </label>
            </div>
            <div class="bg-[#161b22] p-4 rounded-2xl border border-slate-800 text-center">
                <h3 class="text-[10px] font-black text-slate-500 uppercase mb-2">2. Level (1H)</h3>
                <input type="file" id="img1h" class="hidden" onchange="updateLabel('img1h', 'lbl1h')">
                <label for="img1h" id="lbl1h" class="cursor-pointer block bg-[#21262d] py-5 rounded-xl border-2 border-dashed border-slate-700 hover:border-indigo-500 transition-all">
                    <i class="fas fa-bullseye text-lg text-slate-500"></i>
                </label>
            </div>
            <div class="bg-[#161b22] p-4 rounded-2xl border border-slate-800 text-center">
                <h3 class="text-[10px] font-black text-slate-500 uppercase mb-2">3. Entry (15M)</h3>
                <input type="file" id="img15m" class="hidden" onchange="updateLabel('img15m', 'lbl15m')">
                <label for="img15m" id="lbl15m" class="cursor-pointer block bg-[#21262d] py-5 rounded-xl border-2 border-dashed border-slate-700 hover:border-indigo-500 transition-all">
                    <i class="fas fa-bolt text-lg text-slate-500"></i>
                </label>
            </div>
            <div class="bg-[#161b22] p-4 rounded-2xl border border-slate-800 text-center">
                <h3 class="text-[10px] font-black text-orange-500 uppercase mb-2">4. News/DXY</h3>
                <input type="file" id="imgContext" class="hidden" onchange="updateLabel('imgContext', 'lblContext')">
                <label for="imgContext" id="lblContext" class="cursor-pointer block bg-[#21262d] py-5 rounded-xl border-2 border-dashed border-slate-700 hover:border-orange-500 transition-all">
                    <i class="fas fa-globe text-lg text-orange-500/50"></i>
                </label>
            </div>
        </div>

        <button onclick="analyze()" id="mainBtn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-5 rounded-2xl font-black uppercase tracking-[0.2em] shadow-lg shadow-indigo-500/40 transition-all transform active:scale-95 flex items-center justify-center gap-3">
            <i class="fas fa-microchip"></i> Start AI Analysis
        </button>

        <div id="result" class="mt-6 hidden bg-[#0d1117] rounded-3xl border border-slate-800 p-1 shadow-inner">
            <div class="bg-[#161b22] rounded-[22px] p-6">
                <div id="loader" class="hidden text-center py-12">
                    <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-indigo-500 border-t-transparent mb-4"></div>
                    <p class="text-indigo-400 font-bold tracking-widest text-xs uppercase animate-pulse">Computing Market Confluence...</p>
                </div>
                <div id="setupContent" class="text-sm leading-relaxed font-mono text-slate-300 whitespace-pre-wrap"></div>
            </div>
        </div>
    </div>

    <script>
        function toggleKey() {
            const input = document.getElementById('apiKey');
            const icon = document.getElementById('eyeIcon');
            input.type = input.type === "password" ? "text" : "password";
            icon.classList.toggle('fa-eye'); icon.classList.toggle('fa-eye-slash');
        }

        function updateLabel(inputId, labelId) {
            const label = document.getElementById(labelId);
            label.innerHTML = `<i class="fas fa-check-circle text-green-500 text-lg"></i>`;
            label.classList.replace('border-slate-700', 'border-green-500');
            label.classList.add('bg-green-500/5');
        }

        async function toBase64(f) { return new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result.split(',')[1]); }); }

        async function analyze() {
            const key = document.getElementById('apiKey').value;
            const btn = document.getElementById('mainBtn');
            const resDiv = document.getElementById('result');
            const content = document.getElementById('setupContent');
            const loader = document.getElementById('loader');

            if(!key) return alert("Enter API Key");
            
            const fileInputs = ['img4h', 'img1h', 'img15m', 'imgContext'];
            const files = fileInputs.map(id => document.getElementById(id).files[0]).filter(f => f !== undefined);
            
            if(files.length < 3) return alert("Please upload at least the 3 main charts (4H, 1H, 15M)");

            btn.disabled = true;
            resDiv.classList.remove('hidden');
            loader.classList.remove('hidden');
            content.innerText = "";

            try {
                const b64 = await Promise.all(files.map(f => toBase64(f)));
                const strategyStr = TRADING_BRAIN.map(s => `${s.category}: ${s.logic}`).join("\n");

                const prompt = `You are a Professional Quantitative Trader. Analyze these charts (4H, 1H, 15M, and optional News/DXY).
                STRATEGIES TO APPLY:
                ${strategyStr}
                OUTPUT FORMAT:
                1. ASSET & CURRENT PRICE
                2. MARKET BIAS (Bullish/Bearish/Neutral)
                3. QUALITY SCORE (1-10)
                4. TRADE SETUP (Entry, Stop Loss, Take Profit)
                5. CONFLUENCE RATIONALE (Explain using SMC/ICT logic)`;

                // UPDATED MODEL: Using gemini-2.5-flash for current compatibility
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: prompt },
                                ...b64.map(data => ({ inline_data: { mime_type: "image/jpeg", data } }))
                            ]
                        }]
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                loader.classList.add('hidden');
                content.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) {
                alert("Critical Error: " + e.message);
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
