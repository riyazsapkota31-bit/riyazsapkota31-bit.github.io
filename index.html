<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OMNI-BLACK | ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon-indigo: #6366f1; --neon-emerald: #10b981; --neon-rose: #e11d48; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; padding: 20px; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        
        /* THE "QUANTUM" PANEL STYLING */
        .glass-panel { 
            background: linear-gradient(145deg, rgba(15,15,15,0.9), rgba(5,5,5,1));
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 35px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* NEON BORDER ANIMATION FOR ACTIVE UPLOADS */
        .tier-card { 
            border: 1.5px solid #1a1a1a; 
            border-radius: 30px; 
            min-height: 155px; 
            background: #050505;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            position: relative;
        }
        .has-file { 
            border-color: var(--neon-indigo); 
            background: rgba(99, 102, 241, 0.03);
            box-shadow: 0 0 25px rgba(99, 102, 241, 0.15);
            transform: translateY(-4px) scale(1.02);
        }

        /* THE "INSTITUTIONAL" BIAS TEXT */
        .glow-bias { 
            text-shadow: 0 0 40px currentColor; 
            font-size: clamp(5rem, 20vw, 8.5rem); 
            font-weight: 900; letter-spacing: -0.06em; font-style: italic; line-height: 0.9;
        }

        /* SURGICAL BUTTON */
        .btn-exec { 
            background: #fff; color: #000; border-radius: 25px; padding: 22px; 
            font-weight: 900; text-transform: uppercase; letter-spacing: 0.25em; 
            transition: 0.2s; position: relative; overflow: hidden;
        }
        .btn-exec:active { transform: scale(0.96); filter: brightness(0.8); }
        
        /* DATA GRID PULSE */
        .data-label { font-size: 10px; font-weight: 900; color: #444; text-transform: uppercase; letter-spacing: 0.2em; }
        .data-value { font-size: 2.5rem; font-family: 'JetBrains Mono', monospace; font-weight: 700; letter-spacing: -0.05em; }

        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--neon-rose); box-shadow: 0 0 15px var(--neon-rose); }
        .active-dot { background: var(--neon-emerald); box-shadow: 0 0 20px var(--neon-emerald); }
    </style>
</head>
<body>

    <header class="flex justify-between items-center mb-8 px-4 mt-2">
        <div>
            <h1 class="text-3xl font-black italic tracking-tighter leading-none text-white">OMNI-BLACK</h1>
            <div class="flex items-center gap-2 mt-2">
                <span id="statusIcon" class="status-dot"></span>
                <p id="riskHeader" class="text-[9px] font-bold text-slate-500 uppercase tracking-[0.4em]">Universal Link: Offline</p>
            </div>
        </div>
        <button onclick="location.reload()" class="w-12 h-12 rounded-full border border-white/5 flex items-center justify-center text-slate-500">
            <i class="fa-solid fa-rotate-right text-xs"></i>
        </button>
    </header>

    <div class="glass-panel p-8 mb-8 border-l-[10px] border-indigo-600 flex justify-between items-center">
        <div>
            <p class="data-label mb-1">Market Context</p>
            <h2 id="pairDisp" class="text-2xl font-black italic text-white uppercase tracking-tighter">[ STANDBY ]</h2>
        </div>
        <div class="text-right">
            <p class="data-label mb-1">Precision</p>
            <p class="text-indigo-400 font-bold italic">A+ QUANT</p>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-5 mb-10">
        <div id="box0" class="tier-card" onclick="document.getElementById('i0').click()">
            <input type="file" id="i0" hidden accept="image/*" onchange="sync(0)">
            <i class="fa-solid fa-globe text-slate-800 text-3xl mb-2" id="ic0"></i>
            <p class="data-label">1H Global</p>
        </div>
        <div id="box1" class="tier-card" onclick="document.getElementById('i1').click()">
            <input type="file" id="i1" hidden accept="image/*" onchange="sync(1)">
            <i class="fa-solid fa-microscope text-slate-800 text-3xl mb-2" id="ic1"></i>
            <p class="data-label">15M Macro</p>
        </div>
        <div id="box2" class="tier-card" onclick="document.getElementById('i2').click()">
            <input type="file" id="i2" hidden accept="image/*" onchange="sync(2)">
            <i class="fa-solid fa-bolt-lightning text-slate-800 text-3xl mb-2" id="ic2"></i>
            <p class="data-label">1M Trigger</p>
        </div>
        <div id="box3" class="tier-card" onclick="document.getElementById('i3').click()">
            <input type="file" id="i3" hidden accept="image/*" onchange="sync(3)">
            <i class="fa-solid fa-chart-pie text-slate-800 text-3xl mb-2" id="ic3"></i>
            <p class="data-label">DXY Data</p>
        </div>
    </div>

    <button id="go" onclick="execute()" class="btn-exec w-full mb-12 shadow-indigo-500/20 shadow-2xl">Execute Neural Scan</button>

    <div id="results" class="hidden space-y-12 pb-24">
        <div id="wait" class="hidden py-6 rounded-3xl bg-amber-500/5 border border-amber-500/20 text-center text-amber-500 font-black italic text-2xl tracking-tighter uppercase">Waiting for Trigger...</div>
        
        <div class="text-center"><h2 id="bias" class="glow-bias"></h2></div>
        
        <div class="grid grid-cols-2 gap-8 text-center border-y border-white/5 py-12">
            <div><p class="data-label mb-2">Entry</p><p id="ent" class="data-value">--</p></div>
            <div><p class="data-label mb-2">Lots</p><p id="lot" class="data-value text-indigo-400">--</p></div>
            <div><p class="data-label mb-2">Stop Loss</p><p id="sl" class="data-value text-rose-600">--</p></div>
            <div><p class="data-label mb-2">Target</p><p id="tp" class="data-value text-emerald-500">--</p></div>
        </div>

        <div class="p-8 glass-panel border-t-[12px] border-indigo-600">
            <p id="logic" class="text-xl text-slate-200 leading-snug italic font-bold tracking-tight"></p>
        </div>
    </div>

    <div class="mt-20 p-8 glass-panel opacity-5 hover:opacity-100 transition-all duration-700">
        <p class="data-label text-center mb-6">Quantum Parameters</p>
        <input type="password" id="kIn" placeholder="API Key" class="bg-black border border-white/10 rounded-2xl w-full mb-4 p-5 text-center text-sm outline-none text-indigo-400 font-mono">
        <div class="grid grid-cols-2 gap-4 mb-6">
            <input type="number" id="bIn" placeholder="Balance ($)" class="bg-black border border-white/10 rounded-2xl p-5 text-center text-sm outline-none">
            <input type="number" id="rIn" placeholder="Risk %" class="bg-black border border-white/10 rounded-2xl p-5 text-center text-sm outline-none">
        </div>
        <button onclick="save()" class="w-full text-[10px] font-black uppercase text-indigo-500 tracking-[0.5em]">Sync Neural Core</button>
    </div>

    <script>
        // ... (The previous Einstein-level JS logic remains identical to keep functionality intact)
        let KEY = localStorage.getItem('omni_key_v14') || "";
        let BAL = parseFloat(localStorage.getItem('omni_bal_v14')) || 1000;
        let RSK = parseFloat(localStorage.getItem('omni_rsk_v14')) || 1;
        let files = [null, null, null, null];

        document.getElementById('riskHeader').innerText = `Risk: ${RSK}% | Bal: $${BAL}`;
        if(KEY) { 
            document.getElementById('statusIcon').classList.add('active-dot'); 
            document.getElementById('riskHeader').innerText = `Neural Link: Active | ${RSK}% Risk`;
        }

        function save() {
            localStorage.setItem('omni_key_v14', document.getElementById('kIn').value.trim());
            localStorage.setItem('omni_bal_v14', document.getElementById('bIn').value || 1000);
            localStorage.setItem('omni_rsk_v14', document.getElementById('rIn').value || 1);
            location.reload();
        }

        function sync(i) {
            files[i] = document.getElementById(`i${i}`).files[0];
            document.getElementById(`box${i}`).classList.add('has-file');
            document.getElementById(`ic${i}`).className = "fa-solid fa-circle-check text-indigo-500 text-4xl mb-2";
        }

        async function execute() {
            if (!KEY || files.includes(null)) return alert("Connect Neural Data.");
            const btn = document.getElementById('go'); btn.innerHTML = `<i class="fa-solid fa-brain fa-spin"></i> CALCULATING MATRIX...`;
            
            try {
                const parts = await Promise.all(files.map(f => {
                    return new Promise(r => {
                        const rd = new FileReader(); rd.readAsDataURL(f);
                        rd.onload = () => r({ inlineData: { mimeType: f.type, data: rd.result.split(',')[1] } });
                    });
                }));

                const prompt = `Task: Einstein-IQ Strategy Selection. Scan SMC, ICT, Wyckoff, PA, Elliot. Pick Best. Logic Strictly 12 words. Format: S: [Name] C: [Context] T: [Trigger] JSON: {"p": "PAIR", "b": "BUY|SELL|WAIT", "e": number, "s": number, "t": number, "tr": number, "l": "S: ... C: ... T: ..."}`;

                const req = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.0-flash:generateContent?key=${KEY}`, {
                    method: 'POST', body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, ...parts] }] })
                });

                const res = JSON.parse((await req.json()).candidates[0].content.parts[0].text.match(/\{[\s\S]*\}/)[0]);
                document.getElementById('pairDisp').innerText = res.p;
                render(res);
            } catch (e) { alert("Core Error."); } finally { btn.innerText = "Execute Neural Scan"; }
        }

        function render(d) {
            document.getElementById('results').classList.remove('hidden');
            const b = document.getElementById('bias'); const w = document.getElementById('wait');
            b.innerText = d.b;
            if (d.b === "WAIT") {
                w.classList.remove('hidden'); w.innerText = `TRIGGER: ${d.tr || '--'}`;
                b.className = "glow-bias text-amber-500";
            } else {
                w.classList.add('hidden');
                b.className = d.b === 'BUY' ? "glow-bias text-emerald-500" : "glow-bias text-rose-600";
            }
            document.getElementById('ent').innerText = d.e || "--";
            document.getElementById('sl').innerText = d.s || "--";
            document.getElementById('tp').innerText = d.t || "--";
            document.getElementById('logic').innerText = d.l;
            const dist = Math.abs(d.e - d.s);
            document.getElementById('lot').innerText = dist > 0 ? ((BAL * (RSK/100)) / (dist * 10)).toFixed(2) : "0.01";
            document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
