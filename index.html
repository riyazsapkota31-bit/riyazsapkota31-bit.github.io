<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Trader Elite | Full Multi-Chart Scan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #05070a; color: #e2e8f0; margin: 0; overflow-x: hidden; }
        .glass { background: #0d1117; border: 1px solid #1f2937; }
        .main-container { width: 95%; max-width: 1100px; margin: 0 auto; padding: 20px; }

        /* SIDEBAR SYSTEM */
        #sideDrawer {
            position: fixed; top: 0; right: -350px; width: 350px; height: 100%;
            background: #0d1117; z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 1px solid #1f2937;
        }
        #sideDrawer.open { right: 0; }
        .sub-panel { position: absolute; top: 0; left: 100%; width: 100%; height: 100%; background: #0d1117; transition: 0.3s ease; z-index: 1001; padding: 24px; }
        .sub-panel.active { left: 0; }

        /* UPLOAD BOXES */
        .upload-grid { display: grid; gap: 16px; margin-top: 40px; }
        @media (min-width: 768px) { .upload-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 767px) { .upload-grid { grid-template-columns: repeat(2, 1fr); } }

        .upload-box { position: relative; height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(145deg, #0d1117, #161b22); border: 1px solid #1f2937; border-radius: 20px; transition: 0.3s; }
        .upload-box:hover { border-color: #4f46e5; background: #0f172a; }
        .box-label { font-size: 11px; font-weight: 900; color: #fff; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        .btn-ui { background: #4f46e5; color: white; padding: 6px 14px; border-radius: 6px; font-size: 10px; font-weight: 800; pointer-events: none; }
        .file-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 10; }
        .tick { display: none; color: #10b981; font-size: 32px; }
        input:valid ~ .btn-ui, input:valid ~ .box-label { display: none; }
        input:valid ~ .tick { display: block; }

        .res-label { font-size: 9px; font-weight: 900; color: #64748b; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 4px; }
        .res-value { font-size: 16px; font-weight: 700; color: #f8fafc; }
        .hidden { display: none !important; }
        #scanBtn:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="overlay" class="fixed inset-0 bg-black/80 hidden z-[999]" onclick="toggleDrawer()"></div>

    <div id="sideDrawer">
        <div class="p-6 space-y-8">
            <div class="flex justify-between items-center">
                <button onclick="toggleDrawer()"><i class="fas fa-times text-slate-500"></i></button>
                <span class="text-xs font-black uppercase text-indigo-500 tracking-widest">Master Terminal</span>
            </div>
            <div onclick="openSub('settingsPanel')" class="flex items-center justify-between p-4 glass rounded-xl cursor-pointer hover:bg-white/5 transition-colors">
                <div class="flex items-center gap-4"><i class="fas fa-sliders-h text-slate-400"></i><span class="text-sm font-bold">Trade Configuration</span></div>
                <i class="fas fa-chevron-right text-[10px] text-slate-600"></i>
            </div>
        </div>

        <div id="settingsPanel" class="sub-panel">
            <button onclick="closeSub('settingsPanel')" class="flex items-center gap-2 text-indigo-400 text-xs font-bold mb-6"><i class="fas fa-arrow-left"></i> BACK</button>
            <div class="space-y-5">
                <div class="space-y-3">
                    <label class="text-[9px] font-black text-slate-500 uppercase ml-1">Account Balance ($)</label>
                    <input type="number" id="bal" value="10058.73" class="w-full bg-black border border-slate-800 rounded-xl p-3 text-xs outline-none focus:border-indigo-500">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-slate-500 uppercase ml-1">Risk %</label>
                        <input type="number" id="risk" value="0.5" class="w-full bg-black border border-slate-800 rounded-xl p-3 text-xs outline-none focus:border-indigo-500 text-indigo-400">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] font-black text-slate-500 uppercase ml-1">R:R Ratio</label>
                        <input type="number" id="ratio" value="3.0" class="w-full bg-black border border-slate-800 rounded-xl p-3 text-xs outline-none focus:border-emerald-500 text-emerald-400">
                    </div>
                </div>
                <button onclick="saveSettings()" class="w-full bg-indigo-600 text-white font-bold p-4 rounded-xl mt-4 uppercase text-[10px]">Save Configuration</button>
            </div>
        </div>
    </div>

    <main class="main-container">
        <header class="flex justify-between items-center py-12">
            <div class="flex items-center gap-6">
                <div class="h-20 w-20 bg-indigo-600 rounded-3xl flex items-center justify-center shadow-2xl">
                    <i class="fas fa-bolt text-4xl text-white"></i>
                </div>
                <div>
                    <h1 class="text-4xl md:text-5xl font-black italic text-white uppercase tracking-tighter">OMNI-TRADER</h1>
                    <p class="text-[10px] font-bold text-indigo-500 uppercase tracking-[0.3em] mt-2">100% REAL-TIME CHART EXTRACTION</p>
                </div>
            </div>
            <button onclick="toggleDrawer()" class="h-14 w-14 glass rounded-2xl flex items-center justify-center"><i class="fas fa-bars-staggered"></i></button>
        </header>

        <div class="upload-grid">
            <div class="upload-box"><input type="file" id="img0" class="file-input" required><div class="box-label">4H Bias Scan</div><div class="btn-ui">Upload</div><i class="fas fa-check-circle tick"></i></div>
            <div class="upload-box"><input type="file" id="img1" class="file-input" required><div class="box-label">1H Structure</div><div class="btn-ui">Upload</div><i class="fas fa-check-circle tick"></i></div>
            <div class="upload-box"><input type="file" id="img2" class="file-input" required><div class="box-label">M15 Execution</div><div class="btn-ui">Upload</div><i class="fas fa-check-circle tick"></i></div>
            <div class="upload-box"><input type="file" id="img3" class="file-input" required><div class="box-label">DXY Overview</div><div class="btn-ui">Upload</div><i class="fas fa-check-circle tick"></i></div>
        </div>

        <button id="scanBtn" onclick="executeScan()" class="w-full mt-12 bg-indigo-600 py-7 rounded-3xl font-black uppercase text-sm tracking-[0.5em] shadow-xl hover:bg-indigo-500 transition-all">
            Analyze All Charts
        </button>

        <div id="resultBox" class="hidden mt-10 glass rounded-[40px] p-10 border-t-4 border-indigo-500">
            <div class="flex flex-col md:flex-row justify-between border-b border-slate-800 pb-8 mb-8">
                <div><span class="res-label">Live Signal</span><h2 id="actionText" class="text-6xl font-black italic uppercase">---</h2></div>
                <div class="text-right md:max-w-md"><span class="res-label">Market Logic</span><p id="logicText" class="text-xs text-indigo-400 font-bold italic">Awaiting data...</p></div>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-6">
                <div><span class="res-label">Support</span><b id="supText" class="res-value">---</b></div>
                <div><span class="res-label">Resistance</span><b id="resText" class="res-value">---</b></div>
                <div><span class="res-label">Entry</span><b id="entText" class="res-value text-indigo-400">---</b></div>
                <div><span class="res-label">TP Target</span><b id="tpText" class="res-value text-emerald-400">---</b></div>
                <div><span class="res-label">Stop Loss</span><b id="slText" class="res-value text-rose-400">---</b></div>
                <div><span class="res-label">Lots to Trade</span><b id="lotText" class="res-value text-yellow-500">0.00</b></div>
            </div>
        </div>
    </main>

    <script>
        const API_KEY = "AIzaSyCt90KDSpWVE3KlNLUfDd7PtKx43IdN8Cg";

        function toggleDrawer() { document.getElementById('sideDrawer').classList.toggle('open'); document.getElementById('overlay').classList.toggle('hidden'); }
        function openSub(id) { document.getElementById(id).classList.add('active'); }
        function closeSub(id) { document.getElementById(id).classList.remove('active'); }
        function saveSettings() { alert("Syncing Terminal Data..."); closeSub('settingsPanel'); }

        async function fileToPart(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve({ inline_data: { mime_type: "image/jpeg", data: reader.result.split(',')[1] } });
            });
        }

        async function executeScan() {
            const btn = document.getElementById('scanBtn');
            const files = [
                document.getElementById('img0').files[0],
                document.getElementById('img1').files[0],
                document.getElementById('img2').files[0],
                document.getElementById('img3').files[0]
            ];

            if (files.some(f => !f)) { alert("Please upload all 4 charts for a complete 100% analysis."); return; }

            btn.innerText = "EXTRACTING LIVE PRICE DATA...";
            btn.disabled = true;
            document.getElementById('resultBox').classList.remove('hidden');
            document.getElementById('actionText').innerText = "SCANNING";

            try {
                const imageParts = await Promise.all(files.map(fileToPart));
                const balance = parseFloat(document.getElementById('bal').value);
                const risk = parseFloat(document.getElementById('risk').value);
                const ratio = parseFloat(document.getElementById('ratio').value);

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Look at these 4 charts (H4, H1, M15, DXY). Read the ACTUAL current price from the M15 chart. Identify the valid SL based on the Order Block. Return ONLY valid JSON: {entry: number, sl: number, support: number, resistance: number, bias: 'BUY/SELL', logic: 'short explanation'}" },
                                ...imageParts
                            ]
                        }]
                    })
                });

                const data = await response.json();
                const result = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, ''));

                // REAL-TIME MATHEMATICAL VALIDATION
                const tpValue = result.entry + ((result.entry - result.sl) * ratio);
                const lotSize = ((balance * (risk / 100)) / Math.abs(result.entry - result.sl)).toFixed(2);

                document.getElementById('actionText').innerText = result.bias;
                document.getElementById('entText').innerText = result.entry.toLocaleString();
                document.getElementById('slText').innerText = result.sl.toLocaleString();
                document.getElementById('supText').innerText = result.support.toLocaleString();
                document.getElementById('resText').innerText = result.resistance.toLocaleString();
                document.getElementById('tpText').innerText = tpValue.toLocaleString(undefined, {maximumFractionDigits: 2});
                document.getElementById('lotText').innerText = lotSize;
                document.getElementById('logicText').innerText = result.logic;

            } catch (e) {
                document.getElementById('logicText').innerText = "Sync Error: Could not read chart pixels. Check your connection.";
            } finally {
                btn.innerText = "Analyze All Charts";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
