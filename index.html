<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-AI Trading Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="strategies.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans">

    <div class="max-w-xl mx-auto p-4 md:pt-10">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-black text-indigo-500 tracking-tighter">OMNI-STRATEGY AI</h1>
            <p class="text-slate-400 text-xs">BTC • FOREX • GOLD Analysis Engine</p>
        </header>

        <div class="bg-slate-900 p-4 rounded-2xl mb-6 border border-slate-800">
            <input type="password" id="apiKey" class="w-full bg-transparent border-none focus:ring-0 text-sm" placeholder="Paste Gemini API Key here...">
        </div>

        <div class="space-y-3 mb-6">
            <label class="block text-center text-xs font-bold text-slate-500 uppercase">Upload Charts</label>
            <div class="grid grid-cols-1 gap-3">
                <input type="file" id="img4h" class="block w-full text-sm text-slate-500 file:mr-4 file:py-3 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-500" placeholder="4H Chart">
                <input type="file" id="img1h" class="block w-full text-sm text-slate-500 file:mr-4 file:py-3 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-500">
                <input type="file" id="img15m" class="block w-full text-sm text-slate-500 file:mr-4 file:py-3 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-500">
            </div>
        </div>

        <button onclick="analyze()" id="mainBtn" class="w-full bg-white text-black py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-indigo-400 transition-all shadow-lg shadow-indigo-500/20">
            Run Auto-Analysis
        </button>

        <div id="result" class="mt-8 hidden p-6 bg-slate-900 rounded-3xl border border-slate-800 shadow-2xl">
            <div id="loader" class="text-center py-10 hidden">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-500 mx-auto mb-4"></div>
                <p class="text-sm text-slate-400">Scanning YouTube Strategies & Charts...</p>
            </div>
            <div id="setupContent" class="text-sm leading-relaxed whitespace-pre-wrap text-slate-300 font-mono"></div>
        </div>
    </div>

    <script>
        async function toBase64(f) { return new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result.split(',')[1]); }); }

        async function analyze() {
            const key = document.getElementById('apiKey').value;
            const btn = document.getElementById('mainBtn');
            const resDiv = document.getElementById('result');
            const content = document.getElementById('setupContent');
            const loader = document.getElementById('loader');

            if(!key) return alert("Please enter your API Key");
            
            const imgs = [document.getElementById('img4h').files[0], document.getElementById('img1h').files[0], document.getElementById('img15m').files[0]];
            if(imgs.includes(undefined)) return alert("Upload all 3 timeframes (15M, 1H, 4H)");

            btn.disabled = true;
            resDiv.classList.remove('hidden');
            loader.classList.remove('hidden');
            content.innerText = "";

            try {
                const b64 = await Promise.all(imgs.map(f => toBase64(f)));
                const strategyString = TRADING_BRAIN.map(s => `${s.category}: ${s.logic}`).join("\n");

                const prompt = `You are a Trading Software. Analyze these 4H, 1H, and 15M charts using these FOUNDATION STRATEGIES:\n${strategyString}\n\n
                OUTPUT FORMAT:
                1. ASSET NAME
                2. BIAS (Long/Short)
                3. ENTRY PRICE
                4. STOP LOSS (SL)
                5. TAKE PROFIT (TP1, TP2, TP3)
                6. CONFLUENCES (Why the trade fits the YouTube logic)
                7. RISK/REWARD RATIO`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`,{
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, ...b64.map(d => ({ inline_data: { mime_type: "image/jpeg", data: d } }))] }] })
                });

                const data = await response.json();
                loader.classList.add('hidden');
                content.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) {
                alert("Error: Check your API Key or Network.");
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
