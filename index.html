<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI-REAL | INFINITY SCALPER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0a0b0d; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .drawer { position: fixed; top: 0; right: -100%; width: 85%; height: 100%; background: #111827; transition: 0.4s ease; z-index: 1000; }
        .drawer.open { right: 0; }
        .sub-menu { position: absolute; top: 0; right: -100%; width: 100%; height: 100%; background: #111827; transition: 0.3s ease; z-index: 1001; }
        .sub-menu.active { right: 0; }
        .has-file { border-color: #10b981 !important; background: rgba(16, 185, 129, 0.05); }
    </style>
</head>
<body class="p-4">

    <header class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-black italic text-white uppercase leading-none tracking-tighter">Omni-Real</h1>
            <p class="text-[10px] uppercase text-indigo-400 font-bold tracking-[0.2em]">Infinity Scalper V8</p>
        </div>
        <button onclick="toggleDrawer()" class="w-10 h-10 glass rounded-xl flex items-center justify-center text-slate-400">
            <i class="fa-solid fa-gear"></i>
        </button>
    </header>

    <div class="grid grid-cols-2 gap-3 mb-4">
        <div id="box0" class="glass rounded-2xl p-4 flex flex-col items-center justify-center border-dashed border-2 border-slate-700 min-h-[140px]">
            <span class="text-[9px] font-bold uppercase text-slate-500 mb-2">HTF Bias (1H)</span>
            <label class="bg-indigo-600 px-4 py-1.5 rounded-lg text-[11px] font-bold"><input type="file" id="img0" class="hidden" onchange="markFile(0)">Load</label>
        </div>
        <div id="box1" class="glass rounded-2xl p-4 flex flex-col items-center justify-center border-dashed border-2 border-slate-700 min-h-[140px]">
            <span class="text-[9px] font-bold uppercase text-slate-500 mb-2">LTF Structure (15M)</span>
            <label class="bg-indigo-600 px-4 py-1.5 rounded-lg text-[11px] font-bold"><input type="file" id="img1" class="hidden" onchange="markFile(1)">Load</label>
        </div>
        <div id="box2" class="glass rounded-2xl p-4 flex flex-col items-center justify-center border-dashed border-2 border-slate-700 min-h-[140px]">
            <span class="text-[9px] font-bold uppercase text-slate-500 mb-2">Entry Logic (1M)</span>
            <label class="bg-indigo-600 px-4 py-1.5 rounded-lg text-[11px] font-bold"><input type="file" id="img2" class="hidden" onchange="markFile(2)">Load</label>
        </div>
        <div id="box3" class="glass rounded-2xl p-4 flex flex-col items-center justify-center border-dashed border-2 border-slate-700 min-h-[140px]">
            <span class="text-[9px] font-bold uppercase text-slate-500 mb-2">DXY / Data</span>
            <label class="bg-indigo-600 px-4 py-1.5 rounded-lg text-[11px] font-bold"><input type="file" id="img3" class="hidden" onchange="markFile(3)">Load</label>
        </div>
    </div>

    <button id="scanBtn" onclick="executeScan()" class="w-full bg-indigo-500 py-4 rounded-2xl font-black text-sm uppercase shadow-lg mb-6">Perform Multi-Chart Scan</button>

    <div id="resultBox" class="hidden glass rounded-3xl p-6 border-t-4 border-indigo-500">
        <div class="flex justify-between items-start mb-6">
            <div><span id="strategyType" class="bg-indigo-500/20 text-indigo-300 text-[9px] px-2 py-1 rounded">SMC</span><h2 id="actionText" class="text-4xl font-black italic uppercase leading-none mt-2">---</h2></div>
            <p id="logicText" class="text-[10px] text-slate-400 italic text-right max-w-[150px]">Waiting...</p>
        </div>
        <div class="grid grid-cols-3 gap-4 mb-6">
            <div><p class="text-[9px] text-slate-500 font-bold uppercase">Entry</p><p id="entText" class="text-sm font-black text-indigo-300">0.00</p></div>
            <div><p class="text-[9px] text-rose-500 font-bold uppercase">SL</p><p id="slText" class="text-sm font-black text-rose-500">0.00</p></div>
            <div><p class="text-[9px] text-emerald-500 font-bold uppercase">TP</p><p id="tpText" class="text-sm font-black text-emerald-500">0.00</p></div>
        </div>
        <div class="grid grid-cols-3 gap-4 border-t border-slate-800 pt-6">
            <div><p class="text-[9px] text-slate-500 uppercase">Sup</p><p id="supText" class="text-xs text-slate-300 font-bold">0.00</p></div>
            <div><p class="text-[9px] text-slate-500 uppercase">Res</p><p id="resText" class="text-xs text-slate-300 font-bold">0.00</p></div>
            <div><p class="text-[9px] text-yellow-500 uppercase font-bold">Lot Size</p><p id="lotText" class="text-sm font-black text-yellow-500">0.0</p></div>
        </div>
    </div>

    <div id="sideDrawer" class="drawer p-6">
        <div class="flex justify-between items-center mb-8"><i class="fa-solid fa-xmark text-slate-500" onclick="toggleDrawer()"></i><h3 class="text-[10px] font-black uppercase text-indigo-400">Master Control</h3></div>
        <div class="space-y-4">
            <div class="glass p-4 rounded-2xl">
                <label class="text-[9px] uppercase text-slate-500 mb-2 block">Security Key</label>
                <input type="password" id="apiInput" class="w-full bg-black/40 border border-slate-800 rounded-xl p-3 text-sm mb-3">
                <button onclick="saveApiKey()" class="w-full bg-indigo-600 py-3 rounded-xl font-bold text-[11px]">LOCK & SYNC KEY</button>
            </div>
            <div class="glass p-4 rounded-2xl" onclick="openSub('riskMenu')">
                <div class="flex justify-between items-center"><span class="text-xs font-bold">Risk Management</span><i class="fa-solid fa-chevron-right text-[10px]"></i></div>
            </div>
        </div>
    </div>

    <div id="riskMenu" class="sub-menu p-6">
        <div class="flex items-center gap-4 mb-8" onclick="closeSub('riskMenu')"><i class="fa-solid fa-arrow-left text-slate-500"></i><h3 class="text-[10px] font-black uppercase">Risk Config</h3></div>
        <div class="space-y-6">
            <div><label class="text-[9px] text-slate-500 uppercase block mb-2">Balance ($)</label><input type="number" id="bal" value="10000" class="w-full bg-black/40 border border-slate-800 rounded-xl p-4 text-xl font-black text-indigo-400"></div>
            <div><label class="text-[9px] text-slate-500 uppercase block mb-2">Risk (%)</label><input type="number" id="risk" value="1.0" step="0.1" class="w-full bg-black/40 border border-slate-800 rounded-xl p-4 text-xl font-black text-yellow-500"></div>
            <button onclick="closeSub('riskMenu')" class="w-full bg-slate-800 py-4 rounded-xl font-bold text-xs uppercase">Save & Exit</button>
        </div>
    </div>

    <div id="overlay" class="fixed inset-0 bg-black/60 z-[999] hidden" onclick="toggleDrawer()"></div>
    <script src="strategies.js"></script>
</body>
</html>
