<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI-REAL | INFINITY V9.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #050507; color: #e2e8f0; overflow-x: hidden; }
        .glass { background: rgba(15, 15, 20, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .tier-box { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .tier-box.has-file { border-color: #10b981; box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); background: rgba(16, 185, 129, 0.05); }
        .glow-text { text-shadow: 0 0 35px currentColor; filter: brightness(1.2); }
        .btn-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3); }
        @keyframes pulse-slow { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } }
        .scanning { animation: pulse-slow 2s infinite; }
    </style>
</head>
<body class="font-sans">

    <header class="p-6 border-b border-white/5 flex justify-between items-center sticky top-0 bg-[#050507]/90 backdrop-blur-xl z-50">
        <div>
            <h1 class="text-2xl font-black tracking-tighter italic text-white leading-none">OMNI-REAL</h1>
            <span class="text-[10px] font-bold text-indigo-500 uppercase tracking-[0.3em]">Institutional Terminal</span>
        </div>
        <div class="flex items-center gap-4">
            <div id="statusDot" class="w-2 h-2 rounded-full bg-rose-500 shadow-[0_0_10px_#f43f5e]"></div>
            <button onclick="toggleDrawer()" class="text-slate-400 hover:text-white transition-colors"><i class="fa-solid fa-circle-nodes text-xl"></i></button>
        </div>
    </header>

    <main class="p-4 max-w-xl mx-auto pb-32">
        <div class="mb-8 relative group">
            <div class="absolute -inset-1 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-2xl blur opacity-20 group-focus-within:opacity-40 transition duration-1000"></div>
            <input type="text" id="pairName" placeholder="ENTER ASSET (e.g. SOLUSDT)" class="relative w-full bg-black border border-white/10 rounded-2xl p-5 text-center text-indigo-400 font-bold uppercase tracking-widest text-lg outline-none focus:border-indigo-500 transition-all">
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div id="box0" class="tier-box glass relative aspect-square border-2 border-dashed border-white/10 rounded-3xl flex flex-col items-center justify-center group overflow-hidden">
                <input type="file" id="img0" accept="image/*" onchange="markFile(0)" class="absolute inset-0 opacity-0 z-10 cursor-pointer">
                <div id="content0" class="text-center transition-transform group-hover:scale-110">
                    <i class="fa-solid fa-arrow-up-from-bracket text-indigo-500 mb-3 text-2xl"></i>
                    <p class="text-[11px] font-black text-slate-300 uppercase tracking-widest">1H BIAS</p>
                </div>
            </div>
            <div id="box1" class="tier-box glass relative aspect-square border-2 border-dashed border-white/10 rounded-3xl flex flex-col items-center justify-center group overflow-hidden">
                <input type="file" id="img1" accept="image/*" onchange="markFile(1)" class="absolute inset-0 opacity-0 z-10 cursor-pointer">
                <div id="content1" class="text-center transition-transform group-hover:scale-110">
                    <i class="fa-solid fa-arrow-up-from-bracket text-indigo-500 mb-3 text-2xl"></i>
                    <p class="text-[11px] font-black text-slate-300 uppercase tracking-widest">15M STRUCT</p>
                </div>
            </div>
            <div id="box2" class="tier-box glass relative aspect-square border-2 border-dashed border-white/10 rounded-3xl flex flex-col items-center justify-center group overflow-hidden">
                <input type="file" id="img2" accept="image/*" onchange="markFile(2)" class="absolute inset-0 opacity-0 z-10 cursor-pointer">
                <div id="content2" class="text-center transition-transform group-hover:scale-110">
                    <i class="fa-solid fa-arrow-up-from-bracket text-indigo-500 mb-3 text-2xl"></i>
                    <p class="text-[11px] font-black text-slate-300 uppercase tracking-widest">1M ENTRY</p>
                </div>
            </div>
            <div id="box3" class="tier-box glass relative aspect-square border-2 border-dashed border-white/10 rounded-3xl flex flex-col items-center justify-center group overflow-hidden">
                <input type="file" id="img3" accept="image/*" onchange="markFile(3)" class="absolute inset-0 opacity-0 z-10 cursor-pointer">
                <div id="content3" class="text-center transition-transform group-hover:scale-110">
                    <i class="fa-solid fa-arrow-up-from-bracket text-indigo-500 mb-3 text-2xl"></i>
                    <p class="text-[11px] font-black text-slate-300 uppercase tracking-widest">DXY INDEX</p>
                </div>
            </div>
        </div>

        <button id="scanBtn" onclick="executeScan()" class="btn-gradient w-full text-white font-black py-6 rounded-3xl text-lg tracking-widest uppercase hover:brightness-110 active:scale-[0.98] transition-all">
            PERFORM MULTI-CHART SCAN
        </button>

        <div id="resultBox" class="hidden mt-12 animate-in fade-in slide-in-from-bottom-10 duration-700">
            <div class="text-center mb-10">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.4em] mb-2">Market Sentiment</p>
                <h2 id="actionText" class="text-7xl font-black italic glow-text tracking-tighter"></h2>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="glass p-5 rounded-3xl border border-white/5 shadow-2xl">
                    <p class="text-[10px] text-slate-500 uppercase font-black mb-1">Execution Price</p>
                    <p id="entText" class="text-2xl font-mono text-white tracking-tighter">---</p>
                </div>
                <div class="glass p-5 rounded-3xl border border-white/5 shadow-2xl">
                    <p class="text-[10px] text-slate-500 uppercase font-black mb-1">Position Size</p>
                    <p id="lotText" class="text-2xl font-mono text-indigo-400 tracking-tighter">---</p>
                </div>
                <div class="glass p-5 rounded-3xl border border-white/5 shadow-2xl bg-rose-500/5">
                    <p class="text-[10px] text-rose-500 uppercase font-black mb-1">Stop Loss</p>
                    <p id="slText" class="text-2xl font-mono text-rose-500 tracking-tighter">---</p>
                </div>
                <div class="glass p-5 rounded-3xl border border-white/5 shadow-2xl bg-emerald-500/5">
                    <p class="text-[10px] text-emerald-500 uppercase font-black mb-1">Take Profit</p>
                    <p id="tpText" class="text-2xl font-mono text-emerald-500 tracking-tighter">---</p>
                </div>
            </div>

            <div class="glass p-6 rounded-3xl border border-white/5 text-left relative overflow-hidden">
                <div class="absolute top-0 right-0 p-3 opacity-10"><i class="fa-solid fa-brain text-4xl"></i></div>
                <p class="text-[10px] text-indigo-400 uppercase font-black mb-3 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></span>
                    Strategy Analysis Logic
                </p>
                <p id="logicText" class="text-sm text-slate-300 leading-relaxed font-medium"></p>
            </div>
        </div>
    </main>

    <div id="overlay" onclick="toggleDrawer()" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[60] hidden transition-opacity duration-300"></div>
    <div id="sideDrawer" class="fixed top-0 right-0 h-full w-80 bg-[#0a0a0d] border-l border-white/10 z-[70] transform translate-x-full transition-transform duration-500 p-10 flex flex-col">
        <div class="flex-1">
            <h3 class="text-2xl font-black mb-2 text-white">SYSTEM</h3>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest mb-10">Configuration & Keys</p>
            
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase mb-2 block">Terminal API Access</label>
                    <input type="password" id="apiInput" placeholder="••••••••••••••••" class="w-full bg-black border border-white/10 rounded-2xl p-4 text-sm text-indigo-400 outline-none focus:border-indigo-500 transition-all">
                </div>
                <button id="lockBtn" onclick="saveApiKey()" class="w-full bg-white text-black font-black py-4 rounded-2xl text-sm uppercase tracking-widest hover:bg-indigo-500 hover:text-white transition-all">Connect Engine</button>
                <button id="editBtn" onclick="enableEdit()" class="w-full bg-white/5 text-slate-400 font-bold py-4 rounded-2xl text-xs uppercase hidden border border-white/10">Disconnect</button>
            </div>
        </div>
        <p class="text-[9px] text-center text-slate-600 font-bold uppercase tracking-widest">Powered by Gemini 2.5 Flash Ultra</p>
    </div>

    <script src="strategies.js"></script>
</body>
</html>
