<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMNI-REAL | INFINITY SCALPER V8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #05070a; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .drawer { position: fixed; top: 0; right: -100%; width: 320px; height: 100%; background: #0f172a; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; border-left: 1px solid rgba(255,255,255,0.1); }
        .drawer.open { right: 0; }
        .sub-drawer { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background: #0f172a; transition: 0.3s ease; z-index: 1100; }
        .sub-drawer.active { right: 0; }
        .chart-box { aspect-ratio: 1/1; border: 2px dashed rgba(255,255,255,0.1); transition: 0.3s; position: relative; overflow: hidden; cursor: pointer; }
        .chart-box:active { transform: scale(0.95); }
        .chart-box.has-file { border: 2px solid #6366f1; background: rgba(99, 102, 241, 0.05); }
        input[type="file"] { display: none; }
    </style>
</head>
<body class="p-4 pb-24">

    <header class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-xl font-black italic tracking-tighter text-white">OMNI-REAL</h1>
            <p class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">Infinity Scalper V8</p>
        </div>
        <button onclick="toggleDrawer()" class="w-10 h-10 glass rounded-xl flex items-center justify-center">
            <i class="fa-solid fa-gear text-slate-400"></i>
        </button>
    </header>

    <div class="grid grid-cols-2 gap-3 mb-6">
        <div id="box0" class="chart-box rounded-3xl flex flex-col items-center justify-center gap-2" onclick="document.getElementById('img0').click()">
            <input type="file" id="img0" accept="image/*" onchange="markFile(0)">
            <span id="label0" class="text-[8px] font-black uppercase text-slate-500 tracking-widest">Upload HTF (1H)</span>
            <div id="icon0" class="hidden text-emerald-500 text-3xl"><i class="fa-solid fa-circle-check"></i></div>
        </div>
        <div id="box1" class="chart-box rounded-3xl flex flex-col items-center justify-center gap-2" onclick="document.getElementById('img1').click()">
            <input type="file" id="img1" accept="image/*" onchange="markFile(1)">
            <span id="label1" class="text-[8px] font-black uppercase text-slate-500 tracking-widest">Upload LTF (15M)</span>
            <div id="icon1" class="hidden text-emerald-500 text-3xl"><i class="fa-solid fa-circle-check"></i></div>
        </div>
        <div id="box2" class="chart-box rounded-3xl flex flex-col items-center justify-center gap-2" onclick="document.getElementById('img2').click()">
            <input type="file" id="img2" accept="image/*" onchange="markFile(2)">
            <span id="label2" class="text-[8px] font-black uppercase text-slate-500 tracking-widest">Upload Entry (1M)</span>
            <div id="icon2" class="hidden text-emerald-500 text-3xl"><i class="fa-solid fa-circle-check"></i></div>
        </div>
        <div id="box3" class="chart-box rounded-3xl flex flex-col items-center justify-center gap-2" onclick="document.getElementById('img3').click()">
            <input type="file" id="img3" accept="image/*" onchange="markFile(3)">
            <span id="label3" class="text-[8px] font-black uppercase text-slate-500 tracking-widest">Upload DXY Data</span>
            <div id="icon3" class="hidden text-emerald-500 text-3xl"><i class="fa-solid fa-circle-check"></i></div>
        </div>
    </div>

    <button id="scanBtn" onclick="executeScan()" class="w-full bg-indigo-600 py-6 rounded-3xl font-black text-xs uppercase tracking-widest shadow-lg shadow-indigo-500/20 active:scale-95 transition-all">
        Perform Multi-Chart Scan
    </button>

    <div id="resultBox" class="hidden mt-6 glass rounded-[40px] p-8 border border-indigo-500/20">
        <div class="flex justify-between items-start mb-6">
            <span id="strategyType" class="bg-slate-800 px-3 py-1 rounded-lg text-[9px] font-bold text-slate-400 uppercase tracking-tighter">INFINITY SMC</span>
            <p id="logicText" class="text-[10px] text-right text-slate-400 italic max-w-[150px]">Waiting for analysis...</p>
        </div>

        <h2 id="actionText" class="text-4xl font-black italic mb-8 uppercase tracking-tighter">---</h2>

        <div class="grid grid-cols-3 gap-6 mb-8 border-y border-white/5 py-6">
            <div>
                <label class="text-[8px] uppercase text-slate-500 font-bold block mb-1">Entry</label>
                <span id="entText" class="text-sm font-black text-white">0.00000</span>
            </div>
            <div>
                <label class="text-[8px] uppercase text-rose-500/60 font-bold block mb-1">SL</label>
                <span id="slText" class="text-sm font-black text-rose-500">0.00000</span>
            </div>
            <div>
                <label class="text-[8px] uppercase text-emerald-500/60 font-bold block mb-1">TP</label>
                <span id="tpText" class="text-sm font-black text-emerald-500">0.00000</span>
            </div>
        </div>

        <div class="flex justify-between items-center bg-black/40 p-4 rounded-2xl">
            <div class="flex gap-4">
                <div>
                    <label class="text-[7px] uppercase text-slate-600 font-bold block">Sup</label>
                    <span id="supText" class="text-[10px] font-bold text-slate-400">---</span>
                </div>
                <div>
                    <label class="text-[7px] uppercase text-slate-600 font-bold block">Res</label>
                    <span id="resText" class="text-[10px] font-bold text-slate-400">---</span>
                </div>
            </div>
            <div class="text-right">
                <label class="text-[8px] uppercase text-amber-500 font-bold block">Lot Size</label>
                <span id="lotText" class="text-xl font-black text-white">0.00</span>
            </div>
        </div>
    </div>

    <div id="overlay" class="hidden fixed inset-0 bg-black/80 z-[900]" onclick="toggleDrawer()"></div>
    
    <div id="sideDrawer" class="drawer p-6">
        <div class="flex justify-between items-center mb-8">
            <i class="fa-solid fa-xmark text-slate-500" onclick="toggleDrawer()"></i>
            <h3 class="text-[10px] font-black uppercase text-indigo-400">Master Control</h3>
        </div>
        
        <div class="space-y-4">
            <div class="glass p-4 rounded-2xl">
                <label class="text-[9px] uppercase text-slate-500 mb-2 block font-bold tracking-widest">Security Key</label>
                <div id="keyDisplay" class="flex flex-col gap-3">
                    <input type="password" id="apiInput" placeholder="Enter Gemini Key..." 
                        class="w-full bg-black/40 border border-slate-800 rounded-xl p-3 text-sm focus:border-indigo-500 outline-none transition-all">
                    
                    <button id="lockBtn" onclick="saveApiKey()" 
                        class="w-full bg-indigo-600 py-3 rounded-xl font-bold text-[11px] uppercase tracking-wider">
                        Lock & Sync Key
                    </button>

                    <button id="editBtn" onclick="enableEdit()" 
                        class="hidden w-full bg-slate-800 py-3 rounded-xl font-bold text-[11px] uppercase tracking-wider text-slate-300">
                        Edit Key
                    </button>
                </div>
            </div>

            <div class="glass p-4 rounded-2xl" onclick="openSub('riskMenu')">
                <div class="flex justify-between items-center">
                    <span class="text-xs font-bold text-slate-300 tracking-wide">Risk Management</span>
                    <i class="fa-solid fa-chevron-right text-[10px] text-slate-500"></i>
                </div>
            </div>
        </div>
    </div>

    <div id="riskMenu" class="sub-drawer p-6">
        <div class="flex items-center gap-4 mb-8">
            <i class="fa-solid fa-chevron-left text-slate-500" onclick="closeSub('riskMenu')"></i>
            <h3 class="text-[10px] font-black uppercase text-white">Risk Parameters</h3>
        </div>
        <div class="space-y-6">
            <div>
                <label class="text-[9px] uppercase text-slate-500 mb-2 block">Account Balance ($)</label>
                <input type="number" id="bal" value="10000" class="w-full bg-slate-900 border border-white/5 rounded-xl p-4 text-sm font-bold">
            </div>
            <div>
                <label class="text-[9px] uppercase text-slate-500 mb-2 block">Risk Per Trade (%)</label>
                <input type="number" id="risk" value="1.0" step="0.1" class="w-full bg-slate-900 border border-white/5 rounded-xl p-4 text-sm font-bold">
            </div>
        </div>
    </div>

    <script src="strategies.js"></script>
</body>
</html>
