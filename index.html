<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Real | High-Accuracy Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020408; color: #e2e8f0; margin: 0; overflow-x: hidden; }
        .glass { background: #0a0d14; border: 1px solid #1e293b; }
        #sideDrawer { position: fixed; top: 0; right: -350px; width: 350px; height: 100%; background: #0a0d14; z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-left: 1px solid #1e293b; }
        #sideDrawer.open { right: 0; }
        .sub-panel { position: absolute; top: 0; left: 100%; width: 100%; height: 100%; background: #0a0d14; transition: 0.3s ease; z-index: 1001; padding: 24px; }
        .sub-panel.active { left: 0; }
        .upload-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 24px; }
        .upload-box { position: relative; height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0f172a; border: 2px dashed #334155; border-radius: 16px; transition: all 0.3s ease; }
        .upload-box.has-file { border-style: solid; border-color: #10b981; background: #064e3b33; }
        .box-label { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; }
        .file-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 10; }
        .btn-ui { background: #6366f1; color: white; padding: 4px 12px; border-radius: 6px; font-size: 10px; font-weight: 800; margin-top: 8px; }
        .res-label { font-size: 9px; font-weight: 900; color: #64748b; text-transform: uppercase; letter-spacing: 1.5px; }
        .res-value { font-size: 16px; font-weight: 700; color: #f8fafc; }
        .strategy-badge { font-size: 8px; padding: 2px 8px; border-radius: 99px; background: #312e81; color: #c7d2fe; font-weight: 900; margin-bottom: 4px; display: inline-block; }
        @keyframes pulse-border { 0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(99, 102, 241, 0); } 100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); } }
        .scanning { animation: pulse-border 2s infinite; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">
    <div id="overlay" class="fixed inset-0 bg-black/80 hidden z-[999]" onclick="toggleDrawer()"></div>

    <div id="sideDrawer">
        <div class="p-6 space-y-6">
            <div class="flex justify-between items-center">
                <button onclick="toggleDrawer()"><i class="fas fa-times text-slate-500"></i></button>
                <span class="text-xs font-black uppercase text-indigo-500 tracking-widest">Configuration</span>
            </div>
            <div class="glass rounded-2xl p-4 border-l-4 border-emerald-500">
                <input type="password" id="apiInput" placeholder="Enter API Key..." class="w-full bg-black border border-slate-800 rounded-xl p-3 text-xs outline-none">
                <button onclick="saveApiKey()" class="w-full mt-3 bg-emerald-600 text-white text-[10px] font-black py-3 rounded-lg">SAVE KEY</button>
            </div>
            <div onclick="openSub('settingsPanel')" class="flex items-center justify-between p-4 glass rounded-xl cursor-pointer">
                <div class="flex items-center gap-4"><i class="fas fa-wallet text-indigo-400"></i><span class="text-sm font-bold">Risk Settings</span></div>
            </div>
        </div>
        <div id="settingsPanel" class="sub-panel">
            <button onclick="closeSub('settingsPanel')" class="text-indigo-400 text-xs font-bold mb-6">BACK</button>
            <label class="text-[9px] font-black text-slate-500 uppercase">Balance ($)</label>
            <input type="number" id="bal" value="10000" class="w-full bg-black border border-slate-800 rounded-xl p-3 text-sm text-white mb-4">
            <label class="text-[9px] font-black text-slate-500 uppercase">Risk %</label>
            <input type="number" id="risk" value="1.0" step="0.1" class="w-full bg-black border border-slate-800 rounded-xl p-3 text-sm text-white">
        </div>
    </div>

    <header class="flex justify-between items-center mb-6 pt-2">
        <div>
            <h1 class="text-2xl font-black italic text-white uppercase tracking-tighter">OMNI-REAL</h1>
            <p class="text-[9px] font-bold text-indigo-500 uppercase tracking-widest mt-1">Multi-Strategy Engine</p>
        </div>
        <button onclick="toggleDrawer()" class="h-10 w-10 glass rounded-xl flex items-center justify-center text-slate-400"><i class="fas fa-cog"></i></button>
    </header>

    <div class="upload-grid">
        <div class="upload-box" id="box0"><input type="file" id="img0" onchange="markFile(0)" class="file-input"><span class="box-label">4H Bias</span><div class="btn-ui">Load</div></div>
        <div class="upload-box" id="box1"><input type="file" id="img1" onchange="markFile(1)" class="file-input"><span class="box-label">1H Structure</span><div class="btn-ui">Load</div></div>
        <div class="upload-box" id="box2"><input type="file" id="img2" onchange="markFile(2)" class="file-input"><span class="box-label">M15 Entry</span><div class="btn-ui">Load</div></div>
        <div class="upload-box" id="box3"><input type="file" id="img3" onchange="markFile(3)" class="file-input"><span class="box-label">DXY Data</span><div class="btn-ui">Load</div></div>
    </div>

    <button id="scanBtn" onclick="executeScan()" class="w-full mt-6 bg-indigo-600 py-5 rounded-2xl font-black uppercase text-xs tracking-[2px] text-white">
        Initiate Real-Time Analysis
    </button>

    <div id="resultBox" class="hidden mt-6 glass rounded-3xl p-6 border-t-2 border-indigo-500">
        <div class="flex justify-between items-start mb-6 pb-6 border-b border-slate-800">
            <div>
                <span id="strategyType" class="strategy-badge">ANALYZING...</span>
                <h2 id="actionText" class="text-4xl font-black italic uppercase">---</h2>
            </div>
            <p id="logicText" class="text-[10px] text-indigo-400 font-bold italic text-right max-w-[140px]">Ready.</p>
        </div>
        <div class="grid grid-cols-3 gap-y-6 gap-x-4">
            <div><span class="res-label">Entry</span><p id="entText" class="res-value text-indigo-400">---</p></div>
            <div><span class="res-label">Stop Loss</span><p id="slText" class="res-value text-rose-500">---</p></div>
            <div><span class="res-label">Target (TP)</span><p id="tpText" class="res-value text-emerald-400">---</p></div>
            <div><span class="res-label">Support</span><p id="supText" class="res-value">---</p></div>
            <div><span class="res-label">Resistance</span><p id="resText" class="res-value">---</p></div>
            <div><span class="res-label">Lot Size</span><p id="lotText" class="res-value text-yellow-500 font-black">0.00</p></div>
        </div>
    </div>

    <script src="strategies.js"></script>
</body>
</html>
