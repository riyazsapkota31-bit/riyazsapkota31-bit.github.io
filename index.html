<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Trader Pro | Institutional Multi-Strategy Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0b0e14; }
        ::-webkit-scrollbar-thumb { background: #312e81; border-radius: 10px; }
        .glass { background: rgba(22, 27, 34, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="bg-[#0b0e14] text-slate-200 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-3xl">
        <header class="text-center mb-10">
            <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-purple-400 italic tracking-tighter uppercase">Omni-Trader</h1>
            <p class="text-[10px] text-slate-500 tracking-[0.5em] uppercase font-bold mt-2">Hybrid Multi-Strategy Analyst</p>
        </header>

        <div class="glass p-5 rounded-3xl mb-6 shadow-2xl">
            <div class="relative group">
                <input type="password" id="apiKey" 
                       class="w-full bg-[#0d1117] border border-slate-800 rounded-2xl py-4 px-6 text-indigo-400 focus:outline-none focus:border-indigo-600 transition-all text-sm" 
                       placeholder="Enter Gemini 2.5 API Key">
                <button onclick="toggleKey()" class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-600 hover:text-indigo-400 transition-colors">
                    <i id="eyeIcon" class="fas fa-eye"></i>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <div class="glass p-5 rounded-3xl hover:border-indigo-500/40 transition-all">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-black text-indigo-500 uppercase tracking-widest">4H Timeframe</span>
                    <i class="fas fa-mountain text-slate-700"></i>
                </div>
                <input type="file" id="img1" class="text-[11px] text-slate-500 file:bg-indigo-600/10 file:text-indigo-400 file:border-0 file:px-3 file:py-1 file:rounded-lg file:mr-3 cursor-pointer">
            </div>
            <div class="glass p-5 rounded-3xl hover:border-indigo-500/40 transition-all">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-black text-indigo-500 uppercase tracking-widest">1H Structure</span>
                    <i class="fas fa-layer-group text-slate-700"></i>
                </div>
                <input type="file" id="img2" class="text-[11px] text-slate-500 file:bg-indigo-600/10 file:text-indigo-400 file:border-0 file:px-3 file:py-1 file:rounded-lg file:mr-3 cursor-pointer">
            </div>
            <div class="glass p-5 rounded-3xl hover:border-indigo-500/40 transition-all">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-black text-indigo-500 uppercase tracking-widest">15M Entry</span>
                    <i class="fas fa-crosshairs text-slate-700"></i>
                </div>
                <input type="file" id="img3" class="text-[11px] text-slate-500 file:bg-indigo-600/10 file:text-indigo-400 file:border-0 file:px-3 file:py-1 file:rounded-lg file:mr-3 cursor-pointer">
            </div>
            <div class="glass p-5 rounded-3xl hover:border-indigo-500/40 transition-all">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-black text-indigo-500 uppercase tracking-widest">DXY Context</span>
                    <i class="fas fa-dollar-sign text-slate-700"></i>
                </div>
                <input type="file" id="img4" class="text-[11px] text-slate-500 file:bg-indigo-600/10 file:text-indigo-400 file:border-0 file:px-3 file:py-1 file:rounded-lg file:mr-3 cursor-pointer">
            </div>
        </div>

        <button onclick="analyze()" id="mainBtn" class="w-full bg-gradient-to-r from-indigo-600 to-indigo-800 hover:from-indigo-500 hover:to-indigo-700 py-5 rounded-2xl font-black uppercase tracking-[0.3em] shadow-2xl shadow-indigo-900/40 active:scale-[0.98] transition-all">
            Execute Multi-Strategy Scan
        </button>

        <div id="resultBox" class="mt-8 hidden">
            <div class="glass rounded-3xl p-8 border-l-4 border-indigo-500 shadow-2xl relative overflow-hidden">
                <div id="loader" class="hidden text-center py-10">
                    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-500 mx-auto"></div>
                    <p class="text-[10px] text-indigo-500 mt-6 font-bold uppercase tracking-[0.4em] animate-pulse">Running Strategy Selection Algorithm...</p>
                </div>
                <div id="output" class="text-sm font-bold text-white space-y-5 leading-relaxed"></div>
            </div>
        </div>
    </div>

    <script>
        function toggleKey() {
            const input = document.getElementById('apiKey');
            const icon = document.getElementById('eyeIcon');
            input.type = input.type === "password" ? "text" : "password";
            icon.className = input.type === "password" ? "fas fa-eye" : "fas fa-eye-slash";
        }

        async function toBase64(f) { return new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result.split(',')[1]); }); }

        async function analyze() {
            const key = document.getElementById('apiKey').value;
            const output = document.getElementById('output');
            const loader = document.getElementById('loader');
            const resBox = document.getElementById('resultBox');
            const btn = document.getElementById('mainBtn');
            
            const files = [
                document.getElementById('img1').files[0], 
                document.getElementById('img2').files[0],
                document.getElementById('img3').files[0],
                document.getElementById('img4').files[0]
            ].filter(f => f);

            if(!key || files.length < 2) return alert("Strategic Error: At least 2 charts required for confluence.");

            btn.disabled = true;
            resBox.classList.remove('hidden');
            loader.classList.remove('hidden');
            output.innerHTML = "";

            try {
                const b64 = await Promise.all(files.map(f => toBase64(f)));
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Expert Multi-Strategy Trader Role. Analyze 4H, 1H, 15M, and DXY context. Scan for these strategies: 1. Smart Money Concepts (FVG/CHoCH), 2. Breakout and Retest, 3. Price Action (S/R), 4. Candlestick Patterns, 5. Trend Following. SELECT THE ONE STRATEGY THAT IS MOST VALID FOR THESE CHARTS. OUTPUT ONLY THIS FORMAT: SELECTED STRATEGY: [Name] | TRADE: [BUY/SELL/NO-TRADE] | ENTRY: [Price] | TP: [Target 1:2 R:R MINIMUM, target 1:3 to 1:10 if possible] | SL: [Price] | LOGIC: [One simple, logical sentence in plain English explaining the strategy choice]. Fast and Accurate." },
                                ...b64.map(data => ({ inline_data: { mime_type: "image/jpeg", data } }))
                            ]
                        }]
                    })
                });

                const data = await response.json();
                loader.classList.add('hidden');
                btn.disabled = false;
                
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    const rawText = data.candidates[0].content.parts[0].text;
                    output.innerHTML = rawText.split('|').map(item => `
                        <div class="flex items-center gap-4 py-2 border-b border-slate-800/30 last:border-0">
                            <i class="fas fa-bolt text-indigo-500 text-[10px]"></i>
                            <span>${item.trim()}</span>
                        </div>
                    `).join('');
                } else {
                    output.innerText = "Check API Key Status.";
                }
            } catch (e) {
                loader.classList.add('hidden');
                btn.disabled = false;
                output.innerText = "Network Sync Error.";
            }
        }
    </script>
</body>
</html>
