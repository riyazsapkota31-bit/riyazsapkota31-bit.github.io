<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OMNI-BLACK | INFINITY 10</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #6366f1; }
        body { background: #000; color: #fff; font-family: system-ui, -apple-system, sans-serif; padding: 20px; touch-action: manipulation; -webkit-font-smoothing: antialiased; }
        .glass { background: rgba(12, 12, 14, 0.98); border: 1px solid rgba(255,255,255,0.07); border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7); }
        .tier-box { border: 2px dashed #222; border-radius: 45px; min-height: 180px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; }
        .has-file { border: 3px solid #10b981; background: rgba(16, 185, 129, 0.08); transform: translateY(-2px); }
        .glow-bias { text-shadow: 0 0 60px currentColor; font-size: clamp(6rem, 15vw, 10rem); font-weight: 900; italic; line-height: 0.8; letter-spacing: -0.06em; }
        .btn-exec { background: linear-gradient(135deg, #4f46e5 0%, #a855f7 100%); border-radius: 35px; padding: 28px; font-weight: 900; letter-spacing: 0.1em; transition: 0.2s; border: 1px solid rgba(255,255,255,0.1); }
        .btn-exec:active { transform: scale(0.96) translateY(2px); filter: brightness(1.2); }
        .status-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body>

    <header class="flex justify-between items-center mb-10 px-2">
        <div class="flex flex-col">
            <h1 class="text-3xl font-black italic tracking-tighter leading-none">OMNI-BLACK</h1>
            <span class="text-[10px] font-bold text-indigo-500 uppercase tracking-[0.5em] mt-1">Infinity Master V10</span>
        </div>
        <div id="status" class="w-4 h-4 rounded-full bg-rose-600 shadow-[0_0_20px_rgba(225,29,72,0.5)]"></div>
    </header>

    <div class="glass p-7 mb-10 border-l-[10px] border-indigo-600 animate-in fade-in zoom-in duration-500">
        <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1 italic">Neural Asset Recognition</p>
        <h2 id="pair" class="text-2xl font-black text-white italic uppercase tracking-tighter">[ SYSTEM STANDBY ]</h2>
    </div>

    <div class="grid grid-cols-2 gap-6 mb-10">
        <div id="box0" class="tier-box flex flex-col items-center justify-center">
            <input type="file" id="i0" accept="image/*" onchange="sync(0)" class="absolute inset-0 opacity-0 z-30 cursor-pointer">
            <div id="t0" class="text-center"><i class="fa-solid fa-compass text-indigo-500 text-3xl mb-2"></i><p class="text-[11px] font-black text-slate-400 uppercase">1H Context</p></div>
        </div>
        <div id="box1" class="tier-box flex flex-col items-center justify-center">
            <input type="file" id="i1" accept="image/*" onchange="sync(1)" class="absolute inset-0 opacity-0 z-30 cursor-pointer">
            <div id="t1" class="text-center"><i class="fa-solid fa-layer-group text-indigo-500 text-3xl mb-2"></i><p class="text-[11px] font-black text-slate-400 uppercase">15M Structure</p></div>
        </div>
        <div id="box2" class="tier-box flex flex-col items-center justify-center">
            <input type="file" id="i2" accept="image/*" onchange="sync(2)" class="absolute inset-0 opacity-0 z-30 cursor-pointer">
            <div id="t2" class="text-center"><i class="fa-solid fa-crosshairs text-indigo-500 text-3xl mb-2"></i><p class="text-[11px] font-black text-slate-400 uppercase">1M Precision</p></div>
        </div>
        <div id="box3" class="tier-box flex flex-col items-center justify-center">
            <input type="file" id="i3" accept="image/*" onchange="sync(3)" class="absolute inset-0 opacity-0 z-30 cursor-pointer">
            <div id="t3" class="text-center"><i class="fa-solid fa-chart-line text-indigo-500 text-3xl mb-2"></i><p class="text-[11px] font-black text-slate-400 uppercase">DXY Correlation</p></div>
        </div>
    </div>

    <button id="go" onclick="run()" class="btn-exec w-full text-white uppercase text-lg shadow-2xl mb-12">Run Infinity Scan</button>

    <div id="out" class="hidden space-y-10 pb-20 animate-in fade-in slide-in-from-bottom-12 duration-1000">
        
        <div id="waitBox" class="hidden p-8 rounded-[45px] bg-amber-500/10 border-2 border-amber-500/30 text-center relative overflow-hidden">
            <div class="absolute top-0 right-0 p-4 opacity-10"><i class="fa-solid fa-shield-halved text-4xl"></i></div>
            <p class="text-[11px] font-black text-amber-500 uppercase tracking-[0.3em] mb-2">Institutional Guard</p>
            <h3 id="waitMsg" class="text-4xl font-black text-white italic tracking-tighter"></h3>
        </div>

        <div class="text-center"><h2 id="bias" class="italic glow-bias"></h2></div>

        <div class="grid grid-cols-2 gap-5 text-center">
            <div class="glass p-7"><p class="text-[10px] text-slate-500 font-bold uppercase mb-2">Entry</p><p id="ent" class="text-3xl font-mono text-white">--</p></div>
            <div class="glass p-7 text-indigo-400"><p class="text-[10px] font-bold uppercase mb-2">Lots (1%)</p><p id="lot" class="text-3xl font-mono">--</p></div>
            <div class="glass p-7 text-rose-500 border-rose-500/10"><p class="text-[10px] font-bold uppercase mb-2">Stop Loss</p><p id="sl" class="text-3xl font-mono">--</p></div>
            <div class="glass p-7 text-emerald-500 border-emerald-500/10"><p class="text-[10px] font-bold uppercase mb-2">Take Profit</p><p id="tp" class="text-3xl font-mono">--</p></div>
        </div>

        <div class="glass p-10 border-t-[6px] border-indigo-600 shadow-inner">
            <p class="text-[11px] text-indigo-400 font-black uppercase mb-5 flex items-center gap-3">
                <span class="w-3 h-3 rounded-full bg-indigo-500 status-pulse"></span> Infinity Verdict Logic
            </p>
            <p id="log" class="text-lg text-slate-200 leading-snug font-semibold italic"></p>
        </div>
    </div>

    <div class="mt-20 p-10 glass opacity-10 hover:opacity-100 transition-all duration-700 text-center border-dashed">
        <input type="password" id="apiKey" placeholder="Connect Gemini Pro Key" class="bg-transparent border-b border-white/20 w-full mb-8 p-3 text-center text-sm outline-none text-indigo-400 font-mono">
        <button onclick="save()" class="text-[10px] font-black uppercase text-slate-500 tracking-[0.5em]">Link Neural Engine</button>
    </div>

    <script>
        let KEY = localStorage.getItem('omni_infinity_v10') || "";
        let files = [null, null, null, null];

        if (KEY) validate(KEY);

        async function validate(k) {
            const s = document.getElementById('status');
            const p = document.getElementById('pair');
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${k}`, {
                    method: 'POST', body: JSON.stringify({ contents: [{ parts: [{ text: 'ping' }] }] })
                });
                if (res.ok) {
                    s.className = "w-4 h-4 rounded-full bg-emerald-500 shadow-[0_0_25px_#10b981] status-pulse";
                    p.innerText = "[ INFINITY LINK READY ]";
                } else throw new Error();
            } catch (e) {
                s.className = "w-4 h-4 rounded-full bg-rose-600 shadow-[0_0_25px_#e11d48]";
                p.innerText = "[ AUTHENTICATION ERROR ]";
            }
        }

        function save() {
            const v = document.getElementById('apiKey').value.trim();
            if (v) { localStorage.setItem('omni_infinity_v10', v); KEY = v; validate(v); }
        }

        function sync(i) {
            files[i] = document.getElementById(`i${i}`).files[0];
            document.getElementById(`box${i}`).classList.add('has-file');
            document.getElementById(`t${i}`).innerHTML = `<i class="fa-solid fa-shield-check text-emerald-500 text-5xl"></i>`;
        }

        async function run() {
            if (!KEY) return alert("Engine Offline: Key Required.");
            if (files.includes(null)) return alert("Data Void: 4 charts needed.");
            
            const b = document.getElementById('go');
            const p = document.getElementById('pair');
            b.innerHTML = `<i class="fa-solid fa-atom fa-spin mr-3"></i> DECODING MULTIVERSE...`;
            p.innerText = "SMC/DXY CONFLUENCE ACTIVE...";

            try {
                const parts = await Promise.all(files.map(f => {
                    return new Promise(r => {
                        const rd = new FileReader();
                        rd.readAsDataURL(f);
                        rd.onload = () => r({ inlineData: { mimeType: f.type, data: rd.result.split(',')[1] } });
                    });
                }));

                const prompt = `Act as an Elite Quant Strategist. 
                1. Detect Asset Pair. 
                2. Cross-analyze 1H context, 15M structure, 1M precision, and DXY Index correlation. 
                3. IF choppy/DXY conflict: set bias "WAIT" + trigger_price. 
                4. Self-Correct: Ensure SL/TP provides min 1:3 Risk/Reward. 
                5. VERDICT: Strictly 30-40 words total. Punchy, professional, no fluff. 
                JSON ONLY:
                {
                    "p": "PAIR", "b": "BUY|SELL|WAIT", "e": number, "s": number, "t": number, "tr": number,
                    "l": "STORY: [Short] TRAP: [Short] ACTION: [Short]"
                }`;

                const req = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${KEY}`, {
                    method: 'POST',
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, ...parts] }] })
                });

                const raw = await req.json();
                const res = JSON.parse(raw.candidates[0].content.parts[0].text.match(/\{[\s\S]*\}/)[0]);
                
                p.innerText = `TARGET: ${res.p}`;
                render(res);
            } catch (e) { alert("SCAN ERROR: Check images."); }
            finally { b.innerText = "Run Infinity Scan"; }
        }

        function render(d) {
            document.getElementById('out').classList.remove('hidden');
            const b = document.getElementById('bias');
            const w = document.getElementById('waitBox');
            
            b.innerText = d.b;
            if (d.b === "WAIT") {
                w.classList.remove('hidden');
                document.getElementById('waitMsg').innerText = `TRIGGER PRICE: ${d.tr || 'N/A'}`;
                b.className = "italic glow-bias text-amber-500";
            } else {
                w.classList.add('hidden');
                b.className = d.b === 'BUY' ? "italic glow-bias text-emerald-500" : "italic glow-bias text-rose-600";
            }

            document.getElementById('ent').innerText = d.e || "--";
            document.getElementById('sl').innerText = d.s || "--";
            document.getElementById('tp').innerText = d.t || "--";
            document.getElementById('log').innerText = d.l;
            
            const dist = Math.abs(d.e - d.s);
            document.getElementById('lot').innerText = dist > 0 ? ((1000 * 0.01) / (dist * 10)).toFixed(2) : "1.00";
            document.getElementById('out').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
