<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Omni-Trader Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="strategies.js"></script>
</head>
<body class="bg-black text-white p-5">
    <div class="max-w-md mx-auto bg-gray-900 p-6 rounded-xl shadow-xl">
        <h1 class="text-2xl font-bold mb-4 text-indigo-400">OMNI-TRADER AI</h1>
        <input type="password" id="apiKey" class="w-full p-2 bg-black border border-gray-700 rounded mb-4" placeholder="Gemini API Key">
        <div class="grid grid-cols-2 gap-2 mb-4">
            <input type="file" id="img1" class="text-xs">
            <input type="file" id="img2" class="text-xs">
        </div>
        <button onclick="analyze()" id="btn" class="w-full bg-indigo-600 py-3 rounded font-bold">ANALYZE CHARTS</button>
        <div id="out" class="mt-4 p-3 bg-black rounded text-sm whitespace-pre-wrap min-h-[100px]"></div>
    </div>

    <script>
        async function toB64(f) { return new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result.split(',')[1]); }); }
        
        async function analyze() {
            const key = document.getElementById('apiKey').value;
            const files = [document.getElementById('img1').files[0], document.getElementById('img2').files[0]].filter(f => f);
            const out = document.getElementById('out');
            if(!key || files.length < 1) return alert("API Key and at least 1 image required.");

            out.innerText = "Analyzing market structure...";
            try {
                const b64 = await Promise.all(files.map(f => toB64(f)));
                // Using the specific stable model name for April 2026
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${key}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [
                            { text: "Analyze these trading charts for SMC/ICT setups. Provide Trade, Confidence, Entry, SL, and TP." },
                            ...b64.map(data => ({ inline_data: { mime_type: "image/jpeg", data } }))
                        ]}]
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                out.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) {
                out.innerText = "Error: " + e.message;
            }
        }
    </script>
</body>
</html>
