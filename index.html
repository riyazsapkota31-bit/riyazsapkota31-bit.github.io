<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Trader Elite | Secure Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #05070a; color: #e2e8f0; }
        .glass { background: #0d1117; border: 1px solid #1f2937; }
        #sideDrawer { position: fixed; top: 0; right: -350px; width: 350px; height: 100%; background: #0d1117; z-index: 1000; transition: 0.4s; border-left: 1px solid #1f2937; }
        #sideDrawer.open { right: 0; }
        .upload-box { position: relative; height: 120px; background: #0d1117; border: 1px dashed #1f2937; border-radius: 15px; display: flex; align-items: center; justify-content: center; }
        .file-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="sideDrawer" class="p-6 space-y-6">
        <h3 class="text-xs font-black uppercase text-indigo-500">Terminal Settings</h3>
        <div class="space-y-4">
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase">Secure API Key</label>
                <input type="password" id="apiKeyInput" placeholder="Paste New Key Here" class="w-full bg-black border border-slate-800 rounded-lg p-3 text-xs outline-none">
                <button onclick="saveApiKey()" class="w-full bg-emerald-600 text-white font-bold p-2 rounded-lg mt-2 text-[10px] uppercase">Lock Key to Device</button>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <input type="number" id="bal" value="10000" placeholder="Balance" class="bg-black border border-slate-800 p-3 text-xs rounded-lg">
                <input type="number" id="risk" value="0.5" placeholder="Risk %" class="bg-black border border-slate-800 p-3 text-xs rounded-lg">
            </div>
        </div>
        <button onclick="toggleDrawer()" class="text-slate-500 text-xs font-bold uppercase">Close Settings</button>
    </div>

    <main class="max-w-4xl mx-auto p-6">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-black italic">OMNI-TRADER</h1>
            <button onclick="toggleDrawer()" class="p-4 glass rounded-xl"><i class="fas fa-cog"></i></button>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="upload-box"><input type="file" id="up0" class="file-input" required><span class="text-[10px] font-bold">4H CHART</span></div>
            <div class="upload-box"><input type="file" id="up1" class="file-input" required><span class="text-[10px] font-bold">1H CHART</span></div>
            <div class="upload-box"><input type="file" id="up2" class="file-input" required><span class="text-[10px] font-bold">M15 CHART</span></div>
            <div class="upload-box"><input type="file" id="up3" class="file-input" required><span class="text-[10px] font-bold">DXY INDEX</span></div>
        </div>

        <button id="scanBtn" onclick="executeScan()" class="w-full bg-indigo-600 py-6 rounded-2xl font-black uppercase text-sm tracking-widest shadow-xl">Perform Multi-Chart Scan</button>

        <div id="resultBox" class="hidden mt-8 glass rounded-3xl p-8 border-t-4 border-indigo-500">
            <div class="flex justify-between items-end mb-6">
                <div><span class="text-[10px] font-bold text-slate-500 uppercase">Signal</span><h2 id="actionText" class="text-5xl font-black italic">---</h2></div>
                <p id="logicText" class="text-[11px] text-indigo-400 font-bold italic text-right max-w-xs">Awaiting upload...</p>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                <div><span class="text-[10px] font-bold text-slate-500 uppercase">Entry</span><b id="entText" class="block text-lg">---</b></div>
                <div><span class="text-[10px] font-bold text-slate-500 uppercase">Stop Loss</span><b id="slText" class="block text-lg text-rose-400">---</b></div>
                <div><span class="text-[10px] font-bold text-slate-500 uppercase">Take Profit</span><b id="tpText" class="block text-lg text-emerald-400">---</b></div>
                <div><span class="text-[10px] font-bold text-slate-500 uppercase">Lot Size</span><b id="lotText" class="block text-lg text-yellow-500">0.00</b></div>
            </div>
        </div>
    </main>

    <script src="strategies.js"></script>
    <script>
        document.getElementById('apiKeyInput').value = localStorage.getItem('omni_key') || "";
        function toggleDrawer() { document.getElementById('sideDrawer').classList.toggle('open'); }
        function saveApiKey() { localStorage.setItem('omni_key', document.getElementById('apiKeyInput').value); alert("Key Secured Locally!"); }

        async function fileToData(file) {
            return new Promise(resolve => {
                const r = new FileReader();
                r.onload = () => resolve({ inline_data: { mime_type: "image/jpeg", data: r.result.split(',')[1].replace(/[\r\n]/g, '') } });
                r.readAsDataURL(file);
            });
        }

        async function executeScan() {
            const KEY = localStorage.getItem('omni_key');
            if (!KEY) return alert("Enter API Key in Settings!");
            
            const btn = document.getElementById('scanBtn');
            const files = ['up0','up1','up2','up3'].map(id => document.getElementById(id).files[0]);
            if (files.some(f => !f)) return alert("Upload all 4 charts.");

            btn.disabled = true;
            btn.innerText = "READING PIXELS...";
            document.getElementById('resultBox').classList.remove('hidden');

            try {
                const payloads = await Promise.all(files.map(fileToData));
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                    method: 'POST',
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Extract current price and SL from charts. Output JSON: {entry: number, sl: number, bias: 'BUY/SELL', logic: 'string'}" }, ...payloads] }] })
                });

                const data = await response.json();
                const result = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, ''));
                
                const bal = parseFloat(document.getElementById('bal').value);
                const risk = parseFloat(document.getElementById('risk').value);
                
                // Real calculation logic
                const lots = calculatePositionSize(bal, risk, result.entry, result.sl);

                document.getElementById('actionText').innerText = result.bias;
                document.getElementById('entText').innerText = result.entry;
                document.getElementById('slText').innerText = result.sl;
                document.getElementById('tpText').innerText = (result.entry + (Math.abs(result.entry - result.sl) * 3)).toFixed(2);
                document.getElementById('lotText').innerText = lots;
                document.getElementById('logicText').innerText = result.logic;

            } catch (e) {
                document.getElementById('logicText').innerText = "Sync Error: Check API Key/Quota.";
            } finally {
                btn.disabled = false;
                btn.innerText = "Perform Multi-Chart Scan";
            }
        }
    </script>
</body>
</html>
