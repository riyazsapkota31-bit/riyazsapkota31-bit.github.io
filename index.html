<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Trader Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #05070a; color: #e2e8f0; font-family: sans-serif; }
        .glass { background: #0d1117; border: 1px solid #1f2937; }
        .upload-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 20px; }
        .upload-box { 
            position: relative; height: 100px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; background: #0d1117; 
            border: 1px solid #1f2937; border-radius: 12px; 
        }
        .file-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .tick { display: none; color: #10b981; font-size: 20px; }
        input:valid ~ .tick { display: block; }
        input:valid ~ .box-label { display: none; }
        .res-label { font-size: 8px; font-weight: 900; color: #475569; text-transform: uppercase; }
        .res-value { font-size: 14px; font-weight: 700; color: #f8fafc; }
    </style>
</head>
<body class="p-4">

    <header class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-xl font-black italic text-white uppercase">OMNI-TRADER</h1>
            <p class="text-[8px] text-indigo-500 font-bold uppercase tracking-widest">Real-Time Multi-Chart Analyst</p>
        </div>
        <button class="h-10 w-10 glass rounded-xl flex items-center justify-center"><i class="fas fa-cog"></i></button>
    </header>

    <div class="upload-grid">
        <div class="upload-box"><input type="file" id="img0" class="file-input" required><span class="box-label text-[10px] font-bold">4H CHART</span><i class="fas fa-check-circle tick"></i></div>
        <div class="upload-box"><input type="file" id="img1" class="file-input" required><span class="box-label text-[10px] font-bold">1H CHART</span><i class="fas fa-check-circle tick"></i></div>
        <div class="upload-box"><input type="file" id="img2" class="file-input" required><span class="box-label text-[10px] font-bold">M15 CHART</span><i class="fas fa-check-circle tick"></i></div>
        <div class="upload-box"><input type="file" id="img3" class="file-input" required><span class="box-label text-[10px] font-bold">DXY INDEX</span><i class="fas fa-check-circle tick"></i></div>
    </div>

    <button id="scanBtn" onclick="executeScan()" class="w-full mt-6 bg-indigo-600 py-4 rounded-xl font-black uppercase text-xs tracking-widest">
        Perform Multi-Chart Scan
    </button>

    <div id="resultBox" class="mt-6 glass rounded-2xl p-5 border-t-2 border-indigo-500">
        <div class="flex justify-between items-start mb-4">
            <div><span class="res-label">Institutional Bias</span><h2 id="actionText" class="text-3xl font-black italic uppercase">SCANNING</h2></div>
            <div class="text-right"><span class="res-label">Market Logic</span><p id="logicText" class="text-[9px] text-indigo-400 italic">Awaiting data pixels...</p></div>
        </div>
        
        <div class="grid grid-cols-3 gap-4">
            <div><span class="res-label">Support</span><p id="supText" class="res-value">---</p></div>
            <div><span class="res-label">Resistance</span><p id="resText" class="res-value">---</p></div>
            <div><span class="res-label">Entry Price</span><p id="entText" class="res-value">---</p></div>
            <div><span class="res-label">Take Profit</span><p id="tpText" class="res-value text-emerald-400">---</p></div>
            <div><span class="res-label">Stop Loss</span><p id="slText" class="res-value text-rose-400">---</p></div>
            <div><span class="res-label">Lots to Trade</span><p id="lotText" class="res-value text-yellow-500">0.00</p></div>
        </div>
    </div>

    <script src="strategies.js"></script>
    <script>
        const API_KEY = "PASTE_YOUR_KEY_HERE"; //

        async function fileToPart(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve({ inline_data: { mime_type: "image/jpeg", data: reader.result.split(',')[1] } });
            });
        }

        async function executeScan() {
            const btn = document.getElementById('scanBtn');
            const files = [
                document.getElementById('img0').files[0],
                document.getElementById('img1').files[0],
                document.getElementById('img2').files[0],
                document.getElementById('img3').files[0]
            ];

            if (files.some(f => !f)) return alert("Please upload all 4 charts first.");

            btn.innerText = "EXTRACTING PIXELS...";
            btn.disabled = true;

            try {
                const imageParts = await Promise.all(files.map(fileToPart));
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Analyze these 4 charts for a trade setup. Return ONLY JSON: {bias:'BUY/SELL', entry:number, sl:number, support:number, resistance:number, logic:'short string'}" },
                                ...imageParts
                            ]
                        }]
                    })
                });

                const data = await response.json();
                const textOutput = data.candidates[0].content.parts[0].text;
                const result = JSON.parse(textOutput.replace(/```json|```/g, ""));

                // Risk Calculations from strategies.js
                const balance = 10058; // From your settings
                const risk = 1; 
                const rr = 3.0;

                const lots = calculatePositionSize(balance, risk, result.entry, result.sl);
                const tp = (result.entry + (Math.abs(result.entry - result.sl) * (result.bias === 'BUY' ? rr : -rr))).toFixed(2);

                // Update UI
                document.getElementById('actionText').innerText = result.bias;
                document.getElementById('logicText').innerText = result.logic;
                document.getElementById('supText').innerText = result.support;
                document.getElementById('resText').innerText = result.resistance;
                document.getElementById('entText').innerText = result.entry;
                document.getElementById('slText').innerText = result.sl;
                document.getElementById('tpText').innerText = tp;
                document.getElementById('lotText').innerText = lots;

            } catch (error) {
                console.error(error);
                document.getElementById('logicText').innerText = "Sync Error: Could not read chart pixels.";
            } finally {
                btn.innerText = "Perform Multi-Chart Scan";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
